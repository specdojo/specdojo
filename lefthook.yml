# Git hooks for development workflow
pre-commit:
  piped: false
  parallel: true
  commands:
    docs-build:
      glob: 'docs/**'
      run: npx tsx tools/docs/src/lefthook-docs-build.ts
      stage_fixed: true

    format-markdown:
      glob: '*.md'
      run: npx markdownlint --fix {staged_files}
      stage_fixed: true

    lint-markdown:
      glob: '*.md'
      run: npx markdownlint {staged_files}

    validate-templates:
      glob: 'docs/ja/specdojo/templates/**'
      run: npm test

    register-build:
      glob: 'docs/**/pjr-index.md'
      run: npx tsx src/specdojo.ts register build
      stage_fixed: true

commit-msg:
  commands:
    commitlint:
      run: npx commitlint --edit $1
