# Git hooks for development workflow
pre-commit:
  piped: false
  parallel: true
  commands:
    # docs-build（vitepress build）は rendering pages 時にメモリを大量消費し、
    # 環境によっては OOM (exit 137) で commit がブロックされるため pre-commit から外す。
    # フルビルドの検証は CI 側で実行する想定。
    format-markdown:
      glob: "*.md"
      run: npx markdownlint --fix {staged_files}
      stage_fixed: true

    test:
      glob: "{src/**,tests/**,docs/ja/specdojo/templates/**,vitest.config.*}"
      run: npm test

    register-build:
      glob: "docs/**/pjr-index.md"
      run: npx tsx src/specdojo.ts register build
      stage_fixed: true

    catalog-build:
      glob: "docs/**/dct-*.yaml"
      run: npx tsx src/specdojo.ts catalog build
      stage_fixed: true

    catalog-validate:
      glob: "docs/ja/projects/**"
      run: npx tsx src/specdojo.ts catalog validate

    exec-build:
      glob: "docs/**/sch-*.yaml"
      run: npx tsx src/specdojo.ts exec build
      stage_fixed: true

    index-build:
      glob: "docs/**"
      run: npx tsx src/specdojo.ts index build
      stage_fixed: true

commit-msg:
  commands:
    commitlint:
      run: npx commitlint --edit $1
