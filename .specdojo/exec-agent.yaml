# exec-agent.yaml
# specdojo exec run のエントリポイント設定
#
# ─ 設定の分担 ────────────────────────────────────────────────────────────────
# pm-members.yaml                     : エージェントの定義（command・capabilities）
# schedule/exec-strategy-<track>.yaml : フェーズ・難易度 → メンバー割り当てルール
# このファイル                         : exec run のグローバル設定
#
# ─ exec run --auto の処理フロー ──────────────────────────────────────────────
# 1. ready.json からタスクを取得する（phase_set・phase・difficulty・execution を含む）
# 2. execution == manual のタスクは skip_and_log してスキップ
# 3. トラックに対応する exec-strategy-<track>.yaml の assignment_rules を上から評価し、
#    最初にマッチしたルールの members 配列を決定する
# 4. members[0] の command（pm-members.yaml）を実行する
# 5. rate limit 検出時は exec-strategy の rate_limit_policy に従い
#    members 配列の次へ順次フォールバックする

# レートリミット検出設定（全トラック共通）
rate_limit_detection:
  exit_codes: [1]
  stderr_patterns:
    - "rate limit"
    - "429"
