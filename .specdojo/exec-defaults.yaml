# exec-defaults.yaml
# specdojo exec run の共通実行設定。
#
# エージェント選択に使う作業要件（mode / capabilities / proficiency）は
# sch-strategy-<track>.yaml の phase に定義する。
#
# rate_limit_detection / rate_limit_policy は全 provider 共通のグローバル既定値。
# 検出シグナル・終了コード・待機時間は provider ごとに異なるため、provider 別の
# 上書きは providers.<provider> に置く（キーは pm-members[].provider に対応）。
# member ごとに、対応する provider ブロックがあればそれを、なければ下のグローバル
# 既定を使う。検出は候補ごとに provider で解決し、retry/backoff の policy は最優先
# 候補（candidates[0]）の provider で解決する。

rate_limit_detection:
  # exit_codes は最小限にする。多くの agent CLI は通常失敗と agent 自身の block も
  # exit 1 で返すため、素の exit 1 は rate limit と区別できない（providers.<name> で
  # stderr_patterns に寄せる）。グローバル exit 1 は override の無い provider 向けの
  # 後方互換フォールバックとして残す。
  exit_codes: [1]
  # stderr_patterns は既定で「プロセスが非ゼロ終了した場合のみ」rate limit とみなす
  # （stderr_requires_nonzero_exit の既定は true）。成果物本文に "rate limit" 等の
  # 語が含まれ、agent が成功（exit 0）したままその差分を stderr に出力しても誤検出
  # しない。終了コードに依らず stderr のみで判定したい場合は false を明示する。
  stderr_patterns:
    - "rate limit"
    - "429"

rate_limit_policy:
  on_non_critical:
    action: skip # cpm.slack > 0: block イベントを記録して次のタスクへ
  on_critical:
    action: try_next # cpm.slack == 0: candidates 配列の次の agent へ
    retry:
      max_attempts: 3
      initial_wait_seconds: 60
      backoff_multiplier: 3 # 60s -> 180s -> 540s
      max_wait_seconds: 600
    on_exhausted: block # 全候補試行後はブロックして人間に委ねる

# provider 別の設定。command_template は agent の起動コマンドで、member 属性
# （{nickname} / {mode} / {proficiency} と command_params の変数）で展開する。
# member 側の command はテンプレートを持たない構成（provider: custom 等）専用の上書き。
#
# 検出・ポリシー上書きは、各 provider ブロックの rate_limit_detection を
# 与えた場合、その provider の member ではグローバル rate_limit_detection を完全に
# 置き換える（exit_codes を省略すれば exit code 起因の誤検出を避けられる）。
#
# limit の種類は provider ごとに異なる（rate limit / session limit / 週次・月次 quota）。
# reset horizon により retryable と回復戦略が変わるため、詳細は各 provider 設計書の
# limit 表を参照する。stderr の実文言は CLI バージョンで変わりうるため、下記 pattern は
# 実際の出力で検証してから確定する。
providers:
  claude:
    # モデルは .claude/agents/{nickname}.md の model フィールドで指定するため、
    # テンプレートにモデル名を含めない。permission は mode 別 settings で分離する。
    command_template: "claude -p --verbose --agent {nickname} --settings .specdojo/claude/settings.{mode}.json"
    # Anthropic API: 429 / rate limit に加え、モデル高負荷時の overloaded を検出。
    # session limit は logs/exec-auto.log で実観測:
    #   "You've hit your session limit · resets 4:10am (UTC)"
    # （rate limit / 429 を含まないため exit 1 ではなくこの文言で検出する必要がある）
    rate_limit_detection:
      stderr_patterns:
        - "rate limit"
        - "429"
        - "overloaded"
        - "session limit"

  copilot:
    # edit / review とも同一の許可リスト方式（shell は読み取り系・検証系のみ、git の
    # 変更系は deny）。write はパス単位に絞れないため許可し、成果物変更の境界は
    # specdojo CLI の commit 許可リストで作る。プレースホルダは不要のため使わない。
    # model は auto（Copilot の自動モデル選択）で常に最新・最適なモデルへ追従する。
    # ローカル config に persist された model 設定に依存しないよう明示する。
    command_template: >-
      copilot -p "$(cat)" --no-color --no-ask-user --model auto
      --no-remote --no-remote-export --disable-builtin-mcps
      --allow-tool write
      --allow-tool 'shell(git status)' --allow-tool 'shell(git diff)'
      --allow-tool 'shell(git log)' --allow-tool 'shell(git show)'
      --allow-tool 'shell(npm run)' --allow-tool 'shell(npm test)'
      --allow-tool 'shell(specdojo:*)'
      --deny-tool 'shell(git add)' --deny-tool 'shell(git commit)'
      --deny-tool 'shell(git push)' --deny-tool 'shell(git reset)'
    # Copilot: 429 / rate limit に加え、quota / premium request 上限の文言を検出。
    rate_limit_detection:
      stderr_patterns:
        - "rate limit"
        - "429"
        - "quota"
        - "premium request"

  codex:
    # codex exec には worker 名を選択するオプションがないため {nickname} は使わず、
    # モデルと reasoning effort を proficiency で切り替える。--ephemeral は rollout
    # ファイルを保存しない（実行履歴の正本は SpecDojo の event・plan・result）。
    # sandbox_workspace_write.network_access=false は sandbox 内からの直接の
    # ネットワークアクセスを遮断する（web_search はモデル側ツールのため影響しない）。
    command_template: 'codex exec --ephemeral --sandbox workspace-write -c approval_policy="never" -c sandbox_workspace_write.network_access=false --model {model} -c model_reasoning_effort="{effort}"'
    command_params:
      by_proficiency:
        normal: { model: gpt-5.6-terra, effort: medium }
        expert: { model: gpt-5.6-sol, effort: high }
    # OpenAI: 429 / rate limit（API）に加え、ChatGPT プランの 5時間枠（session limit）
    # と週次上限（weekly / usage limit）がスタックする。
    rate_limit_detection:
      stderr_patterns:
        - "rate limit"
        - "429"
        - "session limit"
        - "weekly limit"
        - "usage limit"

  opencode:
    # {nickname} が --agent の指定名になるため、member の nickname と
    # .opencode/agents/<name>.md のファイル名を一致させる。
    command_template: "opencode run --agent {nickname}"
    # 同一ホストの単一 Ollama モデルを共有するため、複数の opencode agent を同時起動
    # するとメモリ競合・モデルロード待ちで不安定になる。1 ラウンドで同時に走る opencode
    # を 1 つに制限する（他 provider のグローバル --parallel は下げない）。
    max_concurrency: 1
    # ローカル Ollama: API rate limit より、モデルロード待ち・メモリ不足・接続
    # タイムアウトが主な失敗要因。exit 1 は実失敗なので exit_codes は空にする。
    rate_limit_detection:
      exit_codes: []
      stderr_patterns:
        - "timeout"
        - "connection refused"
        - "out of memory"
        - "model is loading"
    # 同一ホスト・単一モデル共有のため、別 opencode member への try_next では解消
    # しない。復旧は wait+backoff の再試行に依存するため初回待機を長めに取る。
    rate_limit_policy:
      on_non_critical:
        action: skip
      on_critical:
        action: try_next
        retry:
          max_attempts: 3
          initial_wait_seconds: 120 # モデル再ロード/メモリ解放に時間がかかるため長め
          backoff_multiplier: 2 # 120s -> 240s -> 480s
          max_wait_seconds: 600
        on_exhausted: block
