# dct.schema.yaml
$schema: "https://json-schema.org/draft/2020-12/schema"
title: "SpecDojo Deliverables Catalog YAML schema"
description: >
  Schema for domain-scoped deliverables catalog files.
  Supports both template files (dct-<domain>-template.yaml, type: template) and
  instantiated project catalogs (dct-<domain>.yaml, type: project).
  Templates allow _PLACEHOLDER_ style local_ids and do not require project_id.
  Project documents require project_id and enforce strict kebab-case identifiers.
type: object
additionalProperties: false

required:
  - id
  - type
  - status
  - domain
  - groups

properties:
  id:
    type: string
    pattern: "^[a-z0-9][a-z0-9-:]*$"
    description: "Document metadata ID (e.g., prj-0001:dct-project-definition, dct-data-flow-template)."

  type:
    type: string
    enum: ["template", "project"]
    description: "Document type. 'template' for template files; 'project' for instantiated project catalogs."

  status:
    type: string
    enum: ["draft", "ready", "deprecated"]
    description: "Document status."

  part_of:
    type: array
    description: "Optional parent document IDs."
    items:
      $ref: "#/$defs/DocId"
    uniqueItems: true

  project_id:
    type: string
    pattern: "^prj-[0-9]{4,}$"
    description: "Project identifier (e.g., prj-0001). Required for type: project."

  domain:
    type: string
    pattern: "^[a-z0-9][a-z0-9-]{0,62}$"
    description: "Domain identifier matching the file name dct-<domain>.yaml."

  base_path:
    type: string
    pattern: "^/[^\\s]+$"
    description: >
      Absolute repo-root path for this domain. Must start with "/".
      Example: "/docs/ja/projects/prj-0001/030-project-management".
      Convention (applies to all base_path and path fields in this schema):
        leading "/"  → absolute from repo root
        no leading "/" → relative, joined onto the nearest ancestor's resolved base_path.

  groups:
    type: array
    description: "Ordered list of groups, corresponding to Markdown catalog chapters."
    items:
      $ref: "#/$defs/Section"

# ── type: template ──────────────────────────────────────────────────────────────
# Templates must have at least one group defined.
if:
  properties:
    type:
      const: "template"
  required:
    - type
then:
  properties:
    groups:
      minItems: 1

# ── type: project ───────────────────────────────────────────────────────────────
# Project documents require project_id and use strict kebab-case identifiers
# in local_id, depends_on items, and part_of document IDs.
else:
  required:
    - project_id
  properties:
    part_of:
      items:
        $ref: "#/$defs/StrictDocId"
    groups:
      items:
        $ref: "#/$defs/StrictSection"

$defs:
  # ── Criteria ──────────────────────────────────────────────────────────────────
  CriteriaItem:
    type: object
    additionalProperties: false
    required:
      - text
      - roles
      - viewpoint
    properties:
      text:
        type: string
        minLength: 1
        description: "Verifiable condition the deliverable must satisfy."
      roles:
        type: array
        minItems: 1
        uniqueItems: true
        description: "Role codes responsible for verifying this criterion."
        items:
          type: string
          enum: [PO, PM, BA, ARC, DEV, QE, UX, OPS]
      viewpoint:
        type: string
        pattern: "^vp-[a-z][a-z0-9-]*$"
        description: "Primary review viewpoint ID (vp-*) from pm-review-viewpoints.yaml."

  # ── Document IDs ──────────────────────────────────────────────────────────────
  DocId:
    type: string
    pattern: "^[a-zA-Z0-9_][a-zA-Z0-9_:-]*$"
    description: >
      Permissive document ID. Allows _PLACEHOLDER_ style for templates
      (e.g., _PROJECT_ID_:dct-index). Applied to both template and project documents
      via the base schema; project documents additionally enforce StrictDocId.

  StrictDocId:
    type: string
    pattern: "^[a-z0-9][a-z0-9-:]*$"
    description: "Strict document ID for project documents (e.g., prj-0001:dct-index, prj-overview)."

  # ── Sections ──────────────────────────────────────────────────────────────────
  Section:
    type: object
    additionalProperties: false
    anyOf:
      - required: [deliverables]
      - required: [groups]
    properties:
      name:
        type: string
        minLength: 1
        description: "Section name corresponding to the Markdown chapter title (e.g., 管理計画, 組織体制)."

      base_path:
        type: string
        pattern: "^[^\\s]+$"
        description: >
          Directory for deliverables in this group. Corresponds to 配置先 in
          the Markdown catalog. Follow the leading-slash convention:
            leading "/" → absolute from repo root
            no leading "/" → relative, joined onto the nearest ancestor's resolved base_path.

      note:
        type: string
        description: "Optional note for this section (e.g., WBSへの落とし込み対象外)."

      min_size:
        type: string
        enum: ["small", "medium", "large"]
        description: "Minimum project size to include this section. Template-only field; removed by scaffold."

      groups:
        type: array
        minItems: 1
        description: "Nested child groups. Use to group subgroups (e.g., Markdown ### chapters under a ## chapter)."
        items:
          $ref: "#/$defs/Section"

      deliverables:
        type: array
        minItems: 1
        description: "Deliverable entries in this section. Leaf groups have deliverables; parent groups have groups instead."
        items:
          $ref: "#/$defs/DeliverableItem"

  StrictSection:
    type: object
    description: >
      Additional kebab-case constraints applied to every section in project documents.
      Applied recursively so all nesting levels are covered.
    properties:
      deliverables:
        type: array
        items:
          $ref: "#/$defs/StrictDeliverableItem"
      groups:
        type: array
        items:
          $ref: "#/$defs/StrictSection"

  # ── Deliverable Items ─────────────────────────────────────────────────────────
  DeliverableItem:
    type: object
    additionalProperties: false
    required:
      - local_id
      - name
      - kind
      - overview
    properties:
      local_id:
        type: string
        pattern: "^[a-z0-9][a-zA-Z0-9_-]*$"
        description: >
          Deliverable logical name. Starts with lowercase or digit; subsequent
          characters may be lowercase, uppercase, digits, hyphens, or underscores.
          Wrap template placeholders in underscores
          (e.g., pjr-_NNNN_-_TERM_, pr-_YYYY-MM-DD_).
          Project documents additionally enforce StrictDeliverableItem (kebab-case only).

      instance_id_pattern:
        type: string
        pattern: "^(?=.*\\{[a-z][a-z0-9-]*\\})[a-z0-9]+(?:-(?:[a-z0-9]+|\\{[a-z][a-z0-9-]*\\}))*$"
        description: >
          Optional ID pattern for recurring deliverable instances represented by this
          local_id. Use lowercase kebab-case literals and lowercase placeholders wrapped
          in braces (e.g., pjr-{sequence}-{term}, pr-{yyyy}-{mm}-{dd}).
          The local_id remains the stable catalog and dependency key.

      name:
        type: string
        minLength: 1
        description: "Human-readable deliverable name."

      kind:
        type: string
        enum: ["work", "control", "generated"]
        description: "Deliverable kind. Only 'work' items are catalog+WBS targets."

      depends_on:
        type: array
        description: "local_ids of deliverables this one logically depends on."
        items:
          type: string
          minLength: 1
        uniqueItems: true

      overview:
        type: string
        minLength: 1
        description: "One-sentence description of the deliverable's purpose."

      path:
        type: string
        pattern: "^[^\\s]+$"
        description: >
          File path for this deliverable. Required for kind: work.
          Follow the leading-slash convention:
            leading "/" → absolute from repo root
            no leading "/" → relative, joined onto the nearest ancestor group's resolved base_path.

      rulebook:
        type: string
        pattern: "^[a-z0-9][a-z0-9-]*$"
        description: >
          Optional rulebook ID for this deliverable (e.g., prj-overview-rulebook).
          Resolved to docs/ja/specdojo/rulebooks/<id>.md by convention.
          Used by review plan generation to populate inputs.rulebook.

      done_criteria:
        type: array
        minItems: 1
        description: >
          Completion criteria for this deliverable. Required for kind: work.
          Each item links a verifiable condition to the role(s) that confirm it
          and the primary review viewpoint (vp-*) from pm-review-viewpoints.yaml.
        items:
          $ref: "#/$defs/CriteriaItem"

      note:
        type: string
        description: >
          Optional free-form note for this entry. Use for constraints or explanations
          not represented by other structured fields.

      min_size:
        type: string
        enum: ["small", "medium", "large"]
        description: "Minimum project size to include this deliverable. Template-only field; removed by scaffold."

    if:
      properties:
        kind:
          const: "work"
      required:
        - kind
    then:
      required:
        - path
        - done_criteria

  StrictDeliverableItem:
    type: object
    description: >
      Additional kebab-case constraints applied to every deliverable in project documents.
      Combined with DeliverableItem via allOf semantics — the stricter pattern wins.
    properties:
      local_id:
        type: string
        pattern: "^[a-z0-9][a-z0-9-]*$"
      depends_on:
        type: array
        items:
          type: string
          pattern: "^[a-z0-9][a-z0-9-]*$"
