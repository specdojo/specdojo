# dct.schema.yaml
$schema: "https://json-schema.org/draft/2020-12/schema"
title: "SpecDojo Deliverables Catalog YAML schema"
description: >
  Schema for domain-scoped deliverables catalog files: dct-<domain>.yaml.
  Deliverables are organized into groups that correspond to the chapter
  structure of the Markdown catalog (配置先 per section). For kind: work
  items, path and done_criteria are required, making this schema a unified
  replacement for the separate Markdown catalog and WBS YAML files.
type: object
additionalProperties: false

required:
  - id
  - type
  - status
  - project_id
  - domain
  - groups

properties:
  id:
    type: string
    pattern: "^[a-z0-9][a-z0-9-:]*$"
    description: "Document metadata ID (e.g., prj-0001:dct-project-definition)."

  type:
    type: string
    const: "project"
    description: "Document type. Must be 'project'."

  status:
    type: string
    enum: ["draft", "ready", "deprecated"]
    description: "Document status."

  part_of:
    type: array
    description: "Optional parent document IDs."
    items:
      $ref: "#/$defs/DocId"
    uniqueItems: true

  project_id:
    type: string
    pattern: "^prj-[0-9]{4,}$"
    description: "Project identifier (e.g., prj-0001)."

  domain:
    type: string
    pattern: "^[a-z0-9][a-z0-9-]{0,62}$"
    description: "Domain identifier matching the file name dct-<domain>.yaml."

  domain_code:
    type: string
    pattern: "^[A-Z]{2,8}$"
    description: "Optional short uppercase code for the domain (e.g., PJD, PJM)."

  base_path:
    type: string
    pattern: "^/[^\\s]+$"
    description: >
      Absolute repo-root path for this domain. Must start with "/".
      Example: "/docs/ja/projects/prj-0001/030-project-management".
      Convention (applies to all base_path and path fields in this schema):
        leading "/"  → absolute from repo root
        no leading "/" → relative, joined onto the nearest ancestor's resolved base_path.

  groups:
    type: array
    minItems: 1
    description: "Ordered list of groups, corresponding to Markdown catalog chapters."
    items:
      $ref: "#/$defs/Section"

$defs:
  DocId:
    type: string
    pattern: "^[a-z0-9][a-z0-9-:]*$"
    description: "Document ID (e.g., prj-0001:dct-index, prj-overview)."

  Section:
    type: object
    additionalProperties: false
    anyOf:
      - required: [deliverables]
      - required: [groups]
    properties:
      name:
        type: string
        minLength: 1
        description: "Section name corresponding to the Markdown chapter title (e.g., 管理計画, 組織体制)."

      base_path:
        type: string
        pattern: "^[^\\s]+$"
        description: >
          Directory for deliverables in this group. Corresponds to 配置先 in
          the Markdown catalog. Follow the leading-slash convention:
            leading "/" → absolute from repo root
            no leading "/" → relative, joined onto the nearest ancestor's resolved base_path.

      note:
        type: string
        description: "Optional note for this section (e.g., WBSへの落とし込み対象外)."

      groups:
        type: array
        minItems: 1
        description: "Nested child groups. Use to group subgroups (e.g., Markdown ### chapters under a ## chapter)."
        items:
          $ref: "#/$defs/Section"

      deliverables:
        type: array
        minItems: 1
        description: "Deliverable entries in this section. Leaf groups have deliverables; parent groups have groups instead."
        items:
          $ref: "#/$defs/DeliverableItem"

  DeliverableItem:
    type: object
    additionalProperties: false
    required:
      - local_id
      - name
      - kind
      - overview
    properties:
      local_id:
        type: string
        pattern: "^[a-z0-9][a-z0-9-]*$"
        description: >
          Deliverable logical name. Lowercase alphanumeric and hyphens only.
          Template patterns with angle brackets (e.g., pjr-<NNNN>-<term>) are
          not validated by this schema; use the note field to document them.

      artifact_code:
        type: string
        pattern: "^[A-Z][A-Z0-9]{1,11}$"
        description: "Optional short uppercase code for the deliverable (e.g., OVERVIEW, PLAN)."

      name:
        type: string
        minLength: 1
        description: "Human-readable deliverable name."

      kind:
        type: string
        enum: ["work", "control", "generated"]
        description: "Deliverable kind. Only 'work' items are catalog+WBS targets."

      depends_on:
        type: array
        description: "local_ids of deliverables this one logically depends on."
        items:
          type: string
          minLength: 1
        uniqueItems: true

      overview:
        type: string
        minLength: 1
        description: "One-sentence description of the deliverable's purpose."

      path:
        type: string
        pattern: "^[^\\s]+$"
        description: >
          File path for this deliverable. Required for kind: work.
          Follow the leading-slash convention:
            leading "/" → absolute from repo root
            no leading "/" → relative, joined onto the nearest ancestor group's resolved base_path.

      done_criteria:
        type: array
        minItems: 1
        description: >
          Completion criteria for this deliverable. Required for kind: work.
          Each item must be a reviewable condition, not a vague action verb.
        items:
          type: string
          minLength: 1

      note:
        type: string
        description: >
          Optional free-form note for this entry. Use to document template ID
          patterns for recurring deliverables (e.g., pjr-<NNNN>-<term>).

    if:
      properties:
        kind:
          const: "work"
      required:
        - kind
    then:
      required:
        - path
        - done_criteria
