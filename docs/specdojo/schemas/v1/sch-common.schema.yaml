# sch-common.schema.yaml
$schema: "https://json-schema.org/draft/2020-12/schema"
title: "SpecDojo Schedule common definitions"

$defs:
  Owner:
    type: string
    description: "Task owner Role code. Must exist in pm-roles.yaml (e.g., PO, PM, BA, ARC, DEV, QE, UX, OPS)."
    pattern: "^[A-Z]{2,4}$"

  Id:
    type: string
    minLength: 1
    description: >
      Globally unique identifier across all schedule files in the project.
      Recommended examples:
        - T-AUTH-API-010
        - M-RELEASE-010
    pattern: "^[A-Za-z0-9][A-Za-z0-9_-]{1,63}$"

  Date:
    type: string
    format: date
    description: "ISO date (YYYY-MM-DD)."

  Weekday:
    type: string
    enum: [ "Mon", "Tue", "Wed", "Thu", "Fri", "Sat", "Sun" ]

  Track:
    type: string
    description: "Stable schedule management track identifier."
    pattern: "^[a-z0-9][a-z0-9-]{0,62}$"

  Domain:
    type: string
    description: "Stable ownership boundary."
    pattern: "^[a-z0-9][a-z0-9-]{0,62}$"

  Container:
    type: string
    description: "Sub-scope inside a domain. Use a stable slug."
    pattern: "^[a-z0-9][a-z0-9-]{0,62}$"

  AgentMode:
    type: string
    description: "Task execution mode. auto=agent executes via pm-members.yaml role lookup; manual=human execution required."
    enum: [ "auto", "manual" ]

  Calendar:
    type: object
    additionalProperties: false
    required:
      - timezone
      - workdays
    properties:
      timezone:
        type: string
        minLength: 1
        description: "IANA timezone name (e.g., Asia/Tokyo)."
      work_hours_per_day:
        type: number
        exclusiveMinimum: 0
        maximum: 24
        description: "Working hours represented by one schedule day."
      workdays:
        type: array
        minItems: 1
        uniqueItems: true
        description: "Working weekdays."
        items:
          $ref: "#/$defs/Weekday"
      holidays:
        type: array
        description: "Optional holiday dates excluded from workdays."
        items:
          $ref: "#/$defs/Date"

  CalendarOverride:
    type: object
    additionalProperties: false
    properties:
      timezone:
        type: string
        minLength: 1
        description: "Optional timezone override."
      work_hours_per_day:
        type: number
        exclusiveMinimum: 0
        maximum: 24
        description: "Optional working-hours-per-day override."
      workdays:
        type: array
        minItems: 1
        uniqueItems: true
        description: "Optional workday override."
        items:
          $ref: "#/$defs/Weekday"
      holidays:
        type: array
        description: "Optional additional holiday dates."
        items:
          $ref: "#/$defs/Date"

  DefaultsCalendar:
    type: object
    additionalProperties: false
    required:
      - timezone
      - work_hours_per_day
      - workdays
    properties:
      timezone:
        type: string
        minLength: 1
        description: "IANA timezone name (e.g., Asia/Tokyo)."
      work_hours_per_day:
        type: number
        exclusiveMinimum: 0
        maximum: 24
        description: "Working hours represented by one schedule day."
      workdays:
        type: array
        minItems: 1
        uniqueItems: true
        description: "Working weekdays."
        items:
          $ref: "#/$defs/Weekday"
      holidays:
        type: array
        description: "Optional holiday dates excluded from workdays."
        items:
          $ref: "#/$defs/Date"

  Settings:
    type: object
    additionalProperties: false
    required:
      - start_date
    properties:
      start_date:
        $ref: "#/$defs/Date"
      finish_milestone_id:
        $ref: "#/$defs/Id"
      notes:
        type: string
        description: "Optional schedule-wide notes."

  SettingsOverride:
    type: object
    additionalProperties: false
    properties:
      start_date:
        $ref: "#/$defs/Date"
      finish_milestone_id:
        $ref: "#/$defs/Id"
      notes:
        type: string
        description: "Optional schedule-wide notes."

  DefaultsSettings:
    type: object
    additionalProperties: false
    required:
      - start_date
    properties:
      start_date:
        $ref: "#/$defs/Date"
      notes:
        type: string

  DependencyIds:
    type: array
    description: >
      List of predecessor IDs. These IDs may refer to tasks or milestones in any
      schedule file. The merged graph is validated by tooling.
    items:
      $ref: "#/$defs/Id"
    uniqueItems: true

  Task:
    type: object
    additionalProperties: false
    required:
      - id
      - name
      - duration_days
      - depends_on
      - owner
    properties:
      id:
        $ref: "#/$defs/Id"
      name:
        type: string
        minLength: 1
        description: "Task name."
      duration_days:
        type: number
        exclusiveMinimum: 0
        description: >
          Task duration in working days. Fractional values are allowed (e.g.,
          0.125, 0.25, 0.5, 1.0). Use milestones instead of 0-day tasks.
      depends_on:
        $ref: "#/$defs/DependencyIds"
      owner:
        $ref: "#/$defs/Owner"
      agent_mode:
        $ref: "#/$defs/AgentMode"
      tags:
        type: array
        description: "Optional tags for filtering/grouping."
        items:
          type: string
          minLength: 1
        uniqueItems: true
      notes:
        type: string
        description: "Optional free-form notes. Keep concise."

  Milestone:
    type: object
    additionalProperties: false
    required:
      - id
      - name
      - depends_on
    properties:
      id:
        $ref: "#/$defs/Id"
      name:
        type: string
        minLength: 1
        description: "Milestone name."
      depends_on:
        $ref: "#/$defs/DependencyIds"
      owner:
        $ref: "#/$defs/Owner"
      date_hint:
        $ref: "#/$defs/Date"
      tags:
        type: array
        items:
          type: string
          minLength: 1
        uniqueItems: true
      notes:
        type: string
        description: "Optional notes."

