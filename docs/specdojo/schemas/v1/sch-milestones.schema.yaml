# sch-milestones.schema.yaml
$schema: "https://json-schema.org/draft/2020-12/schema"
title: "SpecDojo Schedule milestones schema"
type: object
additionalProperties: false

required:
  - kind
  - id
  - type
  - status
  - title
  - rulebook
  - version
  - project_id
  - settings
  - milestones

properties:
  kind:
    const: "milestones"
  id:
    type: string
    minLength: 1
    description: "Deliverable ID (e.g., prj-0001:sch-milestones)."
  type:
    const: "project"
  status:
    type: string
    enum: ["draft", "ready", "deprecated"]
  title:
    type: string
    minLength: 1
    description: "Document title. Equivalent to the Markdown H1; used as the heading of the generated display page."
  rulebook:
    type: string
    pattern: "^([a-z0-9][a-z0-9-]*-rulebook|none)$"
    description: "Rulebook ID this document conforms to. Use none only when no rulebook exists."
  version:
    type: integer
    minimum: 1
    description: "Schema/data version."
  project_id:
    type: string
    minLength: 1
    description: "Project identifier (e.g., prj-0001)."
  calendar:
    $ref: "./sch-common.schema.yaml#/$defs/CalendarOverride"
  settings:
    $ref: "./sch-common.schema.yaml#/$defs/SettingsOverride"
  notes:
    type: string
    description: "Optional file-level notes."
  tasks:
    type: array
    description: "Optional coarse summary tasks."
    items:
      $ref: "./sch-common.schema.yaml#/$defs/Task"
  milestones:
    type: array
    minItems: 1
    description: "Project-wide milestones."
    items:
      $ref: "./sch-common.schema.yaml#/$defs/Milestone"
