# exec-defaults.schema.yaml
$schema: "https://json-schema.org/draft/2020-12/schema"
title: "SpecDojo Exec Defaults schema"
description: >
  Defines global defaults for specdojo exec run.
  Agent selection requirements are declared on sch-strategy phases; this file only
  contains runtime defaults shared across tracks, such as agent launch command templates,
  rate-limit detection, and retry policy.
  Detection signals, exit codes, and wait times differ per agent runtime provider, so the
  top-level rate_limit_detection / rate_limit_policy act as global defaults and providers.<name>
  supplies per-provider overrides keyed by pm-members[].provider. Launch command templates
  are provider-specific and have no global default.
type: object
additionalProperties: false

properties:
  rate_limit_detection:
    $ref: "#/$defs/RateLimitDetection"
    description: >
      Global default signals used to detect agent rate-limit / transient failures.
      Used for members whose provider has no override under providers.<name>.

  rate_limit_policy:
    $ref: "#/$defs/RateLimitPolicy"
    description: >
      Global default behavior when an agent hits a rate limit during exec run.
      Used for members whose provider has no override under providers.<name>.

  providers:
    type: object
    description: >
      Per-provider overrides of rate_limit_detection and rate_limit_policy. The key
      matches pm-members[].provider (the agent runtime that executes the member command).
      For a given member, exec run resolves detection and policy from its provider override
      when present, otherwise from the top-level (global) values. This keeps provider-specific
      signals (e.g. opencode load wait / timeout, claude overloaded, copilot quota) from
      leaking across providers.
    propertyNames:
      enum: ["opencode", "claude", "codex", "copilot", "custom"]
    additionalProperties:
      $ref: "#/$defs/ProviderOverride"

$defs:
  ProviderOverride:
    type: object
    additionalProperties: false
    minProperties: 1
    description: >
      Provider-scoped override. Each present key fully replaces the matching top-level
      (global) value for members of this provider; absent keys fall back to the global value.
      command_template / command_params have no global counterpart.
    properties:
      command_template:
        type: string
        minLength: 1
        description: >
          Non-interactive launch command template for this provider's agents. Built-in
          placeholders {nickname}, {mode}, and {proficiency} expand to the member's
          attributes; additional placeholders are resolved from command_params. A member
          whose provider has no command_template and who has no command override is not
          an exec run --auto candidate. Unresolved placeholders after expansion are a
          validation error. Must not contain credentials or machine-local paths.
      command_params:
        $ref: "#/$defs/CommandParams"
        description: >
          Extra template variables resolved by member attributes. Keys appearing in both
          by_mode and by_proficiency are a validation error.
      rate_limit_detection:
        $ref: "#/$defs/RateLimitDetection"
        description: "Provider-specific failure signals. Prefer stderr_patterns over generic exit_codes."
      rate_limit_policy:
        $ref: "#/$defs/RateLimitPolicy"
        description: "Provider-specific retry / fallback / block policy."
      max_concurrency:
        type: integer
        minimum: 1
        description: >
          Maximum number of this provider's agents allowed to run concurrently within a single
          exec run round. Caps a provider that shares a constrained resource (e.g. opencode's
          local single-model Ollama host) without lowering the global --parallel for other
          providers. When a round would exceed this, the extra tasks are deferred to a later
          round. Absent means no per-provider limit.

  CommandParams:
    type: object
    additionalProperties: false
    minProperties: 1
    description: >
      Template variable tables resolved by member attributes. Each table maps an
      attribute value (member mode or proficiency) to a set of placeholder name /
      value pairs used to expand command_template.
    properties:
      by_mode:
        type: object
        minProperties: 1
        description: "Variables selected by the member's mode."
        propertyNames:
          enum: ["edit", "review"]
        additionalProperties:
          $ref: "#/$defs/CommandVariableSet"
      by_proficiency:
        type: object
        minProperties: 1
        description: "Variables selected by the member's proficiency."
        propertyNames:
          enum: ["low", "normal", "high", "expert"]
        additionalProperties:
          $ref: "#/$defs/CommandVariableSet"

  CommandVariableSet:
    type: object
    minProperties: 1
    description: "Placeholder name to value pairs. Values are inserted into command_template as-is."
    propertyNames:
      pattern: "^[a-z][a-z0-9_]*$"
    additionalProperties:
      type: string
      minLength: 1

  RateLimitDetection:
    type: object
    additionalProperties: false
    description: "Exit codes and stderr patterns that identify rate-limit / transient failures."
    properties:
      exit_codes:
        type: array
        uniqueItems: true
        description: >
          Exit codes treated as a rate-limit / transient signal. Avoid generic codes such as 1:
          most agent CLIs also use exit 1 for ordinary failure and for the agent's own block
          signal, so a bare exit 1 cannot be distinguished from a rate limit. Prefer stderr_patterns,
          or set provider-specific codes under providers.<name>.
        items:
          type: integer
      stderr_patterns:
        type: array
        uniqueItems: true
        items:
          type: string
          minLength: 1
      stderr_requires_nonzero_exit:
        type: boolean
        description: >
          Optional. When true (the default), stderr_patterns only count as a rate-limit
          signal if the agent process also exited non-zero. This avoids false positives
          where a successful run echoes a pattern phrase (e.g. an agent editing a file that
          contains the literal text "rate limit"). Set to false to match regardless of exit code.

  RateLimitPolicy:
    type: object
    additionalProperties: false
    required:
      - on_non_critical
      - on_critical
    description: "Behavior when an agent returns a rate-limit signal during exec run."
    properties:
      on_non_critical:
        type: object
        additionalProperties: false
        required:
          - action
        description: "Behavior for non-critical tasks (cpm.slack > 0)."
        properties:
          action:
            const: "skip"
            description: "Record a block event and move to the next task."
      on_critical:
        type: object
        additionalProperties: false
        required:
          - action
        description: "Behavior for critical-path tasks (cpm.slack == 0)."
        properties:
          action:
            type: string
            enum: ["try_next", "block"]
            description: >
              try_next: retry with the next agent candidate.
              block: immediately record a block event without retrying.
          retry:
            $ref: "#/$defs/RetryPolicy"
            description: "Retry configuration. Required when action is try_next."
          on_exhausted:
            type: string
            enum: ["block"]
            description: >
              Action when all agent candidates are exhausted after max_attempts.
              block: record a block event and surface the failure to the human.

  RetryPolicy:
    type: object
    additionalProperties: false
    required:
      - max_attempts
      - initial_wait_seconds
      - backoff_multiplier
      - max_wait_seconds
    description: "Exponential backoff configuration for rate-limit retries."
    properties:
      max_attempts:
        type: integer
        minimum: 1
        description: "Total number of attempts including the initial one and all retries."
      initial_wait_seconds:
        type: number
        exclusiveMinimum: 0
        description: "Wait time in seconds before the first retry."
      backoff_multiplier:
        type: number
        exclusiveMinimum: 1
        description: >
          Multiplier applied to wait time after each failed attempt.
          Example: initial=60, multiplier=3 -> 60s -> 180s -> 540s.
      max_wait_seconds:
        type: number
        exclusiveMinimum: 0
        description: "Upper bound for the wait time between retries."
