# exec-defaults.schema.yaml
$schema: "https://json-schema.org/draft/2020-12/schema"
title: "SpecDojo Exec Defaults schema"
description: >
  Defines global defaults for specdojo exec run.
  Agent selection requirements are declared on sch-strategy phases; this file only
  contains runtime defaults shared across tracks, such as rate-limit detection and retry policy.
  Detection signals, exit codes, and wait times differ per agent runtime provider, so the
  top-level rate_limit_detection / rate_limit_policy act as global defaults and providers.<name>
  supplies per-provider overrides keyed by pm-members[].provider.
type: object
additionalProperties: false

properties:
  rate_limit_detection:
    $ref: "#/$defs/RateLimitDetection"
    description: >
      Global default signals used to detect agent rate-limit / transient failures.
      Used for members whose provider has no override under providers.<name>.

  rate_limit_policy:
    $ref: "#/$defs/RateLimitPolicy"
    description: >
      Global default behavior when an agent hits a rate limit during exec run.
      Used for members whose provider has no override under providers.<name>.

  providers:
    type: object
    description: >
      Per-provider overrides of rate_limit_detection and rate_limit_policy. The key
      matches pm-members[].provider (the agent runtime that executes the member command).
      For a given member, exec run resolves detection and policy from its provider override
      when present, otherwise from the top-level (global) values. This keeps provider-specific
      signals (e.g. opencode load wait / timeout, claude overloaded, copilot quota) from
      leaking across providers.
    propertyNames:
      enum: ["opencode", "claude", "codex", "copilot", "custom"]
    additionalProperties:
      $ref: "#/$defs/ProviderOverride"

$defs:
  ProviderOverride:
    type: object
    additionalProperties: false
    minProperties: 1
    description: >
      Provider-scoped override. Each present key fully replaces the matching top-level
      (global) value for members of this provider; absent keys fall back to the global value.
    properties:
      rate_limit_detection:
        $ref: "#/$defs/RateLimitDetection"
        description: "Provider-specific failure signals. Prefer stderr_patterns over generic exit_codes."
      rate_limit_policy:
        $ref: "#/$defs/RateLimitPolicy"
        description: "Provider-specific retry / fallback / block policy."

  RateLimitDetection:
    type: object
    additionalProperties: false
    description: "Exit codes and stderr patterns that identify rate-limit / transient failures."
    properties:
      exit_codes:
        type: array
        uniqueItems: true
        description: >
          Exit codes treated as a rate-limit / transient signal. Avoid generic codes such as 1:
          most agent CLIs also use exit 1 for ordinary failure and for the agent's own block
          signal, so a bare exit 1 cannot be distinguished from a rate limit. Prefer stderr_patterns,
          or set provider-specific codes under providers.<name>.
        items:
          type: integer
      stderr_patterns:
        type: array
        uniqueItems: true
        items:
          type: string
          minLength: 1
      stderr_requires_nonzero_exit:
        type: boolean
        description: >
          Optional. When true (the default), stderr_patterns only count as a rate-limit
          signal if the agent process also exited non-zero. This avoids false positives
          where a successful run echoes a pattern phrase (e.g. an agent editing a file that
          contains the literal text "rate limit"). Set to false to match regardless of exit code.

  RateLimitPolicy:
    type: object
    additionalProperties: false
    required:
      - on_non_critical
      - on_critical
    description: "Behavior when an agent returns a rate-limit signal during exec run."
    properties:
      on_non_critical:
        type: object
        additionalProperties: false
        required:
          - action
        description: "Behavior for non-critical tasks (cpm.slack > 0)."
        properties:
          action:
            const: "skip"
            description: "Record a block event and move to the next task."
      on_critical:
        type: object
        additionalProperties: false
        required:
          - action
        description: "Behavior for critical-path tasks (cpm.slack == 0)."
        properties:
          action:
            type: string
            enum: ["try_next", "block"]
            description: >
              try_next: retry with the next agent candidate.
              block: immediately record a block event without retrying.
          retry:
            $ref: "#/$defs/RetryPolicy"
            description: "Retry configuration. Required when action is try_next."
          on_exhausted:
            type: string
            enum: ["block"]
            description: >
              Action when all agent candidates are exhausted after max_attempts.
              block: record a block event and surface the failure to the human.

  RetryPolicy:
    type: object
    additionalProperties: false
    required:
      - max_attempts
      - initial_wait_seconds
      - backoff_multiplier
      - max_wait_seconds
    description: "Exponential backoff configuration for rate-limit retries."
    properties:
      max_attempts:
        type: integer
        minimum: 1
        description: "Total number of attempts including the initial one and all retries."
      initial_wait_seconds:
        type: number
        exclusiveMinimum: 0
        description: "Wait time in seconds before the first retry."
      backoff_multiplier:
        type: number
        exclusiveMinimum: 1
        description: >
          Multiplier applied to wait time after each failed attempt.
          Example: initial=60, multiplier=3 -> 60s -> 180s -> 540s.
      max_wait_seconds:
        type: number
        exclusiveMinimum: 0
        description: "Upper bound for the wait time between retries."
