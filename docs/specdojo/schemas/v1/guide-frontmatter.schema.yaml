$schema: "https://json-schema.org/draft/2020-12/schema"
title: Guide Front Matter
# SpecDojo が所有する frontmatter は `specdojo:` 名前空間配下に置く。
type: object
required:
  - specdojo
properties:
  specdojo:
    type: object
    unevaluatedProperties: false
    allOf:
      - $ref: "./common-frontmatter.schema.yaml"
      - type: object
        properties:
          type:
            type: string
            enum:
              - guide
            description: "ドキュメント種別（guide）"
