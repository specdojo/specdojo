# pm-members.schema.yaml
$schema: "https://json-schema.org/draft/2020-12/schema"
title: "SpecDojo Project Member Roster schema"
type: object
$comment: >
  Schema for project member roster files:
  docs/ja/projects/<project_id>/030-project-management/020-organization/pm-members.yaml
  Manages the mapping from --by <nickname> (used in specdojo exec events) to
  display name, contact info, roles, and actor type. nickname is immutable once
  recorded in the event log.

additionalProperties: false

required:
  - id
  - type
  - status
  - version
  - project_id
  - members

properties:
  id:
    type: string
    pattern: "^[a-z0-9][a-z0-9-:]*$"
    description: "Document metadata ID (e.g., prj-0001:pm-members)."

  type:
    type: string
    const: project
    description: "Document type. Must be 'project'."

  status:
    type: string
    enum: [ draft, ready, deprecated ]
    description: "Document status."

  rulebook:
    type: string
    pattern: "^([a-z0-9][a-z0-9-]*-rulebook|none)$"
    description: "Optional rulebook ID. Use none only when no rulebook exists."

  based_on:
    type: array
    description: "Optional source document IDs."
    items:
      type: string
      pattern: "^[a-z0-9][a-z0-9-:]*$"
    uniqueItems: true

  supersedes:
    type: array
    description: "Optional superseded document IDs."
    items:
      type: string
      pattern: "^[a-z0-9][a-z0-9-:]*$"
    uniqueItems: true

  version:
    type: integer
    minimum: 1
    description: "Schema/data version."

  project_id:
    type: string
    minLength: 1
    description: "Project identifier (e.g., prj-0001)."

  members:
    type: array
    minItems: 1
    description: "List of project members (human or agent)."
    items:
      $ref: "#/$defs/Member"
    uniqueItems: true

  rules:
    type: array
    description: "Optional operational rules for using this member roster."
    items:
      type: string
      minLength: 1
    uniqueItems: true

$defs:
  RoleLabel:
    type: string
    description: "Role code. Must exist in pm-roles.yaml (e.g., PO, PM, BA, ARC, DEV, QE, UX, OPS)."
    pattern: "^[A-Z]{2,4}$"

  Member:
    type: object
    additionalProperties: false
    required:
      - nickname
      - display_name
      - type
    properties:
      nickname:
        type: string
        description: >
          Immutable identifier used in `specdojo exec --by <nickname>`. Once
          recorded in the event log, this value must not change.
        pattern: "^[a-z0-9][a-z0-9_-]{0,62}$"
        minLength: 1

      display_name:
        type: string
        description: "Human-readable name (person's name or agent display name)."
        minLength: 1

      email:
        description: "Contact email address. Use null for agents or when not applicable."
        oneOf:
          - type: string
            format: email
          - type: "null"

      roles:
        type: array
        description: "Role codes this member corresponds to. Use empty array for cross-role (general-purpose) agents."
        items:
          $ref: "#/$defs/RoleLabel"
        uniqueItems: true

      type:
        type: string
        description: "Actor type: human for a person, agent for an automated agent
          (e.g., GitHub Copilot)."
        enum: [ "human", "agent" ]

      persona:
        type: string
        minLength: 1
        description: "Optional working persona label used to describe the member's style
          (e.g., value-first, analysis-first, risk-averse)."

      focus:
        type: array
        description: "Optional list of emphasis areas used to steer the member's
          execution or review perspective."
        items:
          type: string
          minLength: 1
        uniqueItems: true

      capabilities:
        type: array
        description: >
          Capabilities this agent can perform. Required for type: agent.
          See exec-common.schema.yaml for core values (exec, review, web_search).
        items:
          $ref: "./exec-common.schema.yaml#/$defs/Capability"
        uniqueItems: true

      proficiency:
        $ref: "./exec-common.schema.yaml#/$defs/Proficiency"
        description: >
          Agent proficiency level. Used by exec-strategy assignment_rules to filter
          agents by quality tier. Required for type: agent.

      priority:
        type: integer
        minimum: 1
        description: >
          Tiebreaker priority within agents that share the same proficiency and
          have equal extra-capabilities count. Lower value = tried first.
          Required for type: agent.

      command:
        type: string
        minLength: 1
        description: >
          Shell command invoked by specdojo exec run for this agent.
          The agent brief is appended as the final argument.
          Required for type: agent.

      default_mode:
        type: string
        enum: ["exec", "review"]
        description: >
          Fallback task mode used when the phase in sch-strategy has no explicit mode
          and exec-strategy assignment_rules do not filter by mode.
          Optional. Typically set for review-only agents.

      scheduler_strategy:
        type: string
        description: "Optional default scheduler strategy used when this member runs
          `specdojo exec scheduler` without `--strategy`."
        enum: [ "critical-first", "dependency-first", "fifo", "manual" ]

      note:
        type: string
        description: "Optional free-text note (e.g., availability, timezone,
          responsibilities)."
