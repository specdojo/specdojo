# sch-default.schema.yaml
$schema: "https://json-schema.org/draft/2020-12/schema"
title: "SpecDojo Schedule defaults schema"
type: object
additionalProperties: false

required:
  - kind
  - id
  - type
  - status
  - title
  - rulebook
  - version
  - calendar
  - settings

properties:
  kind:
    const: "defaults"
  id:
    type: string
    minLength: 1
    description: "Deliverable ID (e.g., prj-0001:sch-defaults)."
  type:
    const: "project"
  status:
    type: string
    enum: ["draft", "ready", "deprecated"]
  title:
    type: string
    minLength: 1
    description: "Document title. Equivalent to the Markdown H1; used as the heading of the generated display page."
  rulebook:
    type: string
    pattern: "^([a-z0-9][a-z0-9-]*-rulebook|none)$"
    description: "Rulebook ID this document conforms to. Use none only when no rulebook exists."
  version:
    type: integer
    minimum: 1
    description: "Schema/data version."
  calendar:
    $ref: "./sch-common.schema.yaml#/$defs/DefaultsCalendar"
  settings:
    $ref: "./sch-common.schema.yaml#/$defs/DefaultsSettings"
  notes:
    type: string
    description: "Optional file-level notes."
