# sch-track.schema.yaml
$schema: "https://json-schema.org/draft/2020-12/schema"
title: "SpecDojo Schedule track schema"
type: object
additionalProperties: false

required:
  - kind
  - version
  - project_id
  - track
  - settings

properties:
  kind:
    const: "track"
  version:
    type: integer
    minimum: 1
    description: "Schema/data version."
  project_id:
    type: string
    minLength: 1
    description: "Project identifier (e.g., prj-0001)."
  track:
    $ref: "./sch-common.schema.yaml#/$defs/Track"
  domain:
    $ref: "./sch-common.schema.yaml#/$defs/Domain"
  container:
    $ref: "./sch-common.schema.yaml#/$defs/Container"
  calendar:
    $ref: "./sch-common.schema.yaml#/$defs/CalendarOverride"
  settings:
    $ref: "./sch-common.schema.yaml#/$defs/SettingsOverride"
  notes:
    type: string
    description: "Optional file-level notes."
  tasks:
    type: array
    minItems: 1
    description: "Scheduled tasks (duration-based)."
    items:
      $ref: "./sch-common.schema.yaml#/$defs/Task"
  milestones:
    type: array
    description: "Track-level milestones (duration=0) representing gates/approvals."
    items:
      $ref: "./sch-common.schema.yaml#/$defs/Milestone"
