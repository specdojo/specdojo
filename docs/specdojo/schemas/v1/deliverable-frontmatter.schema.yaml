$schema: "https://json-schema.org/draft/2020-12/schema"
title: Deliverables Front Matter
type: object
unevaluatedProperties: false
allOf:
  - $ref: "./common-frontmatter.schema.yaml"
  - type: object
    required:
      - rulebook
    properties:
      type:
        type: string
        enum:
          # SpecDojo基盤文書
          - rulebook # 記述規約
          - instruction # 生成AI指示テンプレート
          - template # 文書テンプレート（雛形）
          - standard # 共通標準・規約
          - guide # ガイドライン
          - sample # 記述例
          # プロジェクト文書
          - project # プロジェクト文書全般
          # プロダクト仕様文書
          - flow # 業務フロー・プロセス仕様
          - rule # 業務ルール仕様
          - data # データ仕様
          - ui # 画面・帳票仕様
          - api # API・外部I/F仕様
          - architecture # アーキテクチャ設計
          - test # テスト仕様・設計
          - operations # 運用設計・手順
        description: "仕様の種別"
      rulebook:
        $ref: "./common-frontmatter.schema.yaml#/$defs/rulebookRef"
        description: "準拠する rulebook の ID。該当がない場合は none。"
