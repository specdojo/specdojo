# wbs.schema.yaml
$schema: "https://json-schema.org/draft/2020-12/schema"
title: "SpecDojo WBS schema"
type: object
$comment: >
  Schema for domain-scoped WBS SSOT files:
  docs/ja/projects/<project_id>/030-project-management/030-wbs/wbs-<domain>.yaml.
  WBS is the scope baseline: deliverable IDs, file-level deliverable paths, and
  done criteria. One deliverable maps to exactly one WBS item (1:1).
  Schedule fields such as action, dates, assignees, and execution status are
  intentionally excluded. Deliverables catalog defines logical deliverables and
  domain-level placement. WBS defines the file-level path for the single
  deliverable completed by each WBS item. Schedule turns WBS items into
  executable tasks.

additionalProperties: false

required:
  - id
  - type
  - status
  - project_id
  - domain
  - wbs

properties:
  id:
    type: string
    minLength: 1
    description: "Document metadata ID. Required."
    pattern: "^[a-z0-9][a-z0-9-:]*$"

  type:
    type: string
    description: "Document metadata type. Must be 'wbs'. Required."
    enum: [ "wbs" ]

  status:
    type: string
    description: "Document metadata status. Required."
    enum: [ "draft", "ready", "deprecated" ]

  part_of:
    type: array
    description: "Optional parent document IDs."
    items:
      $ref: "#/$defs/DocId"
    uniqueItems: true

  based_on:
    type: array
    description: "Optional basis document IDs."
    items:
      $ref: "#/$defs/DocId"
    uniqueItems: true

  supersedes:
    type: array
    description: "Optional superseded document IDs."
    items:
      $ref: "#/$defs/DocId"
    uniqueItems: true

  project_id:
    type: string
    minLength: 1
    description: "Project identifier, e.g. prj-0001."
    pattern: "^prj-[0-9]{4,}$"

  domain:
    type: string
    minLength: 1
    description: >
      Stable domain boundary used in the file name wbs-<domain>.yaml,
      e.g. project-management, project-definition, requirements.
    pattern: "^[a-z0-9][a-z0-9-]{0,62}$"

  assigned_team:
    type: string
    description: >
      Optional current team or organization label responsible for this domain.
      This may change over time. Keep it for readability/reporting only; do not
      use it as a stable key.
    pattern: "^[^\\s].{0,127}$"

  wbs:
    type: array
    minItems: 1
    description: "List of leaf-level WBS items under this domain."
    items:
      $ref: "#/$defs/WbsItem"

$defs:
  DocId:
    type: string
    minLength: 1
    description: >
      Document ID. Project documents may use namespaced IDs such as
      prj-0001:prj-overview. Local project references such as prj-overview are
      also allowed where the project context is known.
    pattern: "^[a-z0-9][a-z0-9-:]*$"

  Deliverable:
    type: object
    additionalProperties: false
    required:
      - id
      - path
    properties:
      id:
        $ref: "#/$defs/DocId"
        description: >
          SpecDojo deliverable ID. This identifies the deliverable within
          SpecDojo. If the deliverable file can carry compatible metadata, this
          should resolve to the same identity as the file metadata ID. If not,
          this ID and path mapping is authoritative in WBS.
      path:
        type: string
        minLength: 1
        description: >
          Repository path to the deliverable file completed by this WBS item.
          This is the file-level path used for creation, validation, and
          execution.
        pattern: "^(.+/)?[^\\s]+$"
      native_id:
        type: string
        minLength: 1
        description: >
          Optional ID, key, URI, or identifier already defined by the
          deliverable itself or by an external tool/specification. This is not
          the SpecDojo deliverable ID.
      note:
        type: string
        description: "Optional note about the deliverable."

  RefId:
    type: string
    minLength: 1
    description: >
      Cross-reference identifier to acceptance criteria, specifications, tests,
      decisions, etc. Examples: BAC-AUTH-010, SAC-AUTH-020, DEC-0007.
    pattern: "^[A-Z][A-Z0-9-]{1,127}$"

  WbsItem:
    type: object
    additionalProperties: false
    required:
      - id
      - name
      - deliverable
      - done_criteria
    properties:
      id:
        type: string
        minLength: 1
        description: >
          Unique WBS item ID within the project. Format: WBS-<DOMAIN>-<ARTIFACT>.
          No trailing sequence number. e.g. WBS-PJM-PLAN, WBS-PJD-OVERVIEW.
        pattern: "^WBS-[A-Z0-9]+-[A-Z0-9-]+$"

      name:
        type: string
        minLength: 1
        description: >
          Leaf-level WBS item name. Prefer noun-led names that express the
          completed deliverable or scope completion unit.

      description:
        type: string
        minLength: 1
        description: >
          Optional scope description for this WBS item. Use for concise
          explanation of what is in scope for this item. Do not duplicate done
          criteria or free-form notes.

      component:
        type: string
        description: >
          Optional stable sub-area or component within the domain. Useful when
          deriving schedule files or grouping execution work, e.g. api, ui, db,
          batch.
        pattern: "^[a-z0-9][a-z0-9-]{0,62}$"

      depends_on:
        type: array
        description: >
          Optional list of deliverable IDs that must be complete before this
          item can begin. Because one deliverable maps to one WBS item (1:1),
          referencing the deliverable ID is equivalent to referencing the
          preceding WBS item. Captures logical deliverable precedence, not
          execution scheduling. Use only when a genuine input dependency
          exists; omit if items can proceed in parallel.
        items:
          $ref: "#/$defs/DocId"
        uniqueItems: true

      deliverable:
        $ref: "#/$defs/Deliverable"
        description: >
          Exactly one deliverable per WBS item (1:1 constraint). A WBS item is
          done when this deliverable file exists and satisfies the done_criteria.

      done_criteria:
        type: array
        minItems: 1
        description: >
          Completion criteria for this WBS item. Keep these scope-focused, not
          schedule-focused.
        items:
          type: string
          minLength: 1

      acceptance_refs:
        type: array
        description: >
          Optional references to formal acceptance criteria, specifications,
          tests, or decisions that ground the done criteria.
        items:
          $ref: "#/$defs/RefId"
        uniqueItems: true

      tags:
        type: array
        description: "Optional tags for filtering and grouping."
        items:
          type: string
          minLength: 1
        uniqueItems: true

      notes:
        type: string
        description: >
          Optional free-form notes. Keep concise and avoid duplicating SSOT
          content.
