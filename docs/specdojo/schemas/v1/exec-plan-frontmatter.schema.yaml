# exec-plan-frontmatter.schema.yaml
$schema: "https://json-schema.org/draft/2020-12/schema"
title: "SpecDojo Exec Plan frontmatter schema"
description: >
  Validates the YAML frontmatter of exec plan files (edit-plan and review-plan).
  Plan files are Markdown documents with YAML frontmatter generated by exec build.
  They reside at exec/plans/<task-id>-<mode>-plan.md under the execution path.
type: object
additionalProperties: true

required:
  - id
  - task_id
  - mode
  - status
  - project_id
  - generated_at

properties:
  id:
    type: string
    minLength: 1
    description: "Unique document ID. Format: xep-<task-id> (edit) or xrp-<task-id> (review)."

  task_id:
    type: string
    minLength: 1
    description: "Task ID this plan was generated for (e.g., T-LAUNCH-prj-overview-020)."

  mode:
    type: string
    enum: ["edit", "review"]
    description: "Work type. edit: deliverable creation/editing. review: deliverable review."

  status:
    type: string
    enum: ["ready"]
    description: "Plan readiness. Always 'ready' when generated by exec build."

  project_id:
    type: string
    minLength: 1
    description: "Project ID (e.g., prj-0001)."

  generated_at:
    type: string
    description: "ISO 8601 timestamp when this plan was generated by exec build."

  agent:
    type: string
    description: "Agent nickname assigned to this task. Set by exec run at claim time."

  viewpoints_ref:
    type: string
    description: "Path to pm-review-viewpoints.yaml. Present only when mode is review."
