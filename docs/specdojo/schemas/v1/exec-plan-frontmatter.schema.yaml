# exec-plan-frontmatter.schema.yaml
$schema: 'https://json-schema.org/draft/2020-12/schema'
title: 'SpecDojo Exec Plan frontmatter schema'
description: >
  Validates the YAML frontmatter of exec plan files (edit-plan and review-plan).
  Plan files are Markdown documents with YAML frontmatter generated by exec build.
  They reside at exec/plans/<task-id>-plan.md under the execution path.
type: object
additionalProperties: true

required:
  - id
  - type
  - task_id
  - mode
  - status
  - project_id

properties:
  id:
    type: string
    minLength: 1
    description: 'Unique document ID. Format: <project-id>:xep-<stem> (edit) or <project-id>:xrp-<stem> (review). For fixed-name plans the stem is the task id; for unique-named in-place plans it is <slug>-<UTC>-<rand>, shared with the tied result.'

  type:
    type: string
    const: 'exec-plan'
    description: "Document type. Always 'exec-plan'."

  task_id:
    $ref: './exec-common.schema.yaml#/$defs/TaskId'
    description: 'Task ID this plan was generated for.'

  name:
    type: string
    minLength: 1
    description: 'Human-readable task name carried from the schedule (e.g., 一次版レビュー).'

  mode:
    $ref: './exec-common.schema.yaml#/$defs/TaskMode'

  status:
    type: string
    enum: ['ready']
    description: "Plan readiness. Always 'ready' when generated by exec build."

  project_id:
    $ref: './exec-common.schema.yaml#/$defs/ProjectId'

  rulebook:
    type: string
    pattern: '^([a-z0-9][a-z0-9-]*-rulebook|none)$'
    description: "Rulebook ID for this document type. Use 'xep-rulebook' or 'none'."

  owner:
    type: string
    description: 'Owner role code (e.g., PM, BA, ARC). Carried from the schedule task.'

  on_critical_path:
    type: boolean
    description: 'True when the task has CPM slack=0. Omitted when not on the critical path.'

  agent:
    $ref: './exec-common.schema.yaml#/$defs/AgentNickname'
    description: 'Agent nickname assigned to this task. Set by exec run at claim time.'

  approach:
    $ref: './exec-common.schema.yaml#/$defs/Approach'
    description: >
      Carried from the phase or owner_rules[].phase_overrides definition in sch-strategy.
      Used for template selection and to convey work intent to the agent.
      Omitted when not declared for this phase.
