# exec-plan-frontmatter.schema.yaml
$schema: "https://json-schema.org/draft/2020-12/schema"
title: "SpecDojo Exec Plan frontmatter schema"
description: >
  Validates the YAML frontmatter of exec plan files (edit-plan and review-plan).
  Plan files are Markdown documents with YAML frontmatter generated by exec build.
  They reside at exec/plans/<task-id>-plan.md under the execution path.
type: object
additionalProperties: true

required:
  - id
  - type
  - task_id
  - mode
  - status
  - project_id

properties:
  id:
    type: string
    minLength: 1
    description: "Unique document ID. Format: xep-<task-id> (edit) or xrp-<task-id> (review)."

  type:
    type: string
    const: "exec-plan"
    description: "Document type. Always 'exec-plan'."

  task_id:
    type: string
    minLength: 1
    description: "Task ID this plan was generated for (e.g., T-LAUNCH-prj-overview-020)."

  name:
    type: string
    minLength: 1
    description: "Human-readable task name carried from the schedule (e.g., 一次版レビュー)."

  mode:
    type: string
    enum: ["edit", "review"]
    description: "Work type. edit: deliverable creation/editing. review: deliverable review."

  status:
    type: string
    enum: ["ready"]
    description: "Plan readiness. Always 'ready' when generated by exec build."

  project_id:
    type: string
    minLength: 1
    description: "Project ID (e.g., prj-0001)."

  rulebook:
    type: string
    pattern: "^([a-z0-9][a-z0-9-]*-rulebook|none)$"
    description: "Rulebook ID for this document type. Use 'xep-rulebook' or 'none'."

  owner:
    type: string
    description: "Owner role code (e.g., PM, BA, ARC). Carried from the schedule task."

  on_critical_path:
    type: boolean
    description: "True when the task has CPM slack=0. Omitted when not on the critical path."

  agent:
    type: string
    description: "Agent nickname assigned to this task. Set by exec run at claim time."

  approach_mode:
    type: string
    enum: ["fully-guided", "recipe-guided", "freeform"]
    description: >
      How strictly the agent should follow reference materials (rulebook/recipe/sample).
      Carried from the phase or owner_rules[].phase_overrides definition in sch-strategy.
      Used for template selection and to convey work intent to the agent.
      Omitted when not declared for this phase.

  task_kind:
    type: string
    enum: ["deliverable-edit", "deliverable-review", "reference-maintenance"]
    description: >
      The kind of work this task represents.
      Carried from the phase or owner_rules[].phase_overrides definition in sch-strategy.
      reference-maintenance tasks improve rulebook/recipe/sample based on deliverables.
      Omitted when not declared for this phase.

  viewpoints_ref:
    type: string
    description: "Path to pm-review-viewpoints.yaml. Present only when mode is review."
