# sch-strategy.schema.yaml
$schema: "https://json-schema.org/draft/2020-12/schema"
title: "SpecDojo Schedule strategy schema"
description: >
  Defines generation rules for sch-track-<track>.yaml.
  Used as input to the code generator; not a runtime schedule file.
type: object
additionalProperties: false

required:
  - kind
  - id
  - type
  - status
  - track
  - scope
  - phases
  - task_id_pattern
  - owner_rules

properties:
  kind:
    const: "strategy"
    description: "File kind identifier. Must be 'strategy'."

  id:
    type: string
    minLength: 1
    description: "Deliverable ID (e.g., prj-0001:sch-strategy-launch)."

  type:
    const: "project"

  status:
    type: string
    enum: ["draft", "ready", "deprecated"]

  track:
    $ref: "./sch-common.schema.yaml#/$defs/Track"

  scope:
    type: object
    additionalProperties: false
    required:
      - catalogs
      - include_kinds
    properties:
      catalogs:
        type: array
        minItems: 1
        description: "Target deliverables catalog files."
        items:
          type: object
          additionalProperties: false
          required:
            - id
            - path
          properties:
            id:
              type: string
              minLength: 1
              description: "Catalog document ID (e.g., prj-0001:dct-project-definition)."
            path:
              type: string
              pattern: "^/"
              description: "Absolute path to the catalog YAML file."
      include_kinds:
        type: array
        minItems: 1
        description: "Deliverable kinds to include in generation (typically [work])."
        items:
          type: string
          enum: ["work", "control", "generated"]

  phases:
    type: object
    description: >
      Phase definitions keyed by file format (e.g., markdown, yaml).
      The format key is matched against the deliverable path extension.
    minProperties: 1
    additionalProperties:
      type: array
      minItems: 1
      items:
        $ref: "#/$defs/Phase"

  task_id_pattern:
    type: string
    minLength: 1
    description: >
      Task ID generation pattern with placeholders.
      Available placeholders: {domain_code}, {artifact_code}, {phase_suffix}.
      Example: T-LAUNCH-{domain_code}-{artifact_code}-{phase_suffix}

  owner_rules:
    type: array
    minItems: 1
    description: "Mapping from deliverable local_id list to owner Role code."
    items:
      type: object
      additionalProperties: false
      required:
        - local_ids
        - owner
      properties:
        local_ids:
          type: array
          minItems: 1
          uniqueItems: true
          description: "Deliverable local_ids covered by this rule."
          items:
            type: string
            minLength: 1
        owner:
          $ref: "./sch-common.schema.yaml#/$defs/Owner"

  group_milestones:
    type: array
    description: >
      Per-domain/per-group milestones to upsert into sch-milestones.yaml.
      Each entry targets one top-level group within a catalog.
      Omit 'group' for catalogs with a single unnamed group.
      depends_on is auto-computed from leaf finalize tasks within the group.
    items:
      type: object
      additionalProperties: false
      required:
        - catalog_id
        - milestone
      properties:
        catalog_id:
          type: string
          minLength: 1
          description: "Catalog ID to scope (must match one of scope.catalogs[].id)."
        group:
          type: string
          minLength: 1
          description: "Top-level group name. Omit for unnamed/single groups."
        milestone:
          type: object
          additionalProperties: false
          required:
            - id
            - name
            - owner
          properties:
            id:
              type: string
              minLength: 1
              description: "Milestone ID (e.g., M-LAUNCH-PJD-900)."
            name:
              type: string
              minLength: 1
              description: "Milestone display name."
            owner:
              $ref: "./sch-common.schema.yaml#/$defs/Owner"
            date_hint:
              $ref: "./sch-common.schema.yaml#/$defs/Date"
            tags:
              type: array
              items:
                type: string
                minLength: 1
              uniqueItems: true

  settings:
    type: object
    additionalProperties: false
    description: "Track-level schedule settings. start_date overrides defaults.settings.default_start_date."
    properties:
      start_date:
        $ref: "./sch-common.schema.yaml#/$defs/Date"
        description: "Track start date. Overrides sch-defaults.yaml default_start_date when specified."
      notes:
        type: string

  cross_domain_dependencies:
    type: array
    description: >
      Supplementary cross-domain dependencies not present in catalog depends_on.
      dependent.draft task starts after requires.finalize task completes.
    items:
      type: object
      additionalProperties: false
      required:
        - dependent
        - requires
      properties:
        dependent:
          type: string
          minLength: 1
          description: "local_id of the dependent deliverable."
        requires:
          type: string
          minLength: 1
          description: "local_id of the prerequisite deliverable."
        note:
          type: string
          description: "Optional explanation."

$defs:
  Phase:
    type: object
    additionalProperties: false
    required:
      - id
      - name
      - task_suffix
      - duration_days
    properties:
      id:
        type: string
        minLength: 1
        description: "Phase identifier (e.g., draft, validate, review, finalize)."
      name:
        type: string
        minLength: 1
        description: "Phase display name."
      task_suffix:
        type: string
        pattern: "^[0-9]{3}$"
        description: "3-digit numeric suffix appended to the generated task ID."
      duration_days:
        type: number
        exclusiveMinimum: 0
        description: "Default task duration in working days for this phase."
