# sch-strategy.schema.yaml
$schema: "https://json-schema.org/draft/2020-12/schema"
title: "SpecDojo Schedule strategy schema"
description: >
  Defines generation rules for sch-track-<track>.yaml.
  Used as input to the code generator; not a runtime schedule file.
  phase_sets defines named groups of phases keyed by semantic name (e.g., first-pass, finalize-pass).
  Each owner_rule references a phase_set by name.
  Phase.mode (exec/review) is written into ready.json by exec build to drive brief generation.
  AI agent selection is NOT stored here; it belongs in exec-strategy-<track>.yaml,
  which maps (phase_set, phase.id) to required capabilities and proficiency.
type: object
additionalProperties: false

required:
  - kind
  - id
  - type
  - status
  - track
  - scope
  - phase_sets
  - owner_rules

properties:
  kind:
    const: "strategy"
    description: "File kind identifier. Must be 'strategy'."

  id:
    type: string
    minLength: 1
    description: "Deliverable ID (e.g., prj-0001:sch-strategy-launch)."

  type:
    const: "project"

  status:
    type: string
    enum: ["draft", "ready", "deprecated"]

  track:
    $ref: "./sch-common.schema.yaml#/$defs/Track"

  scope:
    type: object
    additionalProperties: false
    required:
      - catalogs
      - include_kinds
    properties:
      catalogs:
        type: array
        minItems: 1
        description: "Target deliverables catalog files."
        items:
          type: object
          additionalProperties: false
          required:
            - id
            - path
          properties:
            id:
              type: string
              minLength: 1
              description: "Catalog document ID (e.g., prj-0001:dct-project-definition)."
            path:
              type: string
              pattern: "^/"
              description: "Absolute path to the catalog YAML file."
      include_kinds:
        type: array
        minItems: 1
        description: "Deliverable kinds to include in generation (typically [work])."
        items:
          type: string
          enum: ["work", "control", "generated"]

  phase_sets:
    type: object
    description: >
      Named phase set definitions. Keys are arbitrary names (e.g., first-pass, finalize-pass).
      Each owner_rule references one of these keys via its phase_set field.
      exec build writes phase_mode from each phase into ready.json task metadata,
      allowing exec run --auto to evaluate exec-strategy assignment_rules at runtime.
    minProperties: 1
    additionalProperties:
      type: array
      minItems: 1
      items:
        $ref: "#/$defs/Phase"

  default_phase_set:
    type: string
    minLength: 1
    description: >
      Name of the fallback phase set used when an owner_rule does not specify phase_set.
      Must be a key defined in phase_sets. Required when any owner_rule omits phase_set.
      Use default_phase_sets (plural) instead when deliverables should run multiple phase sets in sequence.

  default_phase_sets:
    type: array
    minItems: 1
    description: >
      Ordered list of phase set names applied to deliverables whose owner_rule omits phase_sets (plural).
      Phases from each entry are concatenated in order to form the full task sequence.
      Takes precedence over default_phase_set when both are present.
      Each element must be a key defined in phase_sets.
    items:
      type: string
      minLength: 1

  owner_rules:
    type: array
    minItems: 1
    description: "Mapping from deliverable local_id list to owner role and phase set."
    items:
      type: object
      additionalProperties: false
      required:
        - local_ids
        - owner
      properties:
        local_ids:
          type: array
          minItems: 1
          uniqueItems: true
          description: "Deliverable local_ids covered by this rule."
          items:
            type: string
            minLength: 1
        owner:
          $ref: "./sch-common.schema.yaml#/$defs/Owner"
        phase_set:
          type: string
          minLength: 1
          description: >
            Name of a single phase set to apply to these deliverables.
            Must be a key defined in phase_sets.
            Falls back to default_phase_set when omitted.
            Use phase_sets (plural) instead when multiple phase sets should run in sequence.
        phase_sets:
          type: array
          minItems: 1
          description: >
            Ordered list of phase set names to apply to these deliverables in sequence.
            Overrides phase_set (singular) and default_phase_sets when present.
            Each element must be a key defined in phase_sets.
          items:
            type: string
            minLength: 1
        phase_overrides:
          type: array
          description: >
            Per-phase overrides for these deliverables.
            execution takes precedence over the execution field in phase_sets[phase_set][phase].
            ignore_references narrows which reference materials the agent should consult
            in this phase, regardless of whether rulebook/recipe/sample exist for the deliverable.
          items:
            type: object
            additionalProperties: false
            required:
              - phase
            properties:
              phase:
                type: string
                minLength: 1
                description: "Phase id to override (must exist in the referenced phase_set)."
              execution:
                $ref: "#/$defs/Execution"
              ignore_references:
                type: array
                minItems: 1
                uniqueItems: true
                description: >
                  Reference material types the agent should NOT consult in this phase,
                  even when they exist for the deliverable (e.g., a draft phase that should
                  proceed without being constrained by an as-yet-unrefined rulebook).
                  Omit when the agent should consult all available reference materials.
                items:
                  type: string
                  enum:
                    - rulebook
                    - recipe
                    - sample

  group_milestones:
    type: array
    description: >
      Per-domain/per-group milestones to upsert into sch-milestones.yaml.
      Each entry targets one top-level group within a catalog.
      Omit 'group' for catalogs with a single unnamed group.
      depends_on is auto-computed from leaf finalize tasks within the group.
    items:
      type: object
      additionalProperties: false
      required:
        - catalog_id
        - milestone
      properties:
        catalog_id:
          type: string
          minLength: 1
          description: "Catalog ID to scope (must match one of scope.catalogs[].id)."
        group:
          type: string
          minLength: 1
          description: "Top-level group name. Omit for unnamed/single groups."
        milestone:
          type: object
          additionalProperties: false
          required:
            - id
            - name
            - owner
          properties:
            id:
              type: string
              minLength: 1
              description: "Milestone ID (e.g., M-LAUNCH-PJD-900)."
            name:
              type: string
              minLength: 1
              description: "Milestone display name."
            artifact_name:
              type: string
              minLength: 1
              description: "Human-readable artifact/domain name displayed in timeline col2 (e.g., プロジェクト定義)."
            owner:
              $ref: "./sch-common.schema.yaml#/$defs/Owner"
            date_hint:
              $ref: "./sch-common.schema.yaml#/$defs/Date"
            tags:
              type: array
              items:
                type: string
                minLength: 1
              uniqueItems: true

  settings:
    type: object
    additionalProperties: false
    description: "Track-level schedule settings. start_date overrides defaults.settings.default_start_date."
    properties:
      start_date:
        $ref: "./sch-common.schema.yaml#/$defs/Date"
        description: "Track start date. Overrides sch-defaults.yaml default_start_date when specified."
      notes:
        type: string

  phase_gates:
    type: array
    description: >
      Phase synchronization gates. Each gate creates a milestone that all scoped deliverables
      must reach (end of their pre-finalize phase_set) before any of them can start their
      finalize-pass phase_set. Scope is the union of catalogs, groups, and local_ids.
    items:
      type: object
      additionalProperties: false
      required:
        - id
        - name
        - after_phase_sets
        - owner
        - scope
      properties:
        id:
          $ref: "./sch-common.schema.yaml#/$defs/Id"
          description: "Gate milestone ID (e.g., G-LAUNCH-PJD-FP)."
        name:
          type: string
          minLength: 1
          description: "Gate display name."
        artifact_name:
          type: string
          minLength: 1
          description: "Human-readable name displayed in timeline col2 for this gate (e.g., 全ドメイン)."
        after_phase_sets:
          type: array
          minItems: 1
          description: >
            Names of the phase_sets after which the gate is placed.
            Lists all first-pass variants covered by this gate (e.g., [first-pass, research-first-pass]).
            Documents intent; implementation gates before the last phase_set in each deliverable's sequence.
          items:
            type: string
            minLength: 1
        owner:
          $ref: "./sch-common.schema.yaml#/$defs/Owner"
        scope:
          type: object
          additionalProperties: false
          description: "Deliverables covered by this gate. Union of catalogs, groups, and local_ids."
          properties:
            catalogs:
              type: array
              description: "All deliverables in these catalog IDs."
              items:
                type: string
                minLength: 1
              uniqueItems: true
            groups:
              type: array
              description: "All deliverables in these catalog+group combinations."
              items:
                type: object
                additionalProperties: false
                required:
                  - catalog_id
                  - name
                properties:
                  catalog_id:
                    type: string
                    minLength: 1
                  name:
                    type: string
                    minLength: 1
            local_ids:
              type: array
              description: "Specific deliverable local_ids."
              items:
                type: string
                minLength: 1
              uniqueItems: true

  cross_domain_dependencies:
    type: array
    description: >
      Supplementary cross-domain dependencies not present in catalog depends_on.
      Defines ordering within first-pass: dependent.draft task starts after requires.last-first-pass task completes.
      Falls back to finalize task for completed deliverables (initial_state).
    items:
      type: object
      additionalProperties: false
      required:
        - dependent
        - requires
      properties:
        dependent:
          type: string
          minLength: 1
          description: "local_id of the dependent deliverable."
        requires:
          type: string
          minLength: 1
          description: "local_id of the prerequisite deliverable."
        note:
          type: string
          description: "Optional explanation."

  initial_state:
    type: object
    additionalProperties: false
    description: "Initial state overrides for deliverables already complete at project start."
    properties:
      completed_deliverables:
        type: array
        description: "Deliverables completed before the track start date."
        items:
          type: object
          additionalProperties: false
          required:
            - local_id
            - completed_on
            - by
          properties:
            local_id:
              type: string
              minLength: 1
              description: "Deliverable local_id (must exist in scope catalogs)."
            completed_through:
              type: string
              minLength: 1
              description: >
                Phase id up to which the deliverable is complete (inclusive).
                Omit to mark all phases as done.
            completed_on:
              $ref: "./sch-common.schema.yaml#/$defs/Date"
              description: "Date the deliverable was completed."
            by:
              type: string
              minLength: 1
              description: "Nickname of the completing member (must exist in pm-members.yaml)."
            note:
              type: string
              description: "Optional explanation of the initial state."

$defs:
  Execution:
    type: string
    enum: ["agent", "human"]
    description: >
      Execution mode for a phase.
      agent: agent executes the phase; exec-strategy assignment_rules select the agent.
      human: no agent is launched; the phase is recorded as pending human action.

  Phase:
    type: object
    additionalProperties: false
    required:
      - id
      - name
      - task_suffix
      - duration_days
    properties:
      id:
        type: string
        minLength: 1
        description: "Phase identifier (e.g., draft, validate, review, finalize)."
      name:
        type: string
        minLength: 1
        description: "Phase display name."
      task_suffix:
        type: string
        pattern: "^[0-9]{3}$"
        description: "3-digit numeric suffix appended to the generated task ID."
      duration_days:
        type: number
        exclusiveMinimum: 0
        description: "Default task duration in working days for this phase."
      execution:
        $ref: "#/$defs/Execution"
        description: >
          Default execution mode for this phase across all deliverables using this phase_set.
          Omit to default to auto.
          Can be overridden per-deliverable via owner_rules[].phase_overrides.
      description:
        type: string
        description: >
          Human-readable description of what to do in this phase.
          Used as agent instructions when execution is agent, and as guidance for humans when execution is human.
