# sch-strategy.schema.yaml
$schema: "https://json-schema.org/draft/2020-12/schema"
title: "SpecDojo Schedule strategy schema"
description: >
  Defines generation rules for sch-track-<track>.yaml.
  Used as input to the code generator; not a runtime schedule file.
  phase_sets defines named groups of phases keyed by semantic name (e.g., first-pass, finalize-pass).
  Each owner_rule references a phase_set by name.
  Phase.mode (edit/review) is written into ready.json by exec build to drive plan/result generation.
  Agent execution requirements are declared directly on phases using capabilities and proficiency;
  exec run --auto resolves matching agents from pm-members.yaml.
type: object
additionalProperties: false

required:
  - kind
  - id
  - type
  - status
  - track
  - scope
  - phase_sets
  - owner_rules

properties:
  kind:
    const: "strategy"
    description: "File kind identifier. Must be 'strategy'."

  id:
    type: string
    minLength: 1
    description: "Deliverable ID (e.g., prj-0001:sch-strategy-launch)."

  type:
    const: "project"

  status:
    type: string
    enum: ["draft", "ready", "deprecated"]

  track:
    $ref: "./sch-common.schema.yaml#/$defs/Track"

  scope:
    type: object
    additionalProperties: false
    required:
      - catalogs
      - include_kinds
    properties:
      catalogs:
        type: array
        minItems: 1
        description: "Target deliverables catalog files."
        items:
          type: object
          additionalProperties: false
          required:
            - id
            - path
          properties:
            id:
              type: string
              minLength: 1
              description: "Catalog document ID (e.g., prj-0001:dct-project-definition)."
            path:
              type: string
              pattern: "^/"
              description: "Absolute path to the catalog YAML file."
      include_kinds:
        type: array
        minItems: 1
        description: "Deliverable kinds to include in generation (typically [work])."
        items:
          type: string
          enum: ["work", "control", "generated"]

  phase_sets:
    type: object
    description: >
      Named phase set definitions. Keys are arbitrary names (e.g., first-pass, finalize-pass).
      Each owner_rule references one of these keys via its phase_set field.
      exec build writes phase metadata into ready.json so exec run --auto can resolve agents
      from pm-members.yaml without a separate assignment rule file.
    minProperties: 1
    additionalProperties:
      type: array
      minItems: 1
      items:
        $ref: "#/$defs/Phase"

  default_phase_set:
    type: string
    minLength: 1
    description: >
      Name of the fallback phase set used when an owner_rule does not specify phase_set.
      Must be a key defined in phase_sets. Required when any owner_rule omits phase_set.
      Use default_phase_sets (plural) instead when deliverables should run multiple phase sets in sequence.

  default_phase_sets:
    $ref: "#/$defs/PhaseSetSelection"
    description: >
      Ordered phase set selection applied to deliverables whose owner_rule omits phase_sets (plural).
      The array shorthand runs one cycle. The object form supports cycles for the whole sequence.
      Takes precedence over default_phase_set when both are present.
      Each phase_set must be a key defined in phase_sets.

  owner_rules:
    type: array
    minItems: 1
    description: "Mapping from deliverable local_id list to owner role and phase set."
    items:
      type: object
      additionalProperties: false
      required:
        - local_ids
        - owner
      properties:
        local_ids:
          type: array
          minItems: 1
          uniqueItems: true
          description: "Deliverable local_ids covered by this rule."
          items:
            type: string
            minLength: 1
        owner:
          $ref: "./sch-common.schema.yaml#/$defs/Owner"
        phase_set:
          type: string
          minLength: 1
          description: >
            Name of a single phase set to apply to these deliverables.
            Must be a key defined in phase_sets.
            Falls back to default_phase_set when omitted.
            Use phase_sets (plural) instead when multiple phase sets should run in sequence.
        phase_sets:
          $ref: "#/$defs/PhaseSetSelection"
          description: >
            Ordered phase set selection to apply to these deliverables.
            The array shorthand runs one cycle. The object form supports cycles for the whole sequence.
            Overrides phase_set (singular) and default_phase_sets when present.
            Each phase_set must be a key defined in phase_sets.
        phase_overrides:
          type: array
          description: >
            Per-phase overrides for these deliverables.
            execution, mode, approach, capabilities, and proficiency each take precedence over
            the same-named field defined on the phase in phase_sets[phase_set][phase].
          items:
            type: object
            additionalProperties: false
            required:
              - phase
            properties:
              phase:
                type: string
                minLength: 1
                description: "Phase id to override (must exist in the referenced phase_set)."
              execution:
                $ref: "#/$defs/Execution"
              mode:
                $ref: "#/$defs/TaskMode"
              approach:
                $ref: "#/$defs/Approach"
              capabilities:
                $ref: "#/$defs/Capabilities"
              proficiency:
                $ref: "./exec-common.schema.yaml#/$defs/Proficiency"

  group_milestones:
    type: array
    description: >
      Per-domain/per-group milestones to upsert into sch-milestones.yaml.
      Each entry targets one top-level group within a catalog.
      Omit 'group' for catalogs with a single unnamed group.
      depends_on is auto-computed from leaf finalize tasks within the group.
    items:
      type: object
      additionalProperties: false
      required:
        - catalog_id
        - milestone
      properties:
        catalog_id:
          type: string
          minLength: 1
          description: "Catalog ID to scope (must match one of scope.catalogs[].id)."
        group:
          type: string
          minLength: 1
          description: "Top-level group name. Omit for unnamed/single groups."
        milestone:
          type: object
          additionalProperties: false
          required:
            - id
            - name
            - owner
          properties:
            id:
              type: string
              minLength: 1
              description: "Milestone ID (e.g., M-LAUNCH-PJD-900)."
            name:
              type: string
              minLength: 1
              description: "Milestone display name."
            artifact_name:
              type: string
              minLength: 1
              description: "Human-readable artifact/domain name displayed in timeline col2 (e.g., プロジェクト定義)."
            owner:
              $ref: "./sch-common.schema.yaml#/$defs/Owner"
            date_hint:
              $ref: "./sch-common.schema.yaml#/$defs/Date"
            tags:
              type: array
              items:
                type: string
                minLength: 1
              uniqueItems: true

  settings:
    type: object
    additionalProperties: false
    description: "Track-level schedule settings. start_date overrides defaults.settings.default_start_date."
    properties:
      start_date:
        $ref: "./sch-common.schema.yaml#/$defs/Date"
        description: "Track start date. Overrides sch-defaults.yaml default_start_date when specified."
      notes:
        type: string

  phase_gates:
    type: array
    description: >
      Phase synchronization gates. Each gate creates a milestone that all scoped deliverables
      must reach (end of their pre-finalize phase_set) before any of them can start their
      finalize-pass phase_set. Scope is the union of catalogs, groups, and local_ids.
    items:
      type: object
      additionalProperties: false
      required:
        - id
        - name
        - after_phase_sets
        - owner
        - scope
      properties:
        id:
          $ref: "./sch-common.schema.yaml#/$defs/Id"
          description: "Gate milestone ID (e.g., G-LAUNCH-PJD-FP)."
        name:
          type: string
          minLength: 1
          description: "Gate display name."
        artifact_name:
          type: string
          minLength: 1
          description: "Human-readable name displayed in timeline col2 for this gate (e.g., 全ドメイン)."
        after_phase_sets:
          type: array
          minItems: 1
          description: >
            Names of the phase_sets after which the gate is placed.
            Lists all first-pass variants covered by this gate (e.g., [first-pass, research-first-pass]).
            The gate depends on the last task of the matching phase_set and blocks the first task
            of the following phase_set in each deliverable's sequence.
          items:
            type: string
            minLength: 1
        owner:
          $ref: "./sch-common.schema.yaml#/$defs/Owner"
        scope:
          type: object
          additionalProperties: false
          description: "Deliverables covered by this gate. Union of catalogs, groups, and local_ids."
          properties:
            catalogs:
              type: array
              description: "All deliverables in these catalog IDs."
              items:
                type: string
                minLength: 1
              uniqueItems: true
            groups:
              type: array
              description: "All deliverables in these catalog+group combinations."
              items:
                type: object
                additionalProperties: false
                required:
                  - catalog_id
                  - name
                properties:
                  catalog_id:
                    type: string
                    minLength: 1
                  name:
                    type: string
                    minLength: 1
            local_ids:
              type: array
              description: "Specific deliverable local_ids."
              items:
                type: string
                minLength: 1
              uniqueItems: true

  cross_domain_dependencies:
    type: array
    description: >
      Supplementary cross-domain dependencies not present in catalog depends_on.
      Defines ordering within first-pass: dependent.draft task starts after requires.last-first-pass task completes.
      Falls back to finalize task for completed deliverables (initial_state).
    items:
      type: object
      additionalProperties: false
      required:
        - dependent
        - requires
      properties:
        dependent:
          type: string
          minLength: 1
          description: "local_id of the dependent deliverable."
        requires:
          type: string
          minLength: 1
          description: "local_id of the prerequisite deliverable."
        note:
          type: string
          description: "Optional explanation."

  initial_state:
    type: object
    additionalProperties: false
    description: "Initial state overrides for deliverables already complete at project start."
    properties:
      completed_deliverables:
        type: array
        description: "Deliverables completed before the track start date."
        items:
          type: object
          additionalProperties: false
          required:
            - local_id
            - completed_on
            - by
          properties:
            local_id:
              type: string
              minLength: 1
              description: "Deliverable local_id (must exist in scope catalogs)."
            completed_through:
              oneOf:
                - type: string
                  minLength: 1
                - type: object
                  additionalProperties: false
                  required:
                    - phase_set
                    - phase
                  properties:
                    phase_set:
                      type: string
                      minLength: 1
                    phase:
                      type: string
                      minLength: 1
                    cycle:
                      type: integer
                      minimum: 1
                    iteration:
                      type: integer
                      minimum: 1
              description: >
                Phase position up to which the deliverable is complete (inclusive).
                The string shorthand is supported for non-repeated workflows.
                Omit to mark all phases as done.
            completed_on:
              $ref: "./sch-common.schema.yaml#/$defs/Date"
              description: "Date the deliverable was completed."
            by:
              type: string
              minLength: 1
              description: "Nickname of the completing member (must exist in pm-members.yaml)."
            note:
              type: string
              description: "Optional explanation of the initial state."

$defs:
  PhaseSetReference:
    oneOf:
      - type: string
        minLength: 1
      - type: object
        additionalProperties: false
        required:
          - phase_set
        properties:
          phase_set:
            type: string
            minLength: 1
          iterations:
            type: integer
            minimum: 1

  PhaseSetSequence:
    type: array
    minItems: 1
    items:
      $ref: "#/$defs/PhaseSetReference"

  PhaseSetSelection:
    oneOf:
      - $ref: "#/$defs/PhaseSetSequence"
      - type: object
        additionalProperties: false
        required:
          - sequence
        properties:
          cycles:
            type: integer
            minimum: 1
          sequence:
            $ref: "#/$defs/PhaseSetSequence"

  Execution:
    type: string
    enum: ["agent", "human"]
    description: >
      Execution mode for a phase.
      agent: agent executes the phase; phase capabilities/proficiency select the agent.
      human: no agent is launched; the phase is recorded as pending human action.

  TaskMode:
    type: string
    enum: ["edit", "review"]
    description: >
      Work mode for generated plan/result files.
      edit: deliverable creation or update.
      review: deliverable review.

  Approach:
    type: string
    enum:
      [
        "fully-guided",
        "recipe-guided",
        "freeform",
        "bootstrap",
        "rulebook-maintenance",
        "recipe-maintenance",
        "sample-maintenance",
        "template-maintenance",
      ]
    description: >
      How the task is carried out in a phase. The first three values describe how strictly
      the agent follows reference materials (rulebook/recipe/sample/template) when working on a deliverable.
      fully-guided: rulebook/recipe/sample/template are mature; follow them.
      recipe-guided: rulebook/sample are immature; use only the recipe's structure/questions/perspectives.
      freeform: not bound by reference materials; prioritize deliverable examples and project context.
      bootstrap: author the deliverable and its full reference set (rulebook/recipe/sample/template)
      together in one task as a mutually consistent whole; used to initially establish a deliverable and
      its reference materials. Must be declared explicitly in phase_sets.
      The *-maintenance values improve the named reference material (rulebook/recipe/sample/template)
      based on deliverables (reference direction is reversed); they must be declared explicitly in
      phase_sets and are never auto-injected.

  Phase:
    type: object
    additionalProperties: false
    required:
      - id
      - name
      - task_suffix
      - duration_days
    properties:
      id:
        type: string
        minLength: 1
        description: "Phase identifier (e.g., draft, validate, review, finalize)."
      name:
        type: string
        minLength: 1
        description: "Phase display name."
      task_suffix:
        type: string
        pattern: "^[0-9]{3}$"
        description: "3-digit numeric suffix appended to the generated task ID."
      duration_days:
        type: number
        exclusiveMinimum: 0
        description: "Default task duration in working days for this phase."
      execution:
        $ref: "#/$defs/Execution"
        description: >
          Default execution mode for this phase across all deliverables using this phase_set.
          Omit to default to agent.
          Can be overridden per-deliverable via owner_rules[].phase_overrides.
      mode:
        $ref: "#/$defs/TaskMode"
        description: >
          Default mode for this phase across all deliverables using this phase_set.
          Omit to default to edit.
          Can be overridden per-deliverable via owner_rules[].phase_overrides.
      approach:
        $ref: "#/$defs/Approach"
        description: >
          Default approach for this phase across all deliverables using this phase_set.
          Carried into task frontmatter and used for template selection.
          Can be overridden per-deliverable via owner_rules[].phase_overrides.
      capabilities:
        $ref: "#/$defs/Capabilities"
        description: >
          Required tool capabilities for execution: agent phases.
          Agents must have all listed capabilities. Omit when no special tools are needed.
          Can be overridden per-deliverable via owner_rules[].phase_overrides.
      proficiency:
        $ref: "./exec-common.schema.yaml#/$defs/Proficiency"
        description: >
          Required agent proficiency for execution: agent phases.
          Omit to accept agents of any proficiency level.
          Can be overridden per-deliverable via owner_rules[].phase_overrides.
      description:
        type: string
        description: >
          Human-readable description of what to do in this phase.
          Used as agent instructions when execution is agent, and as guidance for humans when execution is human.

  Capabilities:
    type: array
    minItems: 1
    uniqueItems: true
    description: "Required agent tool capabilities."
    items:
      $ref: "./exec-common.schema.yaml#/$defs/Capability"
