id: wbs-sample
type: wbs
status: draft
part_of:
  - prj-overview
based_on:
  - prj-scope
supersedes: []
project_id: prj-0001
domain: product-docs
assigned_team: 業務設計チーム
wbs:
  - id: WBS-PDT-BPS-OVERVIEW
    name: 販売業務プロセス仕様を整理する
    description: 駄菓子屋きぬやの店頭販売業務を業務プロセス仕様で定義する。
    component: sales
    deliverable:
      id: bps-overview
      path: docs/ja/sample-gcs-product/010-業務仕様/050-業務プロセス仕様/README.md
      note: 販売業務の主フローと例外フローを整理する
    done_criteria:
      - 店頭販売の業務フロー、入出力、例外時対応がレビュー可能な粒度で記述され、図と本文の説明が相互に整合していること。
    acceptance_refs:
      - BAC-SALES-010
    tags:
      - sales
      - business-spec
    notes: レジ会計と在庫引当の境界を曖昧にしない。

  - id: WBS-PDT-SCRDES
    name: 会計画面仕様を定義する
    description: 店員が迷わず操作できるよう、会計画面の実装画面仕様を整える。
    component: ui
    depends_on:
      - bps-overview
    deliverable:
      id: scrdes-kaikei
      path: docs/ja/sample-gcs-product/040-システム設計/050-実装画面仕様/scrdes-kaikei.md
      note: 会計画面の入力項目・表示項目・エラー時の振る舞いを定義する
    done_criteria:
      - 画面ごとの入力項目、表示項目、操作結果、主要エラー時の振る舞いが定義され、店員向けの操作想定と整合していること。
    acceptance_refs:
      - SAC-UI-020
      - DEC-0007
    tags:
      - ui
      - system-design
