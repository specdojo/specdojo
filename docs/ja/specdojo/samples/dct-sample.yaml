# dct-sample.yaml
# 成果物カタログ（ドメイン別）の完成例。
# 駄菓子屋きぬや販売管理システム構築プロジェクトのプロジェクト定義ドメインを題材とする。
# 構造・必須キー・型制約は docs/specdojo/schemas/v1/dct.schema.yaml に従う。
# work / control / generated の3種別と、done_criteria の記述例を示す。
id: dct-sample
type: project
status: draft
part_of:
  - prj-0001:dct-index
project_id: prj-0001
domain: project-definition
base_path: /docs/ja/projects/prj-0001/020-project-definition
groups:
  - deliverables:
      - local_id: prj-overview
        name: プロジェクト概要
        kind: work
        depends_on: []
        overview: 駄菓子屋きぬや販売管理システムの目的・背景・ゴールを定義する
        path: prj-overview.md
        rulebook: prj-overview-rulebook
        done_criteria:
          - text: プロジェクトの目的・背景・ゴールが業務観点で確認できる粒度で記述されていること
            roles: [BA]
            viewpoint: vp-ba-business-value
          - text: プロジェクトの目的・スコープを承認できる情報が含まれていること
            roles: [PO]
            viewpoint: vp-po-purpose-alignment
          - text: 技術的前提・制約を読み取れる情報が含まれていること
            roles: [ARC]
            viewpoint: vp-arc-technical-constraints
          - text: 成功判定の輪郭が確認できること
            roles: [QE]
            viewpoint: vp-qe-verifiability
      - local_id: prj-scope
        name: スコープ定義
        kind: work
        depends_on:
          - prj-overview
        overview: 対象業務と対象外業務を明確化し、合意境界を固定する
        path: prj-scope.md
        rulebook: prj-scope-rulebook
        done_criteria:
          - text: 業務スコープ・除外範囲・利用者影響が業務観点で確認できること
            roles: [BA]
            viewpoint: vp-ba-requirements-completeness
          - text: 対象範囲・対象外を承認できること
            roles: [PO]
            viewpoint: vp-po-purpose-alignment
          - text: テスト対象・対象外の境界が判断できること
            roles: [QE]
            viewpoint: vp-qe-verifiability
      - local_id: prj-issues-and-approach
        name: 課題と方針
        kind: work
        depends_on:
          - prj-scope
        overview: 初期課題と対応方針を整理し、計画立案の前提を明示する
        path: prj-issues-and-approach.md
        rulebook: prj-issues-and-approach-rulebook
        done_criteria:
          - text: 業務課題と解決アプローチが業務観点で対応していること
            roles: [BA]
            viewpoint: vp-ba-business-value
          - text: 主要課題と方針を計画立案の前提として確認できること
            roles: [PM]
            viewpoint: vp-pm-plan-feasibility
          - text: 解決アプローチが検証可能な形で記述されていること
            roles: [QE]
            viewpoint: vp-qe-verifiability
      - local_id: prj-glossary
        name: 用語集
        kind: control
        depends_on:
          - prj-overview
        overview: 業務用語と略語の定義を統一し、文書間の解釈差を防ぐ
        path: prj-glossary.md
        note: 統制文書のためスケジュール展開対象外。work ではないため done_criteria は持たない
      - local_id: prj-definition-summary
        name: 定義サマリー
        kind: generated
        depends_on:
          - prj-overview
          - prj-scope
        overview: 定義系成果物の要点を参照用に集約した派生文書を提供する
        path: prj-definition-summary.md
        note: 派生・自動生成成果物のためスケジュール展開対象外
