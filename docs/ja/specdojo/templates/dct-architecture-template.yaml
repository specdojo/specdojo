# Template: architecture deliverables catalog
id: dct-architecture-template
type: template
status: draft
domain: architecture
base_path: /docs/ja/product/030-architecture

groups:
  # ── C4（構造・依存関係）───────────────────────────────────────────────────
  - name: C4（構造・依存関係）
    base_path: 010-c4
    deliverables:
      - local_id: cxd-_CONTEXT_
        name: C4コンテキスト図
        kind: work
        depends_on: []
        overview: 対象システムと境界外の人・外部システムとの関係を俯瞰的に定義する
        path: cxd-_CONTEXT_.md
        rulebook: cxd-rulebook
        note: "_CONTEXT_ は対象システム・文脈名の略称（kebab-case）"
        done_criteria:
          - text: 対象システムと外部システム・ユーザーの関係が業務観点で正確に表現されていること
            roles: [BA]
            viewpoint: vp-ba-requirements-completeness
          - text: システム境界とステークホルダーを承認できること
            roles: [PO]
            viewpoint: vp-po-purpose-alignment
          - text: アーキテクチャ全体構造の共通理解として参照できること
            roles: [ARC]
            viewpoint: vp-arc-technical-constraints
          - text: システム境界・外部依存のテスト観点が識別できること
            roles: [QE]
            viewpoint: vp-qe-verifiability

      - local_id: cnd-_CONTAINER_
        name: C4コンテナ図
        kind: work
        depends_on: []
        overview: 対象システムを主要実行・配備単位に分割し、利用者・外部システム・データストアとの関係を定義する
        path: cnd-_CONTAINER_.md
        rulebook: cnd-rulebook
        note: "_CONTAINER_ は対象コンテナ群・サービス名の略称（kebab-case）"
        done_criteria:
          - text: 主要コンテナ構成・データフローが業務観点で理解できること
            roles: [BA]
            viewpoint: vp-ba-requirements-completeness
          - text: コンテナ構成とデプロイ方針を承認できること
            roles: [PO]
            viewpoint: vp-po-decision-readiness
          - text: インフラ設計・デプロイ構成の入力として参照できること
            roles: [ARC]
            viewpoint: vp-arc-technical-constraints
          - text: コンテナ間結合テストの対象が識別できること
            roles: [QE]
            viewpoint: vp-qe-verifiability
          - text: 実装コンポーネントの配備先・通信経路の参照として使えること
            roles: [DEV]
            viewpoint: vp-dev-implementation-readiness

      - local_id: cpd-_COMPONENT_
        min_size: medium
        name: C4コンポーネント図
        kind: work
        depends_on: []
        overview: 対象コンテナ内の主要コンポーネントを分解し、外部要素との依存関係を定義する
        path: cpd-_COMPONENT_.md
        rulebook: cpd-rulebook
        note: "_COMPONENT_ は対象コンテナ名の略称（kebab-case）"
        done_criteria:
          - text: コンポーネント構成と依存関係を設計の入力として参照できること
            roles: [ARC]
            viewpoint: vp-arc-technical-constraints
          - text: コンポーネント間インターフェースのテスト観点が識別できること
            roles: [QE]
            viewpoint: vp-qe-verifiability
          - text: コンポーネント実装の配置・依存方向の参照として使えること
            roles: [DEV]
            viewpoint: vp-dev-implementation-readiness

  # ── インフラ・技術選定 ────────────────────────────────────────────────────
  - name: インフラ・技術選定
    base_path: 020-infrastructure
    deliverables:
      - local_id: ifd-_TERM_
        name: インフラ構成図
        kind: work
        depends_on: []
        overview: インフラの論理的な境界（環境・ネットワーク・ゾーン）と主要コンポーネント間の通信を定義する
        path: ifd-_TERM_.md
        rulebook: ifd-mermaid-rulebook
        note: "_TERM_ は対象環境名の略称（kebab-case）"
        done_criteria:
          - text: 実行環境・ネットワーク・コンポーネント構成が業務制約と整合していること
            roles: [BA]
            viewpoint: vp-ba-requirements-completeness
          - text: インフラ方針を承認できること
            roles: [PO]
            viewpoint: vp-po-decision-readiness
          - text: インフラ設計・セキュリティゾーン設計の入力として参照できること
            roles: [ARC]
            viewpoint: vp-arc-technical-constraints
          - text: インフラテスト・障害テストの対象が識別できること
            roles: [QE]
            viewpoint: vp-qe-verifiability
          - text: 運用構成・監視設定の参照として使えること
            roles: [OPS]
            viewpoint: vp-ops-operability

      - local_id: tsd-_TERM_
        name: 技術スタック一覧
        kind: work
        depends_on: []
        overview: システムで採用する技術（言語・フレームワーク・DB・ミドルウェア等）を一覧として定義する
        path: tsd-_TERM_.md
        rulebook: tsd-rulebook
        note: "_TERM_ は対象システム・サービス名の略称（kebab-case）"
        done_criteria:
          - text: 採用技術の選定理由と制約が業務要件と整合していること
            roles: [BA]
            viewpoint: vp-ba-requirements-completeness
          - text: 技術スタック選定を承認できること
            roles: [PO]
            viewpoint: vp-po-decision-readiness
          - text: 技術的制約・ライセンス・バージョン方針が識別できること
            roles: [ARC]
            viewpoint: vp-arc-technical-constraints
          - text: テストフレームワーク・CI/CD環境の参照として使えること
            roles: [QE]
            viewpoint: vp-qe-verifiability
          - text: 開発環境構築・ライブラリ選定の参照として使えること
            roles: [DEV]
            viewpoint: vp-dev-implementation-readiness
