# Template: project member roster
# Placeholder _PROJECT_ID_ is replaced with the actual project_id on scaffold.
# On scaffold, set id to <project_id>:pm-members and type to project.
id: pm-members-template
type: template
status: draft
title: メンバー名簿
rulebook: pm-members-rulebook
based_on:
  - people-and-organization-definition-standard
  - _PROJECT_ID_:pm-organization
  - _PROJECT_ID_:pm-roles
version: 1
project_id: _PROJECT_ID_

# Role code の語彙は pm-roles.yaml を参照する。
# Schedule の owner には Role code を使い、member nickname は書かない。
# 起動コマンドは .specdojo/exec-defaults.yaml の providers.<provider>.command_template
# から解決するため、member には書かない。テンプレートを持たない provider（custom 等）
# に限り command を上書きとして追加し、その場合も認証情報、秘密鍵、トークン、
# 個人環境に閉じたパスを含めない。

members:
  - nickname: _HUMAN_NICKNAME_
    display_name: _HUMAN_DISPLAY_NAME_
    email: null
    roles:
      - PO
    type: human
    persona: final-decision-maker
    focus:
      - _TODO_: 目的、スコープ、優先順位、公開方針に照らして重視する観点を記述する。
    scheduler_strategy: critical-first
    note: "_TODO_: 最終判断、公開可否、説明責任の扱いを 1 行で記述する。"

  - nickname: _EDIT_AGENT_NICKNAME_
    priority: _EDIT_AGENT_PRIORITY_
    display_name: _EDIT_AGENT_DISPLAY_NAME_
    email: null
    roles:
      - _EDIT_AGENT_ROLE_CODE_
    type: agent
    mode: edit
    proficiency: _EDIT_AGENT_PROFICIENCY_
    persona: _AGENT_PERSONA_
    focus:
      - _TODO_: edit agent が重視する観点を記述する。
    capabilities:
      - _EDIT_AGENT_CAPABILITY_
    provider: _AGENT_PROVIDER_
    scheduler_strategy: _EDIT_AGENT_SCHEDULER_STRATEGY_
    note: "_TODO_: 草案作成・整合確認などの支援範囲を記述し、承認責任を持たないことを明記する。"

  - nickname: _REVIEW_AGENT_NICKNAME_
    priority: _REVIEW_AGENT_PRIORITY_
    display_name: _REVIEW_AGENT_DISPLAY_NAME_
    email: null
    roles:
      - _REVIEW_AGENT_ROLE_CODE_
    type: agent
    mode: review
    proficiency: _REVIEW_AGENT_PROFICIENCY_
    persona: _REVIEW_AGENT_PERSONA_
    focus:
      - _TODO_: review agent が重視する観点を記述する。
    capabilities:
      - _REVIEW_AGENT_CAPABILITY_
    provider: _AGENT_PROVIDER_
    scheduler_strategy: _REVIEW_AGENT_SCHEDULER_STRATEGY_
    note: "_TODO_: レビュー支援範囲を記述し、公開可否判断を行わないことを明記する。"

  - nickname: _GENERAL_AGENT_NICKNAME_
    priority: _GENERAL_AGENT_PRIORITY_
    display_name: _GENERAL_AGENT_DISPLAY_NAME_
    email: null
    roles: []
    type: agent
    mode: edit
    proficiency: _GENERAL_AGENT_PROFICIENCY_
    persona: general-assistant
    focus:
      - _TODO_: 汎用支援 agent が重視する観点を記述する。
    capabilities: []
    provider: _AGENT_PROVIDER_
    scheduler_strategy: _GENERAL_AGENT_SCHEDULER_STRATEGY_
    note: "_TODO_: 特定 Role に固定しない場合は、実行時の owner または plan で対象 Role を補うことを記述する。"

rules:
  - Schedule の owner には pm-roles.yaml に記載された Role code を使用し、member nickname は書かない。
  - specdojo exec --by には members[].nickname を指定し、実行ログ記録後の nickname は変更しない。
  - members[].roles は member が対応できる Role code を表し、Schedule の owner の代替として使わない。
  - agent は草案作成、レビュー支援、整合性確認、機械的更新を支援するが、最終承認、公開可否判断、説明責任は人間の PO が担う。
  - 起動コマンドは .specdojo/exec-defaults.yaml の providers.<provider>.command_template から解決し、member の command はテンプレートを持たない構成に限って上書きとして使う。
  - command には認証情報、秘密鍵、トークン、個人環境に閉じたパスを記載しない。
  - 公開文書には個人名、私用メールアドレス、非公開組織情報を記載しない。
