# Template: non-functional requirements deliverables catalog
id: dct-non-functional-requirements-template
type: template
status: draft
domain: non-functional-requirements
base_path: /docs/ja/product/060-non-functional-requirements

groups:
  - deliverables:
      - local_id: nfr-index
        name: 非機能要件（全体構成）
        kind: work
        depends_on: []
        overview: 非機能要件を8カテゴリに分冊管理し、測定可能・検証可能な形で一元化する
        path: nfr-index.md
        rulebook: nfr-index-rulebook
        done_criteria:
          - text: 非機能要件のカテゴリ構成と優先度が業務観点で確認できること
            roles: [BA]
            viewpoint: vp-ba-requirements-completeness
          - text: 非機能要件の全体方針を承認できること
            roles: [PO]
            viewpoint: vp-po-decision-readiness
          - text: 技術的制約・実現可能性の前提として参照できること
            roles: [ARC]
            viewpoint: vp-arc-technical-constraints
          - text: 非機能テスト計画の起点として参照できること
            roles: [QE]
            viewpoint: vp-qe-verifiability

      - local_id: nfr-reliability
        name: 非機能要件（信頼性）
        kind: work
        depends_on:
          - nfr-index
        overview: 障害抑止と誤動作防止に関する要件を定義する（故障率・MTBF・エラー率等）
        path: nfr-reliability.md
        rulebook: nfr-reliability-rulebook
        done_criteria:
          - text: 信頼性要件が業務継続性の観点で記述されていること
            roles: [BA]
            viewpoint: vp-ba-business-value
          - text: 信頼性目標値を承認できること
            roles: [PO]
            viewpoint: vp-po-decision-readiness
          - text: 技術的実現方式（冗長化・エラーハンドリング）の制約として参照できること
            roles: [ARC]
            viewpoint: vp-arc-technical-constraints
          - text: 信頼性テスト（障害テスト・エラー率検証）の基準として使えること
            roles: [QE]
            viewpoint: vp-qe-verifiability

      - local_id: nfr-availability
        name: 非機能要件（可用性）
        kind: work
        depends_on:
          - nfr-index
        overview: システム稼働の継続性に関する要件を定義する（稼働率・RTO/RPO・フェイルオーバー等）
        path: nfr-availability.md
        rulebook: nfr-availability-rulebook
        done_criteria:
          - text: 稼働率・RTO/RPO要件が業務影響の観点で記述されていること
            roles: [BA]
            viewpoint: vp-ba-business-value
          - text: 可用性目標値を承認できること
            roles: [PO]
            viewpoint: vp-po-decision-readiness
          - text: フェイルオーバー・冗長化設計の制約として参照できること
            roles: [ARC]
            viewpoint: vp-arc-technical-constraints
          - text: 可用性テスト（障害切替・復旧検証）の基準として使えること
            roles: [QE]
            viewpoint: vp-qe-verifiability
          - text: 監視・障害対応設計の前提として参照できること
            roles: [OPS]
            viewpoint: vp-ops-operability

      - local_id: nfr-maintainability
        min_size: medium
        name: 非機能要件（保守性）
        kind: work
        depends_on:
          - nfr-index
        overview: 変更容易性と復旧容易性に関する要件を定義する（MTTR・変更リードタイム・ログ粒度等）
        path: nfr-maintainability.md
        rulebook: nfr-maintainability-rulebook
        done_criteria:
          - text: 保守性要件が運用継続性の観点で記述されていること
            roles: [BA]
            viewpoint: vp-ba-business-value
          - text: 保守性目標値を承認できること
            roles: [PO]
            viewpoint: vp-po-decision-readiness
          - text: ログ粒度・変更設計方針の制約として参照できること
            roles: [ARC]
            viewpoint: vp-arc-technical-constraints
          - text: 保守性テスト（ログ検証・変更影響テスト）の基準として使えること
            roles: [QE]
            viewpoint: vp-qe-verifiability

      - local_id: nfr-integrity
        min_size: medium
        name: 非機能要件（完全性）
        kind: work
        depends_on:
          - nfr-index
        overview: データ正確性と改ざん防止に関する要件を定義する（整合性検証・監査証跡・トランザクション境界等）
        path: nfr-integrity.md
        rulebook: nfr-integrity-rulebook
        done_criteria:
          - text: データ整合性要件が業務データ品質の観点で記述されていること
            roles: [BA]
            viewpoint: vp-ba-business-value
          - text: 完全性目標値を承認できること
            roles: [PO]
            viewpoint: vp-po-decision-readiness
          - text: トランザクション境界・監査ログ設計の制約として参照できること
            roles: [ARC]
            viewpoint: vp-arc-technical-constraints
          - text: データ整合性テスト・監査証跡検証の基準として使えること
            roles: [QE]
            viewpoint: vp-qe-verifiability

      - local_id: nfr-security-safety
        name: 非機能要件（機密性・安全性）
        kind: work
        depends_on:
          - nfr-index
        overview: 不正利用防止とセキュリティに関する要件を定義する（認証・認可・暗号化・アクセス制御等）
        path: nfr-security-safety.md
        rulebook: nfr-security-safety-rulebook
        done_criteria:
          - text: セキュリティ要件が業務データ保護の観点で記述されていること
            roles: [BA]
            viewpoint: vp-ba-business-value
          - text: セキュリティ目標・コンプライアンス要件を承認できること
            roles: [PO]
            viewpoint: vp-po-decision-readiness
          - text: 認証・認可・暗号化設計の制約として参照できること
            roles: [ARC]
            viewpoint: vp-arc-technical-constraints
          - text: セキュリティテスト（脆弱性・侵入テスト）の基準として使えること
            roles: [QE]
            viewpoint: vp-qe-verifiability

      - local_id: nfr-performance
        name: 非機能要件（性能）
        kind: work
        depends_on:
          - nfr-index
        overview: 応答性と処理能力に関する要件を定義する（P95/P99レイテンシ・RPS・リソース効率等）
        path: nfr-performance.md
        rulebook: nfr-performance-rulebook
        done_criteria:
          - text: 性能要件が業務利用の観点で記述されていること
            roles: [BA]
            viewpoint: vp-ba-business-value
          - text: 性能目標値を承認できること
            roles: [PO]
            viewpoint: vp-po-decision-readiness
          - text: キャッシュ・スケーリング・DB最適化設計の制約として参照できること
            roles: [ARC]
            viewpoint: vp-arc-technical-constraints
          - text: 負荷テスト・性能テストの基準として使えること
            roles: [QE]
            viewpoint: vp-qe-verifiability

      - local_id: nfr-operations
        min_size: medium
        name: 非機能要件（運用）
        kind: work
        depends_on:
          - nfr-index
        overview: 監視・手順・継続運用に関する要件を定義する（アラート検知率・復旧達成率・運用手順充実度等）
        path: nfr-operations.md
        rulebook: nfr-operations-rulebook
        done_criteria:
          - text: 運用要件が業務継続性の観点で記述されていること
            roles: [BA]
            viewpoint: vp-ba-business-value
          - text: 運用目標値を承認できること
            roles: [PO]
            viewpoint: vp-po-decision-readiness
          - text: 監視・アラート設計の制約として参照できること
            roles: [ARC]
            viewpoint: vp-arc-technical-constraints
          - text: 運用テスト・障害対応訓練の基準として使えること
            roles: [QE]
            viewpoint: vp-qe-verifiability
          - text: 運用設計・手順整備の前提として参照できること
            roles: [OPS]
            viewpoint: vp-ops-operability

      - local_id: nfr-usability
        min_size: medium
        name: 非機能要件（操作性）
        kind: work
        depends_on:
          - nfr-index
        overview: 使いやすさと誤操作防止に関する要件を定義する（タスク完了率・誤操作率・エラーメッセージ明確性等）
        path: nfr-usability.md
        rulebook: nfr-usability-rulebook
        done_criteria:
          - text: 操作性要件が業務ユーザー観点で記述されていること
            roles: [BA]
            viewpoint: vp-ba-business-value
          - text: 操作性目標値を承認できること
            roles: [PO]
            viewpoint: vp-po-decision-readiness
          - text: UI設計・エラーメッセージ設計の制約として参照できること
            roles: [ARC]
            viewpoint: vp-arc-technical-constraints
          - text: ユーザビリティテストの基準として使えること
            roles: [QE]
            viewpoint: vp-qe-verifiability
          - text: 画面設計・操作フロー設計の前提として参照できること
            roles: [UX]
            viewpoint: vp-ux-readability
