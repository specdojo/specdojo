# Template: project definition deliverables catalog
# min_size: deliverable is included only when scaffold --size >= this value
# Placeholder _PROJECT_ID_ is replaced with the actual project_id on scaffold.
id: dct-project-definition-template
type: template
status: draft
title: 成果物カタログ（プロジェクト定義）
rulebook: dct-rulebook
part_of:
  - _PROJECT_ID_:dct-index
domain: project-definition
base_path: /docs/ja/projects/_PROJECT_ID_/020-project-definition

groups:
  - deliverables:
      # ── small ────────────────────────────────────────────────────────────
      - local_id: prj-overview
        name: プロジェクト概要
        kind: work
        depends_on: []
        overview: プロジェクトの目的・背景・ゴールを定義
        path: prj-overview.md
        rulebook: prj-overview-rulebook
        done_criteria:
          - text: プロジェクトの目的・背景・ゴールが業務観点で確認できる粒度で記述されていること
            roles: [BA]
            viewpoint: vp-ba-business-value
          - text: プロジェクトの目的・スコープを承認できる情報が含まれていること
            roles: [PO]
            viewpoint: vp-po-purpose-alignment
          - text: 技術的前提・制約を読み取れる情報が含まれていること
            roles: [ARC]
            viewpoint: vp-arc-technical-constraints
          - text: 成功判定の輪郭が確認できること
            roles: [QE]
            viewpoint: vp-qe-verifiability
          - text: プロジェクトの目的・スコープを計画立案の基礎として確認できること
            roles: [PM]
            viewpoint: vp-pm-plan-feasibility

      - local_id: prj-scope
        name: プロジェクトスコープ
        kind: work
        depends_on:
          - prj-overview
        overview: プロジェクトの対象範囲と除外範囲を定義
        path: prj-scope.md
        rulebook: prj-scope-rulebook
        done_criteria:
          - text: 業務スコープ・除外範囲・利用者影響が業務観点で確認できること
            roles: [BA]
            viewpoint: vp-ba-requirements-completeness
          - text: 対象範囲・対象外を承認できること
            roles: [PO]
            viewpoint: vp-po-purpose-alignment
          - text: 技術的スコープ境界が識別できること
            roles: [ARC]
            viewpoint: vp-arc-technical-constraints
          - text: テスト対象・対象外の境界が判断できること
            roles: [QE]
            viewpoint: vp-qe-verifiability
          - text: スコープ境界をスケジュール計画の前提として確認できること
            roles: [PM]
            viewpoint: vp-pm-plan-feasibility

      - local_id: prj-success-criteria-and-acceptance-criteria
        name: 成功基準と受入条件
        kind: work
        depends_on:
          - prj-scope
        overview: プロジェクト成功の判定基準と受入条件を明確化
        path: prj-success-criteria-and-acceptance-criteria.md
        rulebook: prj-success-criteria-and-acceptance-criteria-rulebook
        done_criteria:
          - text: 業務価値と受入条件が対応していること
            roles: [BA]
            viewpoint: vp-ba-requirements-completeness
          - text: 成功基準を承認できること
            roles: [PO]
            viewpoint: vp-po-decision-readiness
          - text: 技術的受入条件が確認できること
            roles: [ARC]
            viewpoint: vp-arc-technical-constraints
          - text: 受入条件が検証可能な形で記述されていること
            roles: [QE]
            viewpoint: vp-qe-verifiability

      # ── medium ───────────────────────────────────────────────────────────
      - local_id: prj-stakeholder-register
        min_size: medium
        name: ステークホルダー登録簿
        kind: work
        depends_on:
          - prj-overview
        overview: 関係者の役割・関心・影響度を一覧化
        path: prj-stakeholder-register.md
        rulebook: prj-stakeholder-register-rulebook
        done_criteria:
          - text: 関係者の役割・関心・影響度が業務観点で確認できる形で一覧化されていること
            roles: [BA]
            viewpoint: vp-ba-stakeholder-clarity
          - text: 合意対象と意思決定者が識別できること
            roles: [PO]
            viewpoint: vp-po-purpose-alignment
          - text: 技術的意思決定者・承認者が識別できること
            roles: [ARC]
            viewpoint: vp-arc-technical-constraints
          - text: 品質に影響するステークホルダーが確認できること
            roles: [QE]
            viewpoint: vp-qe-verifiability

      - local_id: prj-charter
        min_size: medium
        name: プロジェクト憲章
        kind: work
        depends_on:
          - prj-overview
          - prj-stakeholder-register
        overview: プロジェクトの正式な認可と権限委譲を文書化
        path: prj-charter.md
        rulebook: prj-charter-rulebook
        done_criteria:
          - text: 業務上の目的・認可条件・期待効果が明確であること
            roles: [BA]
            viewpoint: vp-ba-business-value
          - text: 正式認可・権限委譲・予算枠を承認できる情報が含まれていること
            roles: [PO]
            viewpoint: vp-po-decision-readiness
          - text: 技術的制約・前提が読み取れること
            roles: [ARC]
            viewpoint: vp-arc-technical-constraints
          - text: 品質目標・受入基準への参照が確認できること
            roles: [QE]
            viewpoint: vp-qe-verifiability

      - local_id: prj-assumptions-constraints-dependencies
        min_size: medium
        name: 前提・制約・依存関係
        kind: work
        depends_on:
          - prj-scope
        overview: 前提条件・制約事項・外部依存を整理
        path: prj-assumptions-constraints-dependencies.md
        rulebook: prj-assumptions-constraints-dependencies-rulebook
        done_criteria:
          - text: 業務上の前提・制約が業務観点で識別できること
            roles: [BA]
            viewpoint: vp-ba-requirements-completeness
          - text: 重要な前提・制約を受け入れられる情報が含まれていること
            roles: [PO]
            viewpoint: vp-po-purpose-alignment
          - text: 技術的制約・外部依存が識別できること
            roles: [ARC]
            viewpoint: vp-arc-technical-constraints
          - text: テスト実施上の前提・制約が確認できること
            roles: [QE]
            viewpoint: vp-qe-verifiability
          - text: 実装上の技術制約・外部依存が確認できること
            roles: [DEV]
            viewpoint: vp-dev-implementation-readiness

      - local_id: prj-issues-and-approach
        min_size: medium
        name: プロジェクト課題と解決アプローチ
        kind: work
        depends_on:
          - prj-scope
          - prj-assumptions-constraints-dependencies
        overview: 主要課題の特定と解決アプローチを定義
        path: prj-issues-and-approach.md
        rulebook: prj-issues-and-approach-rulebook
        done_criteria:
          - text: 業務課題と解決アプローチが業務観点で対応していること
            roles: [BA]
            viewpoint: vp-ba-business-value
          - text: 主要課題と解決方針を承認できること
            roles: [PO]
            viewpoint: vp-po-decision-readiness
          - text: 技術的課題と実現方式の方向性が識別できること
            roles: [ARC]
            viewpoint: vp-arc-technical-constraints
          - text: 解決アプローチが検証可能な形で記述されていること
            roles: [QE]
            viewpoint: vp-qe-verifiability

      - local_id: prj-comparison-of-alternatives
        min_size: medium
        name: 代替案比較
        kind: work
        depends_on:
          - prj-scope
          - prj-issues-and-approach
        overview: 技術的・方針的な代替案を比較評価
        path: prj-comparison-of-alternatives.md
        rulebook: prj-comparison-of-alternatives-rulebook
        done_criteria:
          - text: 比較軸・評価根拠が業務価値と対応していること
            roles: [BA]
            viewpoint: vp-ba-business-value
          - text: 推奨案を判断できる情報が含まれていること
            roles: [PO]
            viewpoint: vp-po-decision-readiness
          - text: 技術的実現可能性・影響が評価されていること
            roles: [ARC]
            viewpoint: vp-arc-technical-constraints
          - text: 選択された案に対する検証方針が確認できること
            roles: [QE]
            viewpoint: vp-qe-verifiability
