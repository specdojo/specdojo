kind: exec-strategy
id: prj-0001:exec-strategy-launch
type: project
status: draft
track: launch

# exec-strategy-launch.yaml
# sch-strategy-launch.yaml の execution: agent フェーズに対して
# 必要な mode / capabilities / proficiency を宣言する。
# mode: edit（成果物の作成・編集）/ review（レビュー）
# capabilities: ツールアクセス（web_search など）のみ。exec/review は mode で指定。
# エージェントの選択は pm-members.yaml の capabilities / proficiency / priority から自動解決する。
#
# assignment_rules の評価ルール:
#   1. 上から順に評価し、最初にマッチしたルールを適用する。
#   2. pm-members.yaml から mode / capabilities / proficiency 条件を満たす agent を抽出する。
#   3. priority（昇順）→ 余剰 capabilities 数（昇順）でソートし、先頭が primary。
#   4. rate limit 発生時は次の候補へ順次フォールバックする。
#   5. どの assignment_rule にもマッチしない phase は default_mode を適用する。

# assignment_rules にマッチしない phase（draft / finalize 等）に適用する既定 mode。
# 省略時は edit。
default_mode: edit

assignment_rules:
  # research-first-pass.enrich: 外部調査が必要な補強（edit mode / web_search 必要 / expert 水準）
  - phase_set: research-first-pass
    phase: enrich
    mode: edit
    capabilities: [web_search]
    proficiency: expert

  # first-pass.enrich: 標準的な補強（edit mode / normal 水準）
  - phase_set: first-pass
    phase: enrich
    mode: edit
    proficiency: normal

  # finalize-pass.align: 成果物間の整合性確認・修正（edit mode / normal 水準）
  - phase_set: finalize-pass
    phase: align
    mode: edit
    proficiency: normal

  # *.review: 一次版レビュー・比較レビュー（review mode / normal 水準）
  - phase: review
    mode: review
    proficiency: normal

rate_limit_policy:
  on_non_critical:
    action: skip # cpm.slack > 0: block イベントを記録して次のタスクへ
  on_critical:
    action: try_next # cpm.slack == 0: candidates 配列の次の agent へ
    retry:
      max_attempts: 3
      initial_wait_seconds: 60
      backoff_multiplier: 3 # 60s → 180s → 540s
      max_wait_seconds: 600
    on_exhausted: block # 全候補試行後はブロックして人間に委ねる
