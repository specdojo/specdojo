kind: track
id: prj-0001:sch-track-launch
type: project
status: ready
title: スケジュールトラック（launch）
rulebook: sch-rulebook
version: 1
project_id: prj-0001
track: launch
settings:
  start_date: "2026-06-15"
tasks:
  - local_id: prj-overview
    phase_suffix: "000"
    name: 完了済み
    duration_days: 0.001
    depends_on: []
    owner: BA
    tags:
      - initial-complete
  - local_id: prj-scope
    phase_suffix: "010"
    phase_set: bootstrap-pass
    phase_id: bootstrap
    name: 一括整備（成果物＋参考資料）
    duration_days: 1
    depends_on:
      - T-LAUNCH-prj-overview-000
    owner: BA
    description: |
      エージェントが成果物と、それに紐づく参考資料一式（rulebook / recipe / sample / template）を
      一貫した一組として作成・整備する。
      既存の成果物・参考資料があれば評価し、維持/修正/作り直しを判断する。無ければ新規作成する。
      必要に応じて外部情報・関連ドキュメントを調査し、出典とともに反映する。
      成果物は owner ロールの責務に集中して記述し、参考資料は丸写しを避け一般化して相互に整合させる。
      構造・必須項目・禁止事項は rulebook を正とする。
      ここで整備した参考資料は refine-pass では凍結し、保守的に磨き込む。
  - local_id: prj-scope
    phase_suffix: "070"
    phase_set: refine-pass
    phase_id: refine
    iteration: 1
    name: 磨き込み
    duration_days: 0.25
    depends_on:
      - T-LAUNCH-prj-scope-010
      - G-LAUNCH-bootstrap-pass
    owner: BA
    description: |
      エージェントが bootstrap で凍結した rulebook / recipe / sample / template に沿って成果物を磨き込む。
      既存記述を尊重し、不足や参考資料との不整合のみを最小限修正・補強する（全面的な書き直しはしない）。
      done_criteria を満たしているかを確認し、満たさない箇所を補う。
  - local_id: prj-scope
    phase_suffix: "080"
    phase_set: refine-pass
    phase_id: align
    iteration: 1
    name: 整合性確認・修正
    duration_days: 0.25
    depends_on:
      - T-LAUNCH-prj-scope-070-I01
    owner: BA
    description: |
      エージェントが同一ゲート内の他成果物を参照し、用語・数値・方針の整合性を確認する。
      矛盾・不整合が見つかった場合は、既存記述を尊重しつつ最小限の修正で整える。
      他成果物への修正提案が必要な場合は、該当成果物の担当ロールへ差し戻しを起票する。
  - local_id: prj-scope
    phase_suffix: "070"
    phase_set: refine-pass
    phase_id: refine
    iteration: 2
    name: 磨き込み
    duration_days: 0.25
    depends_on:
      - T-LAUNCH-prj-scope-080-I01
    owner: BA
    description: |
      エージェントが bootstrap で凍結した rulebook / recipe / sample / template に沿って成果物を磨き込む。
      既存記述を尊重し、不足や参考資料との不整合のみを最小限修正・補強する（全面的な書き直しはしない）。
      done_criteria を満たしているかを確認し、満たさない箇所を補う。
  - local_id: prj-scope
    phase_suffix: "080"
    phase_set: refine-pass
    phase_id: align
    iteration: 2
    name: 整合性確認・修正
    duration_days: 0.25
    depends_on:
      - T-LAUNCH-prj-scope-070-I02
    owner: BA
    description: |
      エージェントが同一ゲート内の他成果物を参照し、用語・数値・方針の整合性を確認する。
      矛盾・不整合が見つかった場合は、既存記述を尊重しつつ最小限の修正で整える。
      他成果物への修正提案が必要な場合は、該当成果物の担当ロールへ差し戻しを起票する。
  - local_id: prj-scope
    phase_suffix: "090"
    phase_set: review-pass
    phase_id: review
    name: 完成版レビュー
    duration_days: 0.25
    depends_on:
      - T-LAUNCH-prj-scope-080-I02
      - G-LAUNCH-refine-pass
    owner: BA
    description: |
      レビューエージェントが磨き込み後の内容を確認し、承認・修正指示・差し戻しを判断する。
      成果物カタログの done_criteria と関連成果物との整合性を全観点で確認する。
      差し戻しの場合は修正箇所と理由を明記する。
  - local_id: prj-scope
    phase_suffix: "100"
    phase_set: review-pass
    phase_id: recipe-consolidate
    name: Recipe 最終調整
    duration_days: 0.25
    depends_on:
      - T-LAUNCH-prj-scope-090
    owner: BA
    description: |
      レビュー済みの完成版成果物と review 結果を根拠に recipe を最終調整する。
      完成版の作成に有効だったか、過不足がないかを確認し、必要な箇所のみ修正する。
      成果物固有の事情は一般化し、recipe に持ち込まない。
  - local_id: prj-scope
    phase_suffix: "110"
    phase_set: review-pass
    phase_id: rulebook-consolidate
    name: Rulebook 最終調整
    duration_days: 0.25
    depends_on:
      - T-LAUNCH-prj-scope-100
    owner: BA
    description: |
      レビュー済みの完成版成果物と review 結果を根拠に rulebook を最終調整する。
      章構成・必須項目・禁止事項・判定基準が完成版に対して妥当か確認し、必要な箇所のみ修正する。
      成果物固有の事情は一般化し、rulebook に持ち込まない。
  - local_id: prj-scope
    phase_suffix: "120"
    phase_set: review-pass
    phase_id: sample-consolidate
    name: Sample 最終調整
    duration_days: 0.25
    depends_on:
      - T-LAUNCH-prj-scope-110
    owner: BA
    description: |
      レビュー済みの完成版成果物と review 結果を根拠に sample を最終調整する。
      粒度・文体・表の書き方と完成例としての妥当性を確認し、必要な箇所のみ修正する。
      プロジェクト固有の値は一般化またはプレースホルダ化し、再利用可能な例にする。
  - local_id: prj-scope
    phase_suffix: "130"
    phase_set: review-pass
    phase_id: template-consolidate
    name: Template 最終調整
    duration_days: 0.25
    depends_on:
      - T-LAUNCH-prj-scope-120
    owner: BA
    description: |
      レビュー済みの完成版成果物と review 結果を根拠に template を最終調整する。
      章構成の骨組み・プレースホルダの配置と網羅性・雛形としての妥当性を確認し、必要な箇所のみ修正する。
      成果物固有の内容は template に持ち込まず、同種成果物の開始点として再利用できる形にする。
  - local_id: prj-scope
    phase_suffix: "140"
    phase_set: review-pass
    phase_id: finalize
    name: 完成版確定
    duration_days: 0.125
    depends_on:
      - T-LAUNCH-prj-scope-130
    owner: BA
    description: |
      担当ロールがレビュー後の内容を最終確認し、完成版として確定する。
      bootstrap で整備し consolidate で最終調整した参考資料（rulebook / recipe / sample / template）も
      あわせて確認し、成果物と参考資料それぞれの frontmatter の status を ready に更新する。
  - local_id: prj-success-criteria-and-acceptance-criteria
