kind: track
id: prj-0001:sch-track-launch
type: project
status: draft
version: 1
project_id: prj-0001
track: launch
settings:
  start_date: "2026-05-24"
tasks:
  - local_id: prj-overview
    phase_suffix: "010"
    phase_set: bootstrap-pass
    phase_id: draft
    name: たたき台作成
    duration_days: 0.25
    depends_on: []
    owner: BA
    description: |
      エージェントが成果物の初版を作成する。
      章構成・記載項目を決め、現時点で把握している情報を埋める。
      調査・確認が必要な箇所は TODO として明示したまま残す。
      freeform で自由に作成してよいのはこのたたき台フェーズだけで、以降は既存記述を尊重する。
  - local_id: prj-overview
    phase_suffix: "020"
    phase_set: bootstrap-pass
    phase_id: enrich
    name: 調査・補強
    duration_days: 0.5
    depends_on:
      - T-LAUNCH-prj-overview-010
    owner: BA
    description: |
      エージェントが外部情報・関連ドキュメントを調査し、たたき台の TODO を埋めて内容を補強する。
      既存記述との矛盾・抜け漏れも確認し、修正・追記する。
      調査結果は出典・根拠とともに記載する。
      この時点では参考資料が未整備のため freeform で進める。
  - local_id: prj-overview
    phase_suffix: "030"
    phase_set: bootstrap-pass
    phase_id: recipe-bootstrap
    name: Recipe 新規作成
    duration_days: 0.25
    depends_on:
      - T-LAUNCH-prj-overview-020
    owner: BA
    description: |
      補強後の成果物を根拠に recipe を新規作成する（既存があれば見直す）。
      問い・観点・深掘り手順・レビュー観点を、再利用できる作成手順として整理する。
      成果物固有の事情は一般化し、recipe に持ち込まない。
      ここで作成した recipe は refine-pass では凍結し、編集しない。
  - local_id: prj-overview
    phase_suffix: "040"
    phase_set: bootstrap-pass
    phase_id: rulebook-bootstrap
    name: Rulebook 新規作成
    duration_days: 0.25
    depends_on:
      - T-LAUNCH-prj-overview-030
    owner: BA
    description: |
      補強後の成果物を根拠に rulebook を新規作成する（既存があれば見直す）。
      章構成・必須項目・禁止事項・判定基準を、同種成果物へ適用できる規定として整理する。
      成果物固有の事情は一般化し、rulebook に持ち込まない。
      ここで作成した rulebook は refine-pass では凍結し、編集しない。
  - local_id: prj-overview
    phase_suffix: "050"
    phase_set: bootstrap-pass
    phase_id: sample-bootstrap
    name: Sample 新規作成
    duration_days: 0.25
    depends_on:
      - T-LAUNCH-prj-overview-040
    owner: BA
    description: |
      補強後の成果物を根拠に sample を新規作成する（既存があれば見直す）。
      粒度・文体・表の書き方と、完成例としての妥当性を整える。
      プロジェクト固有の値は一般化またはプレースホルダ化し、再利用可能な例にする。
      ここで作成した sample は refine-pass では凍結し、編集しない。
  - local_id: prj-overview
    phase_suffix: "060"
    phase_set: bootstrap-pass
    phase_id: template-bootstrap
    name: Template 新規作成
    duration_days: 0.25
    depends_on:
      - T-LAUNCH-prj-overview-050
    owner: BA
    description: |
      補強後の成果物を根拠に template を新規作成する（既存があれば見直す）。
      章構成の骨組み・プレースホルダの配置と網羅性・雛形としての妥当性を整える。
      成果物固有の内容は template に持ち込まず、同種成果物の開始点として再利用できる形にする。
      ここで作成した template は refine-pass では凍結し、編集しない。
  - local_id: prj-overview
    phase_suffix: "070"
    phase_set: refine-pass
    phase_id: refine
    iteration: 1
    name: 磨き込み
    duration_days: 0.25
    depends_on:
      - T-LAUNCH-prj-overview-060
      - G-LAUNCH-bootstrap-pass
    owner: BA
    description: |
      エージェントが bootstrap で凍結した rulebook / recipe / sample / template に沿って成果物を磨き込む。
      既存記述を尊重し、不足や参考資料との不整合のみを最小限修正・補強する（全面的な書き直しはしない）。
      done_criteria を満たしているかを確認し、満たさない箇所を補う。
  - local_id: prj-overview
    phase_suffix: "080"
    phase_set: refine-pass
    phase_id: align
    iteration: 1
    name: 整合性確認・修正
    duration_days: 0.25
    depends_on:
      - T-LAUNCH-prj-overview-070-I01
    owner: BA
    description: |
      エージェントが同一ゲート内の他成果物を参照し、用語・数値・方針の整合性を確認する。
      矛盾・不整合が見つかった場合は、既存記述を尊重しつつ最小限の修正で整える。
      他成果物への修正提案が必要な場合は、該当成果物の担当ロールへ差し戻しを起票する。
  - local_id: prj-overview
    phase_suffix: "070"
    phase_set: refine-pass
    phase_id: refine
    iteration: 2
    name: 磨き込み
    duration_days: 0.25
    depends_on:
      - T-LAUNCH-prj-overview-080-I01
    owner: BA
    description: |
