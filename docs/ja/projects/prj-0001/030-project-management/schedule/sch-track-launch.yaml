  - local_id: prj-overview
    phase_suffix: "090"
    phase_set: review-pass
    phase_id: review
    name: 完成版レビュー
    duration_days: 0.25
    depends_on:
      - T-LAUNCH-prj-overview-080-I02
      - G-LAUNCH-refine-pass
    owner: BA
    description: |
      レビューエージェントが磨き込み後の内容を確認し、承認・修正指示・差し戻しを判断する。
      成果物カタログの done_criteria と関連成果物との整合性を全観点で確認する。
      差し戻しの場合は修正箇所と理由を明記する。
  - local_id: prj-overview
    phase_suffix: "100"
    phase_set: review-pass
    phase_id: recipe-consolidate
    name: Recipe 最終調整
    duration_days: 0.25
    depends_on:
      - T-LAUNCH-prj-overview-090
    owner: BA
    description: |
      レビュー済みの完成版成果物と review 結果を根拠に recipe を最終調整する。
      完成版の作成に有効だったか、過不足がないかを確認し、必要な箇所のみ修正する。
      成果物固有の事情は一般化し、recipe に持ち込まない。
