kind: track
id: prj-0001:sch-track-launch
type: project
status: draft
version: 1
project_id: prj-0001
track: launch
settings:
  start_date: "2026-05-24"
tasks:
  - local_id: prj-overview
    phase_suffix: "010"
    phase_set: first-edit-pass
    phase_id: draft
    iteration: 1
    name: たたき台作成
    duration_days: 0.25
    depends_on: []
    owner: BA
    description: |
      エージェントが成果物の初版を作成する。
      章構成・記載項目を決め、現時点で把握している情報を埋める。
      調査・確認が必要な箇所は TODO として明示したまま残す。
  - local_id: prj-overview
    phase_suffix: "020"
    phase_set: first-edit-pass
    phase_id: enrich
    iteration: 1
    name: 調査・補強
    duration_days: 0.5
    depends_on:
      - T-LAUNCH-prj-overview-010-I01
    owner: BA
    description: |
      エージェントが外部情報・関連ドキュメントを調査し、たたき台の TODO を埋めて内容を補強する。
      既存記述との矛盾・抜け漏れも確認し、修正・追記する。
      調査結果は出典・根拠とともに記載する。
  - local_id: prj-overview
    phase_suffix: "030"
    phase_set: first-edit-pass
    phase_id: recipe-maintenance
    iteration: 1
    name: Recipe メンテナンス
    duration_days: 0.25
    depends_on:
      - T-LAUNCH-prj-overview-020-I01
    owner: BA
    description: |
      エージェントが成果物の作成・更新結果を根拠に recipe を見直す。
      問い・観点・深掘り手順・レビュー観点の不足や過剰を確認し、必要な修正を反映する。
      成果物固有の事情は recipe に一般化せず、再利用できる作成手順として整理する。
  - local_id: prj-overview
    phase_suffix: "040"
    phase_set: first-edit-pass
    phase_id: rulebook-maintenance
    iteration: 1
    name: Rulebook メンテナンス
    duration_days: 0.25
    depends_on:
      - T-LAUNCH-prj-overview-030-I01
    owner: BA
    description: |
      エージェントが成果物の作成・更新結果を根拠に rulebook を見直す。
      章構成・必須項目・禁止事項・判定基準の不足や過剰を確認し、必要な修正を反映する。
      成果物固有の事情は rulebook に一般化せず、同種成果物へ適用できる規定として整理する。
  - local_id: prj-overview
    phase_suffix: "050"
    phase_set: first-edit-pass
    phase_id: sample-maintenance
    iteration: 1
    name: Sample メンテナンス
    duration_days: 0.25
    depends_on:
      - T-LAUNCH-prj-overview-040-I01
    owner: BA
    description: |
      エージェントが成果物の作成・更新結果を根拠に sample を見直す。
      粒度・文体・表の書き方と、完成例としての妥当性を確認し、必要な修正を反映する。
      プロジェクト固有の値は一般化またはプレースホルダ化し、再利用可能な例として整える。
  - local_id: prj-overview
    phase_suffix: "060"
    phase_set: first-edit-pass
    phase_id: template-maintenance
