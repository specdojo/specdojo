  - local_id: prj-overview
    phase_suffix: "010"
    name: たたき台作成
    duration_days: 0.25
    depends_on: []
    owner: BA
    description: |
      担当ロールが成果物の初版を作成する。
      章構成・記載項目を決め、現時点で把握している情報を埋める。
      調査・確認が必要な箇所は TODO として明示したまま残す。
  - local_id: prj-overview
    phase_suffix: "020"
    name: 調査・補強
    duration_days: 0.5
    depends_on:
      - T-LAUNCH-prj-overview-010
    owner: BA
    description: |
      エージェントが外部情報・関連ドキュメントを調査し、たたき台の TODO を埋めて内容を補強する。
      既存記述との矛盾・抜け漏れも確認し、修正・追記する。
      調査結果は出典・根拠とともに記載する。
  - local_id: prj-overview
    phase_suffix: "030"
    name: 一次版レビュー
    duration_days: 0.25
    depends_on:
      - T-LAUNCH-prj-overview-020
    owner: BA
    description: |
      担当ロールが補強後の内容を確認し、承認・修正指示・差し戻しを判断する。
      修正が軽微な場合は直接編集して承認とみなす。
      差し戻しの場合は修正箇所と理由を明記する。
