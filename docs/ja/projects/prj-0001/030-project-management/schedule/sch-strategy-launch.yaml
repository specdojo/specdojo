kind: strategy
id: prj-0001:sch-strategy-launch
type: project
status: ready
track: launch

# sch-track-launch.yaml を生成するための戦略定義。
# scope の catalog から kind: work の成果物を抽出し、
# phase_sets と owner_rules を基にタスクを生成する。
#
# owner はロール（BA / PO 等）のみを持つ。
# 実際の実行者（--by <nickname>）は実行時に pm-members.yaml の roles フィールドと照合して決定する。
#
# AI エージェントの作業要件は phase に直接持つ。
# execution: agent の phase に capabilities / proficiency を指定し、
# exec run --auto が pm-members.yaml のエージェントにマッピングする。

settings:
  start_date: "2026-06-15"

scope:
  catalogs:
    - id: prj-0001:dct-project-definition
      path: /docs/ja/projects/prj-0001/010-deliverables-catalog/dct-project-definition.yaml
    - id: prj-0001:dct-project-management
      path: /docs/ja/projects/prj-0001/010-deliverables-catalog/dct-project-management.yaml
  include_kinds:
    - work

# named phase sets（作業フローで分類する）
# Markdown・YAML 問わず同じフェーズを使う。
# バリデーションはエージェントが各フェーズの作業に組み込んで実行するため、
# 独立した validate フェーズは設けない。
# AI モデル・エージェントの実行時共通設定は exec-defaults.yaml に委ねる。
#
# execution フィールド（省略時は agent）:
#   agent : phase の capabilities / proficiency に合うエージェントが実行する
#   human : エージェントを起動せず、人間による実行待ちとして記録する
#
# 設計方針: 成果物・参考資料の意図しない作り直し（churn）を避けるため、
#   - freeform（既存記述の破棄を許す approach）は最初のたたき台 1 回だけに限定する。
#   - 参考資料（recipe/rulebook/sample/template）は bootstrap で 1 回だけ整備し（既存は評価して
#     維持/修正/作り直し、無ければ新規作成）凍結する。磨き込み中は編集せず、最終調整は review 後に 1 回だけ行う。
#   - 凍結後の磨き込みは保守的な fully-guided（既存記述を尊重し最小修正）で収束させる。
#
# フローは bootstrap-pass → refine-pass → review-pass の3段階。
#   bootstrap-pass: 成果物と参考資料一式を専用 approach で一括整備する（既存は評価して維持/修正/作り直し、無ければ新規作成）（1回）。
#   refine-pass   : 凍結した参考資料に沿って fully-guided で保守的に磨き込み、整合を取る（2回）。
#   review-pass   : 完成版をレビューし、参考資料を最終調整した後、人が確定する（1回）。
phase_sets:
  # ブートストラップ: 専用 approach で、成果物とその参考資料一式（rulebook/recipe/sample/template）を
  # 一貫した一組として 1 タスクで作成・整備する。既存があれば評価し、維持/修正/作り直しを判断する。
  # 無ければ新規作成する。整備した参考資料はこの 1 回だけ編集し、以降は凍結する。
  bootstrap-pass:
    - id: bootstrap
      name: 一括整備（成果物＋参考資料）
      execution: agent
      mode: edit
      approach: bootstrap
      capabilities: [web_search]
      proficiency: expert
      task_suffix: "010"
      duration_days: 1.0 # 4〜8h 相当（成果物＋参考資料4種を一括）
      description: |
        エージェントが成果物と、それに紐づく参考資料一式（rulebook / recipe / sample / template）を
        一貫した一組として作成・整備する。
        既存の成果物・参考資料があれば評価し、維持/修正/作り直しを判断する。無ければ新規作成する。
        必要に応じて外部情報・関連ドキュメントを調査し、出典とともに反映する。
        成果物は owner ロールの責務に集中して記述し、参考資料は丸写しを避け一般化して相互に整合させる。
        構造・必須項目・禁止事項は rulebook を正とする。
        ここで整備した参考資料は refine-pass では凍結し、保守的に磨き込む。

  # 磨き込み: 凍結した参考資料に沿って fully-guided で保守的に磨き込み、成果物間の整合を取る。
  # 参考資料の編集（maintenance）は含めない（凍結）。fully-guided は既存記述を尊重し最小修正する。
  refine-pass:
    - id: refine
      name: 磨き込み
      execution: agent
      mode: edit
      approach: fully-guided
      proficiency: expert
      task_suffix: "070"
      duration_days: 0.25 # 1〜2h 相当
      description: |
        エージェントが bootstrap で凍結した rulebook / recipe / sample / template に沿って成果物を磨き込む。
        既存記述を尊重し、不足や参考資料との不整合のみを最小限修正・補強する（全面的な書き直しはしない）。
        done_criteria を満たしているかを確認し、満たさない箇所を補う。
    - id: align
      name: 整合性確認・修正
      execution: agent
      mode: edit
      approach: fully-guided
      proficiency: expert
      task_suffix: "080"
      duration_days: 0.25 # 1〜2h 相当
      description: |
        エージェントが同一ゲート内の他成果物を参照し、用語・数値・方針の整合性を確認する。
        矛盾・不整合が見つかった場合は、既存記述を尊重しつつ最小限の修正で整える。
        他成果物への修正提案が必要な場合は、該当成果物の担当ロールへ差し戻しを起票する。

  # レビュー: 完成版をレビューし、完成版を根拠に参考資料を最終調整した後、人が確定する。
  # 参考資料の編集はここでの最終調整 1 回のみ（成果物は編集せず、確定は人が行う）。
  review-pass:
    - id: review
      name: 完成版レビュー
      execution: agent
      mode: review
      approach: fully-guided
      proficiency: normal
      task_suffix: "090"
      duration_days: 0.25 # 1〜2h 相当
      description: |
        レビューエージェントが磨き込み後の内容を確認し、承認・修正指示・差し戻しを判断する。
        成果物カタログの done_criteria と関連成果物との整合性を全観点で確認する。
        差し戻しの場合は修正箇所と理由を明記する。
    - id: recipe-consolidate
      name: Recipe 最終調整
      execution: agent
      mode: edit
      approach: recipe-maintenance
      proficiency: normal
      task_suffix: "100"
      duration_days: 0.25 # 1〜2h 相当
      description: |
        レビュー済みの完成版成果物と review 結果を根拠に recipe を最終調整する。
        完成版の作成に有効だったか、過不足がないかを確認し、必要な箇所のみ修正する。
        成果物固有の事情は一般化し、recipe に持ち込まない。
    - id: rulebook-consolidate
      name: Rulebook 最終調整
      execution: agent
      mode: edit
      approach: rulebook-maintenance
      proficiency: normal
      task_suffix: "110"
      duration_days: 0.25 # 1〜2h 相当
      description: |
        レビュー済みの完成版成果物と review 結果を根拠に rulebook を最終調整する。
        章構成・必須項目・禁止事項・判定基準が完成版に対して妥当か確認し、必要な箇所のみ修正する。
        成果物固有の事情は一般化し、rulebook に持ち込まない。
    - id: sample-consolidate
      name: Sample 最終調整
      execution: agent
      mode: edit
      approach: sample-maintenance
      proficiency: normal
      task_suffix: "120"
      duration_days: 0.25 # 1〜2h 相当
      description: |
        レビュー済みの完成版成果物と review 結果を根拠に sample を最終調整する。
        粒度・文体・表の書き方と完成例としての妥当性を確認し、必要な箇所のみ修正する。
        プロジェクト固有の値は一般化またはプレースホルダ化し、再利用可能な例にする。
    - id: template-consolidate
      name: Template 最終調整
      execution: agent
      mode: edit
      approach: template-maintenance
      proficiency: normal
      task_suffix: "130"
      duration_days: 0.25 # 1〜2h 相当
      description: |
        レビュー済みの完成版成果物と review 結果を根拠に template を最終調整する。
        章構成の骨組み・プレースホルダの配置と網羅性・雛形としての妥当性を確認し、必要な箇所のみ修正する。
        成果物固有の内容は template に持ち込まず、同種成果物の開始点として再利用できる形にする。
    - id: finalize
      name: 完成版確定
      execution: human
      mode: edit
      task_suffix: "140"
      duration_days: 0.125 # 0.5〜1h 相当
      description: |
        担当ロールがレビュー後の内容を最終確認し、完成版として確定する。
        frontmatter の status を ready に更新する。

# owner_rule に phase_sets を省略した場合のデフォルト（適用順）
default_phase_sets:
  - phase_set: bootstrap-pass
    iterations: 1
  - phase_set: refine-pass
    iterations: 2
  - phase_set: review-pass

# 成果物 local_id → 作成タスクの owner ロール・phase_set・難易度
# difficulty はプロジェクト管理上の工数・品質リスクの目安。
owner_rules:
  - local_ids:
      - prj-overview
      - prj-stakeholder-register
      - prj-scope
      - prj-success-criteria-and-acceptance-criteria
      - prj-issues-and-approach
    owner: BA

  - local_ids:
      - prj-assumptions-constraints-dependencies
    owner: ARC

  - local_ids:
      - prj-comparison-of-alternatives
    owner: ARC

  - local_ids:
      - prj-charter
    owner: PO

  - local_ids:
      - pm-plan
      - pm-communication-plan
      - pm-raci
      - pm-quality-management-plan
    owner: PM

  - local_ids:
      - sch-milestones
      - sch-track-launch
      - sch-strategy-launch
    owner: PM

  - local_ids:
      - pm-organization
      - pm-roles
      - pm-members
    owner: PO

  - local_ids:
      - sch-defaults
    owner: ARC

phase_gates:
  - id: G-LAUNCH-bootstrap-pass
    name: bootstrap-pass 完了
    artifact_name: 全ドメイン
    after_phase_sets: [bootstrap-pass]
    owner: PM
    scope:
      catalogs:
        - prj-0001:dct-project-definition
        - prj-0001:dct-project-management

  - id: G-LAUNCH-refine-pass
    name: refine-pass 完了
    artifact_name: 全ドメイン
    after_phase_sets: [refine-pass]
    owner: PM
    scope:
      catalogs:
        - prj-0001:dct-project-definition
        - prj-0001:dct-project-management

group_milestones:
  - catalog_id: prj-0001:dct-project-definition
    milestone:
      id: M-LAUNCH-project-definition
      name: ドメイン完了
      artifact_name: プロジェクト定義
      owner: PM

  - catalog_id: prj-0001:dct-project-management
    milestone:
      id: M-LAUNCH-project-management
      name: ドメイン完了
      artifact_name: プロジェクト・マネジメント
      owner: PM

# catalog の depends_on を補完するドメイン間依存
# ゲート前の順序を定義する: dependent の draft タスクは requires の編集パス完了後に着手する
# 完了済み成果物（initial_state）は 000 タスクにフォールバックする
cross_domain_dependencies:
  - dependent: pm-organization
    requires: prj-overview

# 初期状態で作成済みの成果物を登録する
# completed_through を省略した場合は全フェーズ完了（最終フェーズまで done）とみなす
# completed_through には phase_sets[<name>][].id を指定する
# by には pm-members.yaml の nickname を指定する
initial_state:
  completed_deliverables:
    - local_id: sch-defaults
      completed_on: "2026-06-14"
      by: indie
      note: 初期投入時点で作成済み
    - local_id: sch-strategy-launch
      completed_on: "2026-06-14"
      by: indie
      note: 初期投入時点で作成済み
    - local_id: prj-overview
      completed_on: "2026-06-14"
      by: indie
      note: 初期投入時点で作成済み
