kind: strategy
id: prj-0001:sch-strategy-launch
type: project
status: draft
track: launch

# sch-track-launch.yaml を生成するための戦略定義。
# scope の catalog から kind: work の成果物を抽出し、
# phase_sets と owner_rules を基にタスクを生成する。
#
# owner はロール（BA / PO 等）のみを持つ。
# 実際の実行者（--by <nickname>）は実行時に pm-members.yaml の roles フィールドと照合して決定する。
#
# AI エージェントの選択は このファイルには持たない。
# exec-strategy-launch.yaml で (phase_set, phase.id, difficulty) を
# pm-members.yaml のエージェントにマッピングする。

settings:
  start_date: "2026-05-24"

scope:
  catalogs:
    - id: prj-0001:dct-project-definition
      path: /docs/ja/projects/prj-0001/010-deliverables-catalog/dct-project-definition.yaml
    - id: prj-0001:dct-project-management
      path: /docs/ja/projects/prj-0001/010-deliverables-catalog/dct-project-management.yaml
  include_kinds:
    - work

# named phase sets（作業フローで分類する）
# Markdown・YAML 問わず同じフェーズを使う。
# バリデーションはエージェントが各フェーズの作業に組み込んで実行するため、
# 独立した validate フェーズは設けない。
# AI モデル・エージェントの設定は exec-agent.yaml に委ねる。
#
# execution フィールド（省略時は auto）:
#   auto   : exec-agent.yaml の tier_routing に従いエージェントが実行する
#   manual : エージェントを起動せず、人間による実行待ちとして記録する
#
# フローは first-pass → finalize-pass の2段階。
#   first-pass  : 各成果物の一次版を作成する（人がたたき台 → エージェントが補強 → 人がレビュー）
#   finalize-pass: 一次版が揃ってから成果物間の整合性を確認し完成版にする
#                  （align は他成果物の一次版を参照して実施する）
phase_sets:
  # 一次版フロー: 人がたたき台 → エージェントが外部情報で補強 → 人がレビュー
  first-pass:
    - id: draft
      name: たたき台作成
      execution: human
      task_suffix: "010"
      duration_days: 0.25 # 1〜2h 相当
      description: |
        担当ロールが成果物の初版を作成する。
        章構成・記載項目を決め、現時点で把握している情報を埋める。
        調査・確認が必要な箇所は TODO として明示したまま残す。
    - id: enrich
      name: 調査・補強
      execution: agent
      task_suffix: "020"
      duration_days: 0.5 # 2〜4h 相当（外部調査込み）
      description: |
        エージェントが外部情報・関連ドキュメントを調査し、たたき台の TODO を埋めて内容を補強する。
        既存記述との矛盾・抜け漏れも確認し、修正・追記する。
        調査結果は出典・根拠とともに記載する。
    - id: review
      name: 一次版レビュー
      execution: human
      task_suffix: "030"
      duration_days: 0.25 # 1〜2h 相当
      description: |
        担当ロールが補強後の内容を確認し、承認・修正指示・差し戻しを判断する。
        修正が軽微な場合は直接編集して承認とみなす。
        差し戻しの場合は修正箇所と理由を明記する。

  # 調査系一次版フロー: 人が予備調査を含めたたき台 → エージェントが外部情報で深掘り → 人がレビュー
  # 比較検討・代替案評価など、外部情報収集が品質に直結する成果物に使う
  research-first-pass:
    - id: draft
      name: たたき台作成（予備調査含む）
      execution: human
      task_suffix: "010"
      duration_days: 0.5 # 2〜4h 相当（人による予備調査込み）
      description: |
        担当ロールが予備調査を行ったうえで初版を作成する。
        比較対象の選択肢を洗い出し、比較軸・評価観点を設定する。
        各選択肢の概要と既知の特徴を記載し、深掘りが必要な箇所を TODO として残す。
    - id: enrich
      name: 調査・深掘り
      execution: agent
      task_suffix: "020"
      duration_days: 0.5 # 2〜4h 相当（外部調査込み）
      description: |
        エージェントが各選択肢を外部情報で深掘りし、比較表・評価根拠を補強する。
        公式ドキュメント・事例・実績データを調査し、TODO を埋める。
        調査結果は出典・根拠とともに記載する。
    - id: review
      name: 一次版レビュー
      execution: human
      task_suffix: "030"
      duration_days: 0.25 # 1〜2h 相当
      description: |
        担当ロールが比較内容の妥当性・網羅性を確認し、承認・修正指示・差し戻しを判断する。
        修正が軽微な場合は直接編集して承認とみなす。
        差し戻しの場合は修正箇所と理由を明記する。

  # 完成版フロー: エージェントが成果物間の整合性を確認・修正 → 人が最終確定
  finalize-pass:
    - id: align
      name: 整合性確認・修正
      execution: agent
      task_suffix: "040"
      duration_days: 0.25 # 1〜2h 相当
      description: |
        エージェントが同一ゲート内の他成果物（一次版）を参照し、用語・数値・方針の整合性を確認する。
        矛盾・不整合が見つかった場合は修正し、修正箇所と理由を記録する。
        他成果物への修正提案が必要な場合は、該当成果物の担当ロールへ差し戻しを起票する。
    - id: finalize
      name: 完成版確定
      execution: human
      task_suffix: "050"
      duration_days: 0.125 # 0.5〜1h 相当
      description: |
        担当ロールが整合性確認後の内容を最終確認し、完成版として確定する。
        frontmatter の status を ready に更新する。

# owner_rule に phase_sets を省略した場合のデフォルト（適用順）
default_phase_sets: [first-pass, finalize-pass]

# 成果物 local_id → 作成タスクの owner ロール・phase_set・難易度
# difficulty はプロジェクト管理上の工数・品質リスクの目安。
# exec-agent.yaml の difficulty_overrides でエージェント tier 昇格にも使われる。
owner_rules:
  - local_ids:
      - prj-overview
      - prj-stakeholder-register
      - prj-scope
      - prj-success-criteria-and-acceptance-criteria
      - prj-issues-and-approach
    owner: BA

  - local_ids:
      - prj-assumptions-constraints-dependencies
    owner: ARC

  - local_ids:
      - prj-comparison-of-alternatives
    owner: ARC
    phase_sets: [research-first-pass, finalize-pass]

  - local_ids:
      - prj-charter
    owner: PO

  - local_ids:
      - pm-plan
      - pm-communication-plan
      - pm-raci
      - pm-quality-management-plan
    owner: PM

  - local_ids:
      - sch-milestones
      - sch-track-launch
      - sch-strategy-launch
    owner: PM

  - local_ids:
      - pm-organization
      - pm-roles
      - pm-members
    owner: PO

  - local_ids:
      - sch-defaults
    owner: ARC

phase_gates:
  - id: G-LAUNCH-first-pass
    name: first-pass 完了
    artifact_name: 全ドメイン
    after_phase_sets: [first-pass, research-first-pass] # prj-comparison-of-alternatives は research-first-pass を使用
    owner: PM
    scope:
      catalogs:
        - prj-0001:dct-project-definition
        - prj-0001:dct-project-management

group_milestones:
  - catalog_id: prj-0001:dct-project-definition
    milestone:
      id: M-LAUNCH-project-definition
      name: ドメイン完了
      artifact_name: プロジェクト定義
      owner: PM

  - catalog_id: prj-0001:dct-project-management
    milestone:
      id: M-LAUNCH-project-management
      name: ドメイン完了
      artifact_name: プロジェクト・マネジメント
      owner: PM

# catalog の depends_on を補完するドメイン間依存
# ゲート前の順序を定義する: dependent の draft タスクは requires の first-pass (review) 完了後に着手する
# 完了済み成果物（initial_state）は 000 タスクにフォールバックする
cross_domain_dependencies:
  - dependent: pm-organization
    requires: prj-overview

# 初期状態で作成済みの成果物を登録する
# completed_through を省略した場合は全フェーズ完了（最終フェーズまで done）とみなす
# completed_through には phase_sets[<name>][].id を指定する
# by には pm-members.yaml の nickname を指定する
initial_state:
  completed_deliverables:
    - local_id: sch-defaults
      completed_on: "2026-05-23"
      by: indie
      note: 初期投入時点で作成済み
    - local_id: sch-strategy-launch
      completed_on: "2026-05-23"
      by: indie
      note: 初期投入時点で作成済み
