kind: strategy
id: prj-0001:sch-strategy-launch
type: project
status: draft
track: launch

# sch-track-launch.yaml を生成するための戦略定義。
# scope の catalog から kind: work の成果物を抽出し、
# phase_sets と owner_rules を基にタスクを生成する。
#
# owner はロール（BA / PO 等）のみを持つ。
# 実際の実行者（--by <nickname>）は実行時に pm-members.yaml の roles フィールドと照合して決定する。
#
# AI エージェントの作業要件は phase に直接持つ。
# execution: agent の phase に capabilities / proficiency を指定し、
# exec run --auto が pm-members.yaml のエージェントにマッピングする。

settings:
  start_date: "2026-05-24"

scope:
  catalogs:
    - id: prj-0001:dct-project-definition
      path: /docs/ja/projects/prj-0001/010-deliverables-catalog/dct-project-definition.yaml
    - id: prj-0001:dct-project-management
      path: /docs/ja/projects/prj-0001/010-deliverables-catalog/dct-project-management.yaml
  include_kinds:
    - work

# named phase sets（作業フローで分類する）
# Markdown・YAML 問わず同じフェーズを使う。
# バリデーションはエージェントが各フェーズの作業に組み込んで実行するため、
# 独立した validate フェーズは設けない。
# AI モデル・エージェントの実行時共通設定は exec-defaults.yaml に委ねる。
#
# execution フィールド（省略時は agent）:
#   agent : phase の capabilities / proficiency に合うエージェントが実行する
#   human : エージェントを起動せず、人間による実行待ちとして記録する
#
# フローは first-edit-pass → alignment-edit-pass → review-pass の3段階。
#   first-edit-pass    : 成果物の初版作成・補強と参考資料メンテナンスを3回繰り返す
#   alignment-edit-pass: 成果物間の整合性確認・修正と参考資料メンテナンスを3回繰り返す
#   review-pass        : エージェントが完成版をレビューし、人が最終確定する
phase_sets:
  # 初回編集フロー: エージェントがたたき台を作成し、補強と参考資料メンテナンスを行う
  first-edit-pass:
    - id: draft
      name: たたき台作成
      execution: agent
      mode: edit
      approach: freeform
      proficiency: expert
      task_suffix: "010"
      duration_days: 0.25 # 1〜2h 相当
      description: |
        エージェントが成果物の初版を作成する。
        章構成・記載項目を決め、現時点で把握している情報を埋める。
        調査・確認が必要な箇所は TODO として明示したまま残す。
    - id: enrich
      name: 調査・補強
      execution: agent
      mode: edit
      approach: recipe-guided
      capabilities: [web_search]
      proficiency: normal
      task_suffix: "020"
      duration_days: 0.5 # 2〜4h 相当（外部調査込み）
      description: |
        エージェントが外部情報・関連ドキュメントを調査し、たたき台の TODO を埋めて内容を補強する。
        既存記述との矛盾・抜け漏れも確認し、修正・追記する。
        調査結果は出典・根拠とともに記載する。
    - id: recipe-maintenance
      name: Recipe メンテナンス
      execution: agent
      mode: edit
      approach: recipe-maintenance
      proficiency: normal
      task_suffix: "030"
      duration_days: 0.25 # 1〜2h 相当
      description: |
        エージェントが成果物の作成・更新結果を根拠に recipe を見直す。
        問い・観点・深掘り手順・レビュー観点の不足や過剰を確認し、必要な修正を反映する。
        成果物固有の事情は recipe に一般化せず、再利用できる作成手順として整理する。
    - id: rulebook-maintenance
      name: Rulebook メンテナンス
      execution: agent
      mode: edit
      approach: rulebook-maintenance
      proficiency: normal
      task_suffix: "040"
      duration_days: 0.25 # 1〜2h 相当
      description: |
        エージェントが成果物の作成・更新結果を根拠に rulebook を見直す。
        章構成・必須項目・禁止事項・判定基準の不足や過剰を確認し、必要な修正を反映する。
        成果物固有の事情は rulebook に一般化せず、同種成果物へ適用できる規定として整理する。
    - id: sample-maintenance
      name: Sample メンテナンス
      execution: agent
      mode: edit
      approach: sample-maintenance
      proficiency: normal
      task_suffix: "050"
      duration_days: 0.25 # 1〜2h 相当
      description: |
        エージェントが成果物の作成・更新結果を根拠に sample を見直す。
        粒度・文体・表の書き方と、完成例としての妥当性を確認し、必要な修正を反映する。
        プロジェクト固有の値は一般化またはプレースホルダ化し、再利用可能な例として整える。
    - id: template-maintenance
      name: Template メンテナンス
      execution: agent
      mode: edit
      approach: template-maintenance
      proficiency: normal
      task_suffix: "060"
      duration_days: 0.25 # 1〜2h 相当
      description: |
        エージェントが成果物の作成・更新結果を根拠に template を見直す。
        章構成の骨組み・プレースホルダの配置と網羅性・雛形としての妥当性を確認し、必要な修正を反映する。
        成果物固有の内容は template に持ち込まず、同種成果物の開始点として再利用できる形に整える。

  # 整合編集フロー: エージェントが成果物間の整合性を確認・修正し、参考資料を再調整する
  alignment-edit-pass:
    - id: align
      name: 整合性確認・修正
      execution: agent
      mode: edit
      approach: fully-guided
      proficiency: expert
      task_suffix: "070"
      duration_days: 0.25 # 1〜2h 相当
      description: |
        エージェントが同一ゲート内の他成果物（一次版）を参照し、用語・数値・方針の整合性を確認する。
        矛盾・不整合が見つかった場合は修正し、修正箇所と理由を記録する。
        他成果物への修正提案が必要な場合は、該当成果物の担当ロールへ差し戻しを起票する。
    - id: recipe-maintenance
      name: Recipe メンテナンス
      execution: agent
      mode: edit
      approach: recipe-maintenance
      proficiency: normal
      task_suffix: "080"
      duration_days: 0.25 # 1〜2h 相当
      description: |
        エージェントが整合性確認・修正後の成果物を根拠に recipe を再確認する。
        問い・観点・深掘り手順・レビュー観点が完成版の作成に有効か確認し、必要な修正を反映する。
        成果物固有の事情は recipe に一般化せず、再利用できる作成手順として整理する。
    - id: rulebook-maintenance
      name: Rulebook メンテナンス
      execution: agent
      mode: edit
      approach: rulebook-maintenance
      proficiency: normal
      task_suffix: "090"
      duration_days: 0.25 # 1〜2h 相当
      description: |
        エージェントが整合性確認・修正後の成果物を根拠に rulebook を再確認する。
        章構成・必須項目・禁止事項・判定基準が完成版に対して妥当か確認し、必要な修正を反映する。
        成果物固有の事情は rulebook に一般化せず、同種成果物へ適用できる規定として整理する。
    - id: sample-maintenance
      name: Sample メンテナンス
      execution: agent
      mode: edit
      approach: sample-maintenance
      proficiency: normal
      task_suffix: "100"
      duration_days: 0.25 # 1〜2h 相当
      description: |
        エージェントが整合性確認・修正後の成果物を根拠に sample を再確認する。
        粒度・文体・表の書き方と、完成例としての妥当性を確認し、必要な修正を反映する。
        プロジェクト固有の値は一般化またはプレースホルダ化し、再利用可能な例として整える。
    - id: template-maintenance
      name: Template メンテナンス
      execution: agent
      mode: edit
      approach: template-maintenance
      proficiency: normal
      task_suffix: "110"
      duration_days: 0.25 # 1〜2h 相当
      description: |
        エージェントが整合性確認・修正後の成果物を根拠に template を再確認する。
        章構成の骨組み・プレースホルダの配置と網羅性・雛形としての妥当性を確認し、必要な修正を反映する。
        成果物固有の内容は template に持ち込まず、同種成果物の開始点として再利用できる形に整える。

  # レビューフロー: エージェントが完成版をレビューし、人が最終確定する
  review-pass:
    - id: review
      name: 完成版レビュー
      execution: agent
      mode: review
      approach: fully-guided
      proficiency: normal
      task_suffix: "120"
      duration_days: 0.25 # 1〜2h 相当
      description: |
        レビューエージェントが補強・整合性確認後の内容を確認し、承認・修正指示・差し戻しを判断する。
        成果物カタログの done_criteria と関連成果物との整合性を全観点で確認する。
        差し戻しの場合は修正箇所と理由を明記する。
    - id: finalize
      name: 完成版確定
      execution: human
      mode: edit
      task_suffix: "130"
      duration_days: 0.125 # 0.5〜1h 相当
      description: |
        担当ロールがレビュー後の内容を最終確認し、完成版として確定する。
        frontmatter の status を ready に更新する。

# owner_rule に phase_sets を省略した場合のデフォルト（適用順）
default_phase_sets:
  - phase_set: first-edit-pass
    iterations: 3
  - phase_set: alignment-edit-pass
    iterations: 3
  - phase_set: review-pass

# 成果物 local_id → 作成タスクの owner ロール・phase_set・難易度
# difficulty はプロジェクト管理上の工数・品質リスクの目安。
owner_rules:
  - local_ids:
      - prj-overview
      - prj-stakeholder-register
      - prj-scope
      - prj-success-criteria-and-acceptance-criteria
      - prj-issues-and-approach
    owner: BA

  - local_ids:
      - prj-assumptions-constraints-dependencies
    owner: ARC

  - local_ids:
      - prj-comparison-of-alternatives
    owner: ARC

  - local_ids:
      - prj-charter
    owner: PO

  - local_ids:
      - pm-plan
      - pm-communication-plan
      - pm-raci
      - pm-quality-management-plan
    owner: PM

  - local_ids:
      - sch-milestones
      - sch-track-launch
      - sch-strategy-launch
    owner: PM

  - local_ids:
      - pm-organization
      - pm-roles
      - pm-members
    owner: PO

  - local_ids:
      - sch-defaults
    owner: ARC

phase_gates:
  - id: G-LAUNCH-first-edit-pass
    name: first-edit-pass 完了
    artifact_name: 全ドメイン
    after_phase_sets: [first-edit-pass]
    owner: PM
    scope:
      catalogs:
        - prj-0001:dct-project-definition
        - prj-0001:dct-project-management

  - id: G-LAUNCH-alignment-edit-pass
    name: alignment-edit-pass 完了
    artifact_name: 全ドメイン
    after_phase_sets: [alignment-edit-pass]
    owner: PM
    scope:
      catalogs:
        - prj-0001:dct-project-definition
        - prj-0001:dct-project-management

group_milestones:
  - catalog_id: prj-0001:dct-project-definition
    milestone:
      id: M-LAUNCH-project-definition
      name: ドメイン完了
      artifact_name: プロジェクト定義
      owner: PM

  - catalog_id: prj-0001:dct-project-management
    milestone:
      id: M-LAUNCH-project-management
      name: ドメイン完了
      artifact_name: プロジェクト・マネジメント
      owner: PM

# catalog の depends_on を補完するドメイン間依存
# ゲート前の順序を定義する: dependent の draft タスクは requires の編集パス完了後に着手する
# 完了済み成果物（initial_state）は 000 タスクにフォールバックする
cross_domain_dependencies:
  - dependent: pm-organization
    requires: prj-overview

# 初期状態で作成済みの成果物を登録する
# completed_through を省略した場合は全フェーズ完了（最終フェーズまで done）とみなす
# completed_through には phase_sets[<name>][].id を指定する
# by には pm-members.yaml の nickname を指定する
initial_state:
  completed_deliverables:
    - local_id: sch-defaults
      completed_on: "2026-05-23"
      by: indie
      note: 初期投入時点で作成済み
    - local_id: sch-strategy-launch
      completed_on: "2026-05-23"
      by: indie
      note: 初期投入時点で作成済み
