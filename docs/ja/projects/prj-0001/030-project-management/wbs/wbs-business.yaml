    component: acceptance
    deliverable:
      id: bac-rulebook
      path: docs/ja/specdojo/rulebooks/bac-rulebook.md
    done_criteria:
      - BAC ルールブックが必須章構成・禁止事項を満たし、npm run -s lint:md が通ること。

  - id: WBS-BIZ-BAC-INSTRUCTION
    name: BAC instruction の整備
    component: acceptance
    depends_on:
      - bac-rulebook
    deliverable:
      id: bac-instruction
      path: docs/ja/specdojo/instructions/bac-instruction.md
    done_criteria:
      - BAC instruction が対応 rulebook と整合し、npm run -s lint:md が通ること。

  - id: WBS-BIZ-BAC-SAMPLE
    name: BAC sample の整備
    component: acceptance
    depends_on:
      - bac-instruction
    deliverable:
      id: bac-sample
      path: docs/ja/specdojo/samples/bac-sample.md
    done_criteria:
      - BAC sample が instruction の要件を満たし、npm run -s lint:md と docs:build が通ること。
