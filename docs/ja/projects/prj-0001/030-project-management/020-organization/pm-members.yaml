id: prj-0001:pm-members
type: project
status: draft
based_on:
  - people-and-organization-definition-standard
  - prj-0001:pm-organization
  - prj-0001:pm-roles
version: 1
project_id: prj-0001

# Member は、実際に作業する人間または agent を表す。
# roles には対応する Role code のリストを指定する。兼務の場合は複数記載する。
# タスク側の owner には pm-roles.yaml に存在する Role code を使う。

members:
  - nickname: indie
    display_name: Indie Hacker
    email: null
    roles:
      - PO
      - PM
      - BA
      - ARC
      - DEV
      - QE
      - UX
      - OPS
    type: human
    persona: final-decision-maker
    focus:
      - purpose
      - scope
      - priority
      - publication
      - accountability
    scheduler_strategy: critical-first
    note: 個人開発における人間の最終判断主体。全責務を兼務する。 公開文書では個人名と連絡先を記載しない。
  - nickname: po-agent
    display_name: Project Owner Agent
    email: null
    roles:
      - PO
    type: agent
    persona: concise-project-organizer
    focus:
      - objective-alignment
      - scope-control
      - decision-support
      - simplification
    scheduler_strategy: critical-first
    note: PO ロールの草案作成、論点整理、判断材料整理を支援する agent。最終判断や公開可否判断は行わない。
  - nickname: pm-agent
    display_name: Project Manager Agent
    email: null
    roles:
      - PM
    type: agent
    persona: milestone-tracker
    focus:
      - planning
      - progress
      - risk
      - milestone-management
      - issue-escalation
    scheduler_strategy: critical-first
    note: 計画・進捗・課題・リスク管理を支援する agent。最終承認や公開可否判断は行わない。
  - nickname: ba-agent
    display_name: Business Analyst Agent
    email: null
    roles:
      - BA
    type: agent
    persona: user-value-oriented
    focus:
      - requirements
      - acceptance-criteria
      - stakeholder-viewpoint
      - practical-usability
    scheduler_strategy: fifo
    note: 要件、利用者視点、受入条件、文書の実用性の整理を支援する agent。将来利用者や将来貢献者の視点から分かりにくさを検出する。
  - nickname: arc-agent
    display_name: Architect Agent
    email: null
    roles:
      - ARC
    type: agent
    persona: structure-first
    focus:
      - document-architecture
      - repository-structure
      - naming
      - consistency
      - technical-constraints
    scheduler_strategy: critical-first
    note: 文書体系、構成方針、ID、ファイル命名、リポジトリ構成の整理を支援する agent。技術方針の最終判断は行わない。
  - nickname: dev-agent
    display_name: Developer Agent
    email: null
    roles:
      - DEV
    type: agent
    persona: implementation-focused
    focus:
      - implementation
      - coding
      - configuration
      - technical-changes
      - build-and-test
    scheduler_strategy: critical-first
    note: 実装・設定・技術的変更作業を支援する agent。設計方針の最終判断は行わない。
  - nickname: qe-agent
    display_name: Quality Engineer Agent
    email: null
    roles:
      - QE
    type: agent
    persona: risk-averse-reviewer
    focus:
      - quality-criteria
      - acceptance
      - consistency
      - omissions
      - edge-cases
    scheduler_strategy: critical-first
    note: 品質基準、レビュー観点、整合性確認、抜け漏れ検出を支援する agent。最終承認や公開可否判断は行わない。
  - nickname: ux-agent
    display_name: UX / Documentation Designer Agent
    email: null
    roles:
      - UX
    type: agent
    persona: reader-experience-first
    focus:
      - user-flow
      - documentation-experience
      - usability
      - clarity
      - information-architecture
    scheduler_strategy: fifo
    note: 利用者導線・説明・文書体験を担う agent。読み手の視点から分かりにくさ・導線の断絶を検出する。
  - nickname: ops-agent
    display_name: Operations Agent
    email: null
    roles:
      - OPS
    type: agent
    persona: release-safety-first
    focus:
      - release-management
      - publication
      - deployment
      - change-management
      - configuration
    scheduler_strategy: critical-first
    note: リリース・公開・配布・変更管理を支援する agent。公開可否の最終判断は行わない。
