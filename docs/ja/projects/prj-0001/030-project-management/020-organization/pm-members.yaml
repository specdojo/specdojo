    capabilities: [web_search]
    scheduler_strategy: fifo
    note: Claude Code CLI を使用する高性能レビューエージェント。done_criteria の roles フィールドを参照し、全観点で成果物レビューを支援する。最終判断は行わない。モデル・ツールは .claude/agents/claude-expert-review-agent.md、権限は .specdojo/claude/settings.review.json で定義。

  #
  # codex members
  #
  - nickname: codex-edit-agent
    disabled: false
    priority: 2
    display_name: Codex Edit Agent
    email: null
    roles: []
    type: agent
    provider: codex
    mode: edit
    proficiency: normal
