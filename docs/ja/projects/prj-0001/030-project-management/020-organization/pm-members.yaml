  #
  # copilot members
  #

  - nickname: copilot-edit-agent
    disabled: true
    priority: 4
    display_name: Copilot Edit Agent
    email: null
    roles: []
    type: agent
    provider: copilot
    mode: edit
    proficiency: normal
    persona: task-executor
    focus:
      - task-execution
      - document-creation
      - implementation
    capabilities: []
    scheduler_strategy: critical-first
    note: GitHub Copilot CLI を使用する標準エージェント。ツールは許可リスト方式で、shell は読み取り系・検証系のみ、git の変更系は deny する。パスはデフォルト制限で worktree 配下に限定される。URL アクセスは許可しないため web_search capability を持たない。最終判断は行わない。権限設計は specdojo-exec-config-guide の「agent 権限とプロンプトインジェクション対策」を正とする。

  - nickname: copilot-review-agent
    disabled: true
    priority: 4
    display_name: Copilot Review Agent
    email: null
    roles: []
    type: agent
    provider: copilot
    mode: review
    proficiency: normal
    persona: multi-viewpoint-reviewer
    focus:
      - done-criteria-verification
      - cross-viewpoint-consistency
      - quality-assurance
    capabilities: []
    scheduler_strategy: fifo
    note: GitHub Copilot CLI を使用するレビューエージェント。write はパス単位に絞れないため result 記入用に許可し、成果物変更の境界は specdojo CLI の commit 許可リスト（review は result のみ）で作る。URL アクセスは許可しないため web_search capability を持たない。最終判断は行わない。権限設計は specdojo-exec-config-guide の「agent 権限とプロンプトインジェクション対策」を正とする。

rules:
  - Schedule の owner には pm-roles.yaml に記載された Role code を使用し、member nickname は書かない。
  - specdojo exec --by には members[].nickname を指定し、実行ログ記録後の nickname は変更しない。
  - members[].roles は member が対応できる Role code を表し、Schedule の owner の代替として使わない。
  - 汎用 agent の roles は空配列とし、実行時のタスク owner または plan で対象 Role を補う。
  - agent は草案作成、レビュー支援、整合性確認、機械的更新を支援するが、最終承認、公開可否判断、説明責任は人間の PO が担う。
  - 起動コマンドは .specdojo/exec-defaults.yaml の providers.<provider>.command_template から解決し、member の command はテンプレートを持たない構成に限って上書きとして使う。
  - command を上書きする場合も、認証情報、秘密鍵、トークン、個人環境に閉じたパスを記載しない。
  - 公開文書には個人名、私用メールアドレス、非公開組織情報、アクセス情報を記載しない。
