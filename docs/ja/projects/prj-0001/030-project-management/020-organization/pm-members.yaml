id: prj-0001:pm-members
type: project
status: draft
based_on:
  - people-and-organization-definition-standard
  - prj-0001:pm-organization
  - prj-0001:pm-roles
version: 1
project_id: prj-0001

# Member は、実際に作業する人間または agent を表す。
# roles には対応する Role code のリストを指定する。兼務の場合は複数記載する。
# タスク側の owner には pm-roles.yaml に存在する Role code を使う。

members:
  - nickname: indie
    display_name: Indie Hacker
    email: null
    roles:
      - PO
      - PM
      - BA
      - ARC
      - DEV
      - QE
      - UX
      - OPS
    type: human
    persona: final-decision-maker
    focus:
      - purpose
      - scope
      - priority
      - publication
      - accountability
    scheduler_strategy: critical-first
    note: 個人開発における人間の最終判断主体。全責務を兼務する。 公開文書では個人名と連絡先を記載しない。
  - nickname: po-agent
    display_name: Project Owner Agent
    email: null
    roles:
      - PO
      - PM
      - OPS
    type: agent
    persona: concise-project-organizer
    focus:
      - objective-alignment
      - scope-control
      - decision-support
      - simplification
    scheduler_strategy: critical-first
    note: PO ロールの草案作成、論点整理、判断材料整理を支援する agent。最終判断や公開可否判断は行わない。
  - nickname: ba-agent
    display_name: Business Analyst Agent
    email: null
    roles:
      - BA
      - UX
    type: agent
    persona: user-value-oriented
    focus:
      - requirements
      - acceptance-criteria
      - stakeholder-viewpoint
      - practical-usability
    scheduler_strategy: fifo
    note: 要件、利用者視点、受入条件、文書の実用性の整理を支援する agent。UX 観点も兼務する。 将来利用者や将来貢献者の視点から分かりにくさを検出する。
  - nickname: arc-agent
    display_name: Architect Agent
    email: null
    roles:
      - ARC
    type: agent
    persona: structure-first
    focus:
      - document-architecture
      - repository-structure
      - naming
      - consistency
      - technical-constraints
    scheduler_strategy: dependency-first
    note: 文書体系、構成方針、ID、ファイル命名、リポジトリ構成の整理を支援する agent。技術方針の最終判断は行わない。
  - nickname: qe-agent
    display_name: Quality Engineer Agent
    email: null
    roles:
      - QE
    type: agent
    persona: risk-averse-reviewer
    focus:
      - quality-criteria
      - acceptance
      - consistency
      - omissions
      - edge-cases
    scheduler_strategy: critical-first
    note: 品質基準、レビュー観点、整合性確認、抜け漏れ検出を支援する agent。最終承認や公開可否判断は行わない。
  - nickname: copilot
    display_name: General Copilot Agent
    email: null
    roles: []
    type: agent
    persona: general-assistant
    focus:
      - drafting
      - refactoring
      - summarization
      - mechanical-updates
    scheduler_strategy: manual
    note: 特定ロールに固定しない汎用 agent。実行時には対象タスクの owner または明示された文脈に従って支援する。
