      - document-creation
      - implementation
    capabilities: [web_search]
    command: "claude -p --verbose --permission-mode bypassPermissions --agent claude-edit-agent"
    scheduler_strategy: critical-first
    note: Claude Code CLI を使用する標準エージェント。成果物の新規作成・実装・外部 Web 情報参照が必要なタスクを担当する。モデル・ツール・権限は .claude/agents/claude-edit-agent.md で定義。

  - nickname: claude-review-agent
    disabled: true
    priority: 3
    display_name: Claude Review Agent
    email: null
    roles: []
    type: agent
    provider: claude
    mode: review
    proficiency: normal
    persona: multi-viewpoint-reviewer
    focus:
      - done-criteria-verification
      - cross-viewpoint-consistency
      - quality-assurance
    capabilities: [web_search]
    command: "claude -p --verbose --permission-mode bypassPermissions --agent claude-review-agent"
    scheduler_strategy: fifo
    note: Claude Code CLI を使用するレビューエージェント。done_criteria の roles フィールドを参照し、全観点で成果物をレビューする。モデル・ツール・権限は .claude/agents/claude-review-agent.md で定義。

  - nickname: claude-expert-edit-agent
    disabled: true
    priority: 2
    display_name: Claude Expert Edit Agent
    email: null
    roles: []
    type: agent
    provider: claude
    mode: edit
    proficiency: expert
    persona: task-executor
    focus:
      - task-execution
      - document-creation
      - implementation
      - complex-analysis
      - architecture-judgment
    capabilities: [web_search]
    command: "claude -p --verbose --permission-mode bypassPermissions --agent claude-expert-edit-agent"
    scheduler_strategy: critical-first
    note: Claude Code CLI を使用する高性能エージェント。複雑な分析・アーキテクチャ判断が必要なタスクを担当する。モデル・ツール・権限は .claude/agents/claude-expert-edit-agent.md で定義。

  - nickname: claude-expert-review-agent
    disabled: true
    priority: 2
    display_name: Claude Expert Review Agent
    email: null
    roles: []
    type: agent
    provider: claude
    mode: review
    proficiency: expert
    persona: multi-viewpoint-reviewer
    focus:
      - done-criteria-verification
      - cross-viewpoint-consistency
      - quality-assurance
      - complex-analysis
    capabilities: [web_search]
    command: "claude -p --verbose --permission-mode bypassPermissions --agent claude-expert-review-agent"
    scheduler_strategy: fifo
    note: Claude Code CLI を使用する高性能レビューエージェント。done_criteria の roles フィールドを参照し、全観点で成果物をレビューする。モデル・ツール・権限は .claude/agents/claude-expert-review-agent.md で定義。

  #
  # codex members
  #
  - nickname: codex-edit-agent
    disabled: false
    priority: 2
    display_name: Codex Edit Agent
    email: null
    roles: []
    type: agent
    provider: codex
    mode: edit
    proficiency: normal
    persona: task-executor
    focus:
      - task-execution
      - document-creation
      - implementation
    capabilities: [web_search]
    command: 'codex exec --ephemeral --sandbox workspace-write --model gpt-5.4-mini -c approval_policy="never" -c model_reasoning_effort="medium"'
    scheduler_strategy: critical-first
    note: Codex CLI を使用する標準worker。edit planに従って成果物とresultを更新する。モデル・reasoning effort・sandboxはcommandで指定し、共通ルールはAGENTS.md、タスク固有の手順はedit planを正本とする。.codex/agents/codex-edit-agent.tomlは親Codexが必要に応じてspawnするsubagent定義であり、このcommandから直接選択されない。

  - nickname: codex-review-agent
    disabled: false
    priority: 2
    display_name: Codex Review Agent
    email: null
    roles: []
    type: agent
    provider: codex
    mode: review
    proficiency: normal
    persona: multi-viewpoint-reviewer
    focus:
      - done-criteria-verification
      - cross-viewpoint-consistency
      - quality-assurance
    capabilities: [web_search]
    command: 'codex exec --ephemeral --sandbox workspace-write --model gpt-5.4-mini -c approval_policy="never" -c model_reasoning_effort="medium"'
    scheduler_strategy: fifo
    note: Codex CLI を使用する標準review worker。review planに従って成果物を変更せずresultのみ更新する。result更新のためworkspace-writeを使用する。.codex/agents/codex-review-agent.tomlは親Codexが必要に応じてspawnするsubagent定義であり、このcommandから直接選択されない。

  - nickname: codex-expert-edit-agent
    disabled: false
    priority: 1
    display_name: Codex Expert Edit Agent
    email: null
    roles: []
    type: agent
    provider: codex
    mode: edit
    proficiency: expert
    persona: task-executor
    focus:
      - task-execution
      - document-creation
      - implementation
      - complex-analysis
      - architecture-judgment
    capabilities: [web_search]
    command: 'codex exec --ephemeral --sandbox workspace-write --model gpt-5.5 -c approval_policy="never" -c model_reasoning_effort="high"'
    scheduler_strategy: critical-first
    note: Codex CLI を使用する高性能worker。複雑な分析・アーキテクチャ判断が必要なedit planを担当する。モデル・reasoning effort・sandboxはcommandで指定し、タスク固有の手順はedit planを正本とする。.codex/agents/codex-expert-edit-agent.tomlは親Codexが必要に応じてspawnするsubagent定義であり、このcommandから直接選択されない。

  - nickname: codex-expert-review-agent
    disabled: false
    priority: 1
    display_name: Codex Expert Review Agent
    email: null
    roles: []
    type: agent
    provider: codex
    mode: review
    proficiency: expert
    persona: multi-viewpoint-reviewer
    focus:
      - done-criteria-verification
      - cross-viewpoint-consistency
      - quality-assurance
      - complex-analysis
    capabilities: [web_search]
    command: 'codex exec --ephemeral --sandbox workspace-write --model gpt-5.5 -c approval_policy="never" -c model_reasoning_effort="high"'
    scheduler_strategy: fifo
    note: Codex CLI を使用する高性能review worker。複雑な多観点レビューを行い、成果物を変更せずresultのみ更新する。result更新のためworkspace-writeを使用する。.codex/agents/codex-expert-review-agent.tomlは親Codexが必要に応じてspawnするsubagent定義であり、このcommandから直接選択されない。

rules:
  - Schedule の owner には pm-roles.yaml に記載された Role code を使用し、member nickname は書かない。
  - specdojo exec --by には members[].nickname を指定し、実行ログ記録後の nickname は変更しない。
  - members[].roles は member が対応できる Role code を表し、Schedule の owner の代替として使わない。
  - 汎用 agent の roles は空配列とし、実行時のタスク owner または plan で対象 Role を補う。
  - agent は草案作成、レビュー支援、整合性確認、機械的更新を支援するが、最終承認、公開可否判断、説明責任は人間の PO が担う。
  - command には認証情報、秘密鍵、トークン、個人環境に閉じたパスを記載しない。
  - 公開文書には個人名、私用メールアドレス、非公開組織情報を記載しない。
