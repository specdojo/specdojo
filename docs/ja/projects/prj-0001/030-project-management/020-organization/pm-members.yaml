id: prj-0001:pm-members
type: project
status: draft
based_on:
  - people-and-organization-definition-standard
  - prj-0001:pm-organization
  - prj-0001:pm-roles
version: 1
project_id: prj-0001

# Member は、実際に作業する人間または agent を表す。
# roles には対応する Role code のリストを指定する。兼務の場合は複数記載する。
# タスク側の owner には pm-roles.yaml に存在する Role code を使う。
#
# type: agent のメンバーには command と capabilities を定義する。
# sch-strategy-<track>.yaml の phase.mode（edit / review）がタスク種別を決定する。
# capabilities はツールアクセス（web_search 等）のみを表す。edit/review は mode で指定。
#   command     : exec run が直接呼び出すシェルコマンド
#   capabilities: このエージェントが持つツール能力（web_search 等）

members:
  #
  # human members
  #

  - nickname: indie
    display_name: Indie Hacker
    email: null
    roles:
      - PO
      - PM
      - BA
      - ARC
      - DEV
      - QE
      - UX
      - OPS
    type: human
    persona: final-decision-maker
    focus:
      - purpose
      - scope
      - priority
      - publication
      - accountability
    scheduler_strategy: critical-first
    note: 個人開発における人間の最終判断主体。全責務を兼務する。公開文書では個人名と連絡先を記載しない。

  #
  # opencode members
  #

  - nickname: opencode-edit-agent
    priority: 99
    display_name: OpenCode Edit Agent
    email: null
    roles: []
    type: agent
    mode: edit
    proficiency: normal
    persona: task-executor
    focus:
      - task-execution
      - document-creation
      - implementation
    capabilities: []
    command: "opencode run --agent opencode-edit-agent"
    scheduler_strategy: critical-first
    note: OpenCode CLI とローカル Ollama を使用する標準エージェント。成果物の新規作成・文書化・実装を担当し、タスクの owner フィールドからロール文脈を判断して作業する。モデル・ツール・権限は .opencode/agents/opencode-edit-agent.md で定義。

  - nickname: opencode-review-agent
    priority: 99
    display_name: OpenCode Review Agent
    email: null
    roles: []
    type: agent
    mode: review
    proficiency: normal
    persona: multi-viewpoint-reviewer
    focus:
      - done-criteria-verification
      - cross-viewpoint-consistency
      - quality-assurance
    capabilities: []
    command: "opencode run --agent opencode-review-agent"
    scheduler_strategy: fifo
    note: OpenCode CLI とローカル Ollama を使用するレビューエージェント。done_criteria の roles フィールドを参照して全観点で成果物をレビューし、成果物は変更せず result のみ更新する。モデル・ツール・権限は .opencode/agents/opencode-review-agent.md で定義。

  #
  # claude code members
  #

  - nickname: claude-edit-agent
    priority: 10
    display_name: Claude Edit Agent
    email: null
    roles: []
    type: agent
    mode: edit
    proficiency: normal
    persona: task-executor
    focus:
      - task-execution
      - document-creation
      - implementation
    capabilities: [web_search]
    command: "claude -p --agent claude-edit-agent"
    scheduler_strategy: critical-first
    note: Claude Code CLI を使用する標準エージェント。成果物の新規作成・実装・外部 Web 情報参照が必要なタスクを担当する。モデル・ツール・権限は .claude/agents/claude-edit-agent.md で定義。

  - nickname: claude-review-agent
    priority: 10
    display_name: Claude Review Agent
    email: null
    roles: []
    type: agent
    mode: review
    proficiency: normal
    persona: multi-viewpoint-reviewer
    focus:
      - done-criteria-verification
      - cross-viewpoint-consistency
      - quality-assurance
    capabilities: [web_search]
    command: "claude -p --agent claude-review-agent"
    scheduler_strategy: fifo
    note: Claude Code CLI を使用するレビューエージェント。done_criteria の roles フィールドを参照し、全観点で成果物をレビューする。モデル・ツール・権限は .claude/agents/claude-review-agent.md で定義。

  - nickname: claude-expert-edit-agent
    priority: 20
    display_name: Claude Expert Edit Agent
    email: null
    roles: []
    type: agent
    mode: edit
    proficiency: expert
    persona: task-executor
    focus:
      - task-execution
      - document-creation
      - implementation
      - complex-analysis
      - architecture-judgment
    capabilities: [web_search]
    command: "claude -p --agent claude-expert-edit-agent"
    scheduler_strategy: critical-first
    note: Claude Code CLI を使用する高性能エージェント。複雑な分析・アーキテクチャ判断が必要なタスクを担当する。モデル・ツール・権限は .claude/agents/claude-expert-edit-agent.md で定義。

  - nickname: claude-expert-review-agent
    priority: 20
    display_name: Claude Expert Review Agent
    email: null
    roles: []
    type: agent
    mode: review
    proficiency: expert
    persona: multi-viewpoint-reviewer
    focus:
      - done-criteria-verification
      - cross-viewpoint-consistency
      - quality-assurance
      - complex-analysis
    capabilities: [web_search]
    command: "claude -p --agent claude-expert-review-agent"
    scheduler_strategy: fifo
    note: Claude Code CLI を使用する高性能レビューエージェント。done_criteria の roles フィールドを参照し、全観点で成果物をレビューする。モデル・ツール・権限は .claude/agents/claude-expert-review-agent.md で定義。

  #
  # codex members
  #
  - nickname: codex-edit-agent
    display_name: Codex Edit Agent
    type: agent
    mode: edit
    roles: []
    capabilities: [web_search]
    proficiency: normal
    priority: 1
    command: 'codex exec --ephemeral --sandbox workspace-write --model gpt-5.4-mini -c model_reasoning_effort="medium"'
    scheduler_strategy: critical-first

  - nickname: codex-review-agent
    display_name: Codex Review Agent
    type: agent
    mode: review
    roles: []
    capabilities: [web_search]
    proficiency: normal
    priority: 1
    command: 'codex exec --ephemeral --sandbox read-only --model gpt-5.4-mini -c model_reasoning_effort="medium"'
    scheduler_strategy: fifo

  - nickname: codex-expert-edit-agent
    display_name: Codex Expert Edit Agent
    type: agent
    mode: edit
    roles: []
    capabilities: [web_search]
    proficiency: expert
    priority: 2
    command: 'codex exec --ephemeral --sandbox workspace-write --model gpt-5.5 -c model_reasoning_effort="high"'
    scheduler_strategy: critical-first

  - nickname: codex-expert-review-agent
    display_name: Codex Expert Review Agent
    type: agent
    mode: review
    roles: []
    capabilities: [web_search]
    proficiency: expert
    priority: 2
    command: 'codex exec --ephemeral --sandbox read-only --model gpt-5.5 -c model_reasoning_effort="high"'
