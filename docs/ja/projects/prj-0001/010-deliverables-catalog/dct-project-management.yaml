id: prj-0001:dct-project-management
type: project
status: draft
title: 成果物カタログ（プロジェクト管理）
rulebook: dct-rulebook
part_of:
  - prj-0001:dct-index
project_id: prj-0001
domain: project-management
base_path: /docs/ja/projects/prj-0001/030-project-management
groups:
  - name: 管理計画
    base_path: 010-management-plan
    deliverables:
      - local_id: pm-plan
        name: プロジェクト管理計画
        kind: work
        depends_on: [pm-organization, pm-roles]
        overview: プロジェクト全体の管理方針・プロセスを定義
        path: pm-plan.md
        rulebook: pm-plan-rulebook
        done_criteria:
          - text: プロジェクト全体の管理方針・プロセスを承認できる粒度で記述されていること
            roles: [PO]
            viewpoint: vp-po-decision-readiness
          - text: 計画・進捗・リスク・変更管理の方針が計画運用に使える粒度で記述されていること
            roles: [PM]
            viewpoint: vp-pm-plan-feasibility
          - text: 憲章・組織定義・RACI と整合していること
            roles: [ARC]
            viewpoint: vp-arc-cross-document-consistency
      - local_id: pm-communication-plan
        name: コミュニケーション計画
        kind: work
        depends_on:
          - pm-plan
        overview: 報告・連絡・会議体の計画を定義
        path: pm-communication-plan.md
        rulebook: pm-communication-plan-rulebook
        done_criteria:
          - text: 報告・連絡・会議体の計画を承認できる粒度で記述されていること
            roles: [PO]
            viewpoint: vp-po-decision-readiness
          - text: 進捗・課題・リスクの報告経路が定義されていること
            roles: [PM]
            viewpoint: vp-pm-control-reporting
          - text: 関係者ごとの情報要求・関与方針が業務観点で確認できること
            roles: [BA]
            viewpoint: vp-ba-stakeholder-clarity
      - local_id: pm-quality-management-plan
        name: 品質管理計画
        kind: work
        depends_on:
          - pm-plan
        overview: 品質目標・レビュー方針・品質基準を定義
        path: pm-quality-management-plan.md
        rulebook: pm-quality-management-plan-rulebook
        done_criteria:
          - text: 品質目標・レビュー方針・品質基準を承認できる粒度で記述されていること
            roles: [PO]
            viewpoint: vp-po-decision-readiness
          - text: 品質管理プロセスが全体計画と整合していること
            roles: [PM]
            viewpoint: vp-pm-plan-feasibility
          - text: 品質メトリクス（算出方法・閾値・計測頻度）と検証・レビュー手順が判定可能な形で記述されていること
            roles: [QE]
            viewpoint: vp-qe-verifiability
  - name: 組織体制
    base_path: 020-organization
    deliverables:
      - local_id: pm-organization
        name: 組織定義
        kind: work
        depends_on:
          - prj-overview
        overview: ロール・メンバー構成の方針と設計根拠を定義
        path: pm-organization.md
        rulebook: pm-organization-rulebook
        done_criteria:
          - text: 兼務構成を含む組織設計の根拠と最終判断の集約先を承認できること
            roles: [PO]
            viewpoint: vp-po-decision-readiness
          - text: pm-roles.yaml と pm-members.yaml への導線が整備されていること
            roles: [BA]
            viewpoint: vp-ba-stakeholder-clarity
          - text: pm-roles.yaml と pm-members.yaml との構造整合が取れていること
            roles: [ARC]
            viewpoint: vp-arc-cross-document-consistency
      - local_id: pm-roles
        name: ロール定義
        kind: work
        depends_on:
          - pm-organization
        overview: 全 Role code を machine-readable な YAML として一覧化する
        path: pm-roles.yaml
        rulebook: pm-roles-rulebook
        done_criteria:
          - text: 全ロールコードとプロジェクト固有メモを承認できること
            roles: [PO]
            viewpoint: vp-po-decision-readiness
          - text: Role code が schema 構造に沿って定義され、owner 語彙として機能すること
            roles: [ARC]
            viewpoint: vp-arc-document-structure
          - text: 必要な全ロール（PM/BA/ARC/DEV/QE/UX/OPS）が過不足・重複なく定義されていること
            roles: [QE]
            viewpoint: vp-qe-omissions-consistency
      - local_id: pm-members
        name: メンバー定義
        kind: work
        depends_on:
          - pm-organization
          - pm-roles
        overview: yaml で実行主体（人間・agent）と担当ロールリスト（roles）を定義
        path: pm-members.yaml
        rulebook: pm-members-rulebook
        done_criteria:
          - text: 実行主体（人間・agent）と担当ロールリスト（roles）を承認できること
            roles: [PO]
            viewpoint: vp-po-decision-readiness
          - text: pm-roles.yaml の Role code 語彙と member の roles が整合していること
            roles: [ARC]
            viewpoint: vp-arc-cross-document-consistency
          - text: 必要なロールを担う member が過不足なく定義されていること
            roles: [QE]
            viewpoint: vp-qe-omissions-consistency
      - local_id: pm-raci
        name: RACI
        kind: work
        depends_on:
          - pm-organization
        overview: 成果物・プロセスごとの責任分担マトリクスを定義（中規模以上）
        path: pm-raci.md
        rulebook: pm-raci-rulebook
        done_criteria:
          - text: 成果物・プロセスごとの責任分担マトリクスを承認できること
            roles: [PO]
            viewpoint: vp-po-decision-readiness
          - text: 確認者・合意対象など業務観点での責任分担が読み取れること
            roles: [BA]
            viewpoint: vp-ba-stakeholder-clarity
          - text: RACI の Role code が組織定義の採用ロールと整合していること
            roles: [ARC]
            viewpoint: vp-arc-cross-document-consistency
          - text: A の集約（1 成果物 1 Accountable）と R/C の抜け漏れがないこと
            roles: [QE]
            viewpoint: vp-qe-omissions-consistency
  - name: 管理台帳
    base_path: controls/project-register
    deliverables:
      - local_id: pjr-index
        name: プロジェクト登録簿
        kind: control
        depends_on: []
        overview: 識別済み検討項目と対応策を管理（台帳）
        path: pjr-index.md
        rulebook: pjr-index-rulebook
      - local_id: pjr-entry
        instance_id_pattern: pjr-{sequence}-{term}
        name: プロジェクト登録項目
        kind: control
        depends_on:
          - pjr-index
        overview: 識別済み検討項目と対応策を管理（個別課題）
        note: sequence は4桁連番、term は件名の略称（kebab-case）
  - name: 管理台帳補助ビュー
    base_path: controls/project-register/generated
    deliverables:
      - local_id: pjr-open-items
        name: 未完了項目一覧
        kind: generated
        depends_on:
          - pjr-index
          - pjr-entry
        overview: プロジェクト登録簿の未完了項目を一覧化
        path: pjr-open-items.md
      - local_id: pjr-by-owner
        name: 担当者別一覧
        kind: generated
        depends_on:
          - pjr-index
          - pjr-entry
        overview: プロジェクト登録簿の担当者別項目を一覧化
        path: pjr-by-owner.md
      - local_id: pjr-by-priority
        name: 優先度別一覧
        kind: generated
        depends_on:
          - pjr-index
          - pjr-entry
        overview: プロジェクト登録簿の優先度別項目を一覧化
        path: pjr-by-priority.md
      - local_id: pjr-by-status
        name: 状態別一覧
        kind: generated
        depends_on:
          - pjr-index
          - pjr-entry
        overview: プロジェクト登録簿の状態別項目を一覧化
        path: pjr-by-status.md
  - name: 管理ビュー
    base_path: controls/generated
    deliverables:
      - local_id: pm-risk-register
        name: リスク登録簿
        kind: generated
        depends_on:
          - pjr-entry
        overview: 識別済みリスクと対応策を管理
        path: pm-risk-register.md
      - local_id: pm-issue-log
        name: 課題ログ
        kind: generated
        depends_on:
          - pjr-entry
        overview: 発生した課題と対応状況を管理
        path: pm-issue-log.md
      - local_id: pm-change-request-log
        name: 変更要求ログ
        kind: generated
        depends_on:
          - pjr-entry
        overview: 変更要求の申請・審査・決定を管理
        path: pm-change-request-log.md
      - local_id: pm-decision-log
        name: 決定記録
        kind: generated
        depends_on:
          - pjr-entry
        overview: プロジェクト上の意思決定とその根拠を記録
        path: pm-decision-log.md
  - name: スケジュール
    base_path: schedule
    deliverables:
      - local_id: sch-milestones
        name: マイルストーン定義
        kind: generated
        depends_on: []
        overview: プロジェクト全体のマイルストーンを定義
        path: sch-milestones.yaml
        rulebook: sch-rulebook
        done_criteria:
          - text: プロジェクト全体のマイルストーンを承認できること
            roles: [PO]
            viewpoint: vp-po-decision-readiness
          - text: マイルストーンの時期・順序が計画立案に使える粒度で定義されていること
            roles: [PM]
            viewpoint: vp-pm-plan-feasibility
          - text: ビジネスマイルストーンが含まれていること
            roles: [BA]
            viewpoint: vp-ba-business-value
          - text: 品質ゲートが判定可能な形で含まれていること
            roles: [QE]
            viewpoint: vp-qe-verifiability
      - local_id: sch-defaults
        name: スケジュールデフォルト定義
        kind: work
        depends_on: []
        overview: スケジュールのデフォルト設定を定義
        path: sch-defaults.yaml
        rulebook: sch-rulebook
        done_criteria:
          - text: カレンダー・開始日などのデフォルト設定を承認できること
            roles: [PO]
            viewpoint: vp-po-decision-readiness
          - text: 稼働日・休日などスケジュール前提の設定が確認できること
            roles: [PM]
            viewpoint: vp-pm-plan-feasibility
          - text: validate:schema を通過していること
            roles: [ARC]
            viewpoint: vp-arc-document-structure
          - text: 設定値の妥当性が確認できること
            roles: [QE]
            viewpoint: vp-qe-config-validity
      - local_id: sch-track-launch
        name: Launch スケジュール定義
        kind: generated
        depends_on: []
        overview: Launch フェーズの詳細スケジュールを定義
        path: sch-track-launch.yaml
        rulebook: sch-rulebook
        done_criteria:
          - text: Launch フェーズのタスク・マイルストーン計画を承認できること
            roles: [PO]
            viewpoint: vp-po-decision-readiness
          - text: タスクの順序・依存関係が計画立案に使える粒度で定義されていること
            roles: [PM]
            viewpoint: vp-pm-plan-feasibility
          - text: schema 構造に沿ってタスクが定義されていること
            roles: [ARC]
            viewpoint: vp-arc-document-structure
          - text: 品質ゲート・レビュータスクが含まれていること
            roles: [QE]
            viewpoint: vp-qe-omissions-consistency
      - local_id: sch-strategy-launch
        name: Launch スケジュール戦略定義
        kind: work
        depends_on: []
        overview: フェーズ定義・オーナー割当・初期状態を含む Launch トラック生成戦略を定義
        path: sch-strategy-launch.yaml
        rulebook: sch-rulebook
        done_criteria:
          - text: owner_rules・フェーズ定義・initial_state を含むトラック戦略を承認できること
            roles: [PO]
            viewpoint: vp-po-decision-readiness
          - text: owner_rules の担当割り当てがプロジェクト体制と整合していること
            roles: [PM]
            viewpoint: vp-pm-plan-feasibility
          - text: validate:schema を通過していること
            roles: [ARC]
            viewpoint: vp-arc-document-structure
          - text: phases・owner_rules・initial_state の各設定値の妥当性が確認できること
            roles: [QE]
            viewpoint: vp-qe-config-validity
  - name: レポート
    groups:
      - name: 進捗報告
        base_path: reporting/progress-reports
        deliverables:
          - local_id: pr-progress-report
            instance_id_pattern: pr-{yyyy}-{mm}-{dd}
            name: 進捗報告
            kind: control
            depends_on: []
            overview: 定期的な進捗状況の報告
            rulebook: pr-rulebook
            note: yyyy-mm-dd は報告日
      - name: 議事録
        base_path: reporting/meeting-minutes
        deliverables:
          - local_id: mm-meeting-minutes
            instance_id_pattern: mm-{yyyy}-{mm}-{dd}
            name: 議事録
            kind: control
            depends_on: []
            overview: 会議の決定事項・アクションを記録
            rulebook: mm-rulebook
            note: yyyy-mm-dd は会議日
