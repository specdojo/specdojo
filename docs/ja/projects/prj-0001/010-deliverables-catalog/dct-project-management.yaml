id: prj-0001:dct-project-management
type: project
status: draft
part_of:
  - prj-0001:dct-index
project_id: prj-0001
domain: project-management
domain_code: PJM
base_path: /docs/ja/projects/prj-0001/030-project-management

groups:

  - name: 管理計画
    base_path: 010-management-plan
    deliverables:
      - local_id: pm-plan
        artifact_code: PLAN
        name: プロジェクト管理計画
        kind: work
        depends_on: []
        overview: プロジェクト全体の管理方針・プロセスを定義
        path: pm-plan.md
        rulebook: pm-plan-rulebook
        done_criteria:
          - text: プロジェクト全体の管理方針・プロセスを承認できる粒度で記述されていること
            roles: [PO]
            viewpoint: vp-po-purpose-alignment
          - text: 計画・進捗・リスク管理の方針が記述されていること
            roles: [PM]
            viewpoint: vp-pm-plan-feasibility
          - text: 業務プロセスとの整合が確認できること
            roles: [BA]
            viewpoint: vp-ba-business-value
          - text: 構成管理・技術管理の観点が含まれていること
            roles: [ARC]
            viewpoint: vp-arc-technical-constraints
          - text: レビュー方針・品質基準への参照が確認できること
            roles: [QE]
            viewpoint: vp-qe-verifiability

      - local_id: pm-communication-plan
        artifact_code: COMM
        name: コミュニケーション計画
        kind: work
        depends_on:
          - pm-plan
        overview: 報告・連絡・会議体の計画を定義
        path: pm-communication-plan.md
        rulebook: pm-communication-plan-rulebook
        done_criteria:
          - text: 報告・連絡・会議体の計画を承認できる粒度で記述されていること
            roles: [PO]
            viewpoint: vp-po-decision-readiness
          - text: 進捗・課題・リスクの報告経路が定義されていること
            roles: [PM]
            viewpoint: vp-pm-control-reporting
          - text: 業務観点のコミュニケーション要件が含まれていること
            roles: [BA]
            viewpoint: vp-ba-stakeholder-clarity
          - text: 技術チームへの連絡経路が識別されていること
            roles: [ARC]
            viewpoint: vp-arc-technical-constraints
          - text: 品質関連の報告経路が確認できること
            roles: [QE]
            viewpoint: vp-qe-verifiability

      - local_id: pm-quality-management-plan
        artifact_code: QLTY
        name: 品質管理計画
        kind: work
        depends_on:
          - pm-plan
        overview: 品質目標・レビュー方針・品質基準を定義
        path: pm-quality-management-plan.md
        rulebook: pm-quality-management-plan-rulebook
        done_criteria:
          - text: 品質目標・レビュー方針・品質基準を承認できる粒度で記述されていること
            roles: [PO]
            viewpoint: vp-po-decision-readiness
          - text: 品質管理プロセスが全体計画と整合していること
            roles: [PM]
            viewpoint: vp-pm-plan-feasibility
          - text: 業務品質基準との整合が確認できること
            roles: [BA]
            viewpoint: vp-ba-business-value
          - text: コードレビュー・設計レビューなど技術品質基準が含まれていること
            roles: [ARC]
            viewpoint: vp-arc-technical-constraints
          - text: 実施可能な検証・レビュー手順が記述されていること
            roles: [QE]
            viewpoint: vp-qe-verifiability

  - name: 組織体制
    base_path: 020-organization
    deliverables:
      - local_id: pm-organization
        artifact_code: ORG
        name: 組織定義
        kind: work
        depends_on:
          - prj-overview
        overview: ロール・メンバー構成の方針と設計根拠を定義
        path: pm-organization.md
        rulebook: pm-organization-rulebook
        done_criteria:
          - text: 兼務構成を含む組織設計の根拠と最終判断の集約先を承認できること
            roles: [PO]
            viewpoint: vp-po-purpose-alignment
          - text: pm-roles.yaml と pm-members.yaml への導線が整備されていること
            roles: [BA]
            viewpoint: vp-ba-stakeholder-clarity
          - text: pm-roles.yaml と pm-members.yaml との構造整合が取れていること
            roles: [ARC]
            viewpoint: vp-arc-cross-document-consistency
          - text: 禁止事項・見直し条件が実施可能な粒度で記述されていること
            roles: [QE]
            viewpoint: vp-qe-verifiability

      - local_id: pm-roles
        artifact_code: ROLE
        name: ロール定義
        kind: work
        depends_on:
          - pm-organization
        overview: 全 Role code を machine-readable な YAML として一覧化する
        path: pm-roles.yaml
        rulebook: pm-roles-rulebook
        done_criteria:
          - text: 全ロールコードとプロジェクト固有メモを承認できること
            roles: [PO]
            viewpoint: vp-po-purpose-alignment
          - text: PM ロールが定義されていること
            roles: [PM]
            viewpoint: vp-pm-plan-feasibility
          - text: BA ロールが定義されていること
            roles: [BA]
            viewpoint: vp-ba-stakeholder-clarity
          - text: ARC ロールが定義されていること
            roles: [ARC]
            viewpoint: vp-arc-document-structure
          - text: DEV ロールが定義されていること
            roles: [DEV]
            viewpoint: vp-dev-implementation-readiness
          - text: QE ロールが定義されていること
            roles: [QE]
            viewpoint: vp-qe-omissions-consistency
          - text: UX ロールが定義されていること
            roles: [UX]
            viewpoint: vp-ux-readability
          - text: OPS ロールが定義されていること
            roles: [OPS]
            viewpoint: vp-ops-operability

      - local_id: pm-members
        artifact_code: MBR
        name: メンバー定義
        kind: work
        depends_on:
          - pm-organization
          - pm-roles
        overview: yaml で実行主体（人間・agent）と担当ロールリスト（roles）を定義
        path: pm-members.yaml
        rulebook: pm-members-rulebook
        done_criteria:
          - text: 実行主体（人間・agent）と担当ロールリスト（roles）を承認できること
            roles: [PO]
            viewpoint: vp-po-purpose-alignment
          - text: PM ロールを担う member または兼務設定が確認できること
            roles: [PM]
            viewpoint: vp-pm-plan-feasibility
          - text: BA ロールを担う member が定義されていること
            roles: [BA]
            viewpoint: vp-ba-stakeholder-clarity
          - text: ARC ロールを担う member が定義されていること
            roles: [ARC]
            viewpoint: vp-arc-cross-document-consistency
          - text: QE ロールを担う member が定義されていること
            roles: [QE]
            viewpoint: vp-qe-omissions-consistency

      - local_id: pm-raci
        artifact_code: RACI
        name: RACI
        kind: work
        depends_on:
          - pm-organization
        overview: 成果物・プロセスごとの責任分担マトリクスを定義（中規模以上）
        path: pm-raci.md
        rulebook: pm-raci-rulebook
        done_criteria:
          - text: 成果物・プロセスごとの責任分担マトリクスを承認できること
            roles: [PO]
            viewpoint: vp-po-decision-readiness
          - text: 業務観点での責任分担が確認できること
            roles: [BA]
            viewpoint: vp-ba-stakeholder-clarity
          - text: 技術観点での責任分担が確認できること
            roles: [ARC]
            viewpoint: vp-arc-cross-document-consistency
          - text: 品質観点での責任分担が確認できること
            roles: [QE]
            viewpoint: vp-qe-omissions-consistency

  - name: 管理台帳
    base_path: controls/project-register
    deliverables:
      - local_id: pjr-index
        artifact_code: CTLIND
        name: プロジェクト登録簿
        kind: control
        depends_on: []
        overview: 識別済み検討項目と対応策を管理（台帳）
        path: pjr-index.md

      - local_id: pjr-NNNN-TERM
        artifact_code: CTLITM
        name: プロジェクト登録項目
        kind: control
        depends_on:
          - pjr-index
        overview: 識別済み検討項目と対応策を管理（個別課題）
        note: "NNNN は4桁連番、TERM は件名の略称（kebab-case）"

  - name: 管理台帳補助ビュー
    base_path: controls/project-register/generated
    deliverables:
      - local_id: pjr-open-items
        artifact_code: CTLOI
        name: 未完了項目一覧
        kind: generated
        depends_on:
          - pjr-index
          - pjr-NNNN-TERM
        overview: プロジェクト登録簿の未完了項目を一覧化
        path: pjr-open-items.md

      - local_id: pjr-by-owner
        artifact_code: CTLOB
        name: 担当者別一覧
        kind: generated
        depends_on:
          - pjr-index
          - pjr-NNNN-TERM
        overview: プロジェクト登録簿の担当者別項目を一覧化
        path: pjr-by-owner.md

      - local_id: pjr-by-priority
        artifact_code: CTLPR
        name: 優先度別一覧
        kind: generated
        depends_on:
          - pjr-index
          - pjr-NNNN-TERM
        overview: プロジェクト登録簿の優先度別項目を一覧化
        path: pjr-by-priority.md

      - local_id: pjr-by-status
        artifact_code: CTLST
        name: 状態別一覧
        kind: generated
        depends_on:
          - pjr-index
          - pjr-NNNN-TERM
        overview: プロジェクト登録簿の状態別項目を一覧化
        path: pjr-by-status.md

  - name: 管理ビュー
    base_path: controls/generated
    deliverables:
      - local_id: pm-risk-register
        artifact_code: CTLRSK
        name: リスク登録簿
        kind: generated
        depends_on:
          - pjr-NNNN-TERM
        overview: 識別済みリスクと対応策を管理
        path: pm-risk-register.md

      - local_id: pm-issue-log
        artifact_code: CTLISS
        name: 課題ログ
        kind: generated
        depends_on:
          - pjr-NNNN-TERM
        overview: 発生した課題と対応状況を管理
        path: pm-issue-log.md

      - local_id: pm-change-request-log
        artifact_code: CTLCRQ
        name: 変更要求ログ
        kind: generated
        depends_on:
          - pjr-NNNN-TERM
        overview: 変更要求の申請・審査・決定を管理
        path: pm-change-request-log.md

      - local_id: pm-decision-log
        artifact_code: CTLDEC
        name: 決定記録
        kind: generated
        depends_on:
          - pjr-NNNN-TERM
        overview: プロジェクト上の意思決定とその根拠を記録
        path: pm-decision-log.md

  - name: スケジュール
    base_path: schedule
    deliverables:
      - local_id: sch-milestones
        artifact_code: SCHMS
        name: マイルストーン定義
        kind: work
        depends_on: []
        overview: プロジェクト全体のマイルストーンを定義
        path: sch-milestones.yaml
        rulebook: sch-milestones-rulebook
        done_criteria:
          - text: プロジェクト全体のマイルストーンを承認できること
            roles: [PO]
            viewpoint: vp-po-decision-readiness
          - text: ビジネスマイルストーンが含まれていること
            roles: [BA]
            viewpoint: vp-ba-business-value
          - text: 技術マイルストーンが含まれていること
            roles: [ARC]
            viewpoint: vp-arc-technical-constraints
          - text: 品質ゲートが含まれていること
            roles: [QE]
            viewpoint: vp-qe-verifiability

      - local_id: sch-defaults
        artifact_code: SCHDEF
        name: スケジュールデフォルト定義
        kind: work
        depends_on: []
        overview: スケジュールのデフォルト設定を定義
        path: sch-defaults.yaml
        done_criteria:
          - text: カレンダー・開始日などのデフォルト設定を承認できること
            roles: [PO]
            viewpoint: vp-po-decision-readiness
          - text: 業務稼働日・休日設定が確認できること
            roles: [BA]
            viewpoint: vp-ba-business-value
          - text: validate:schema を通過していること
            roles: [ARC]
            viewpoint: vp-arc-document-structure
          - text: 設定値の妥当性が確認できること
            roles: [QE]
            viewpoint: vp-qe-verifiability

      - local_id: sch-track-launch
        artifact_code: SCHTLNCH
        name: Launch スケジュール定義
        kind: work
        depends_on: []
        overview: Launch フェーズの詳細スケジュールを定義
        path: sch-track-launch.yaml
        done_criteria:
          - text: Launch フェーズのタスク・マイルストーン計画を承認できること
            roles: [PO]
            viewpoint: vp-po-decision-readiness
          - text: ビジネスタスクの順序・依存関係が確認できること
            roles: [BA]
            viewpoint: vp-ba-business-value
          - text: 技術タスクのスコープと順序が確認できること
            roles: [ARC]
            viewpoint: vp-arc-technical-constraints
          - text: 品質ゲート・レビュータスクが含まれていること
            roles: [QE]
            viewpoint: vp-qe-verifiability

  - name: レポート
    groups:
      - name: 進捗報告
        base_path: reporting/progress-reports
        deliverables:
          - local_id: pr-YYYY-MM-DD
            artifact_code: PR
            name: 進捗報告
            kind: control
            depends_on: []
            overview: 定期的な進捗状況の報告
            note: "YYYY-MM-DD は報告日"

      - name: 議事録
        base_path: reporting/meeting-minutes
        deliverables:
          - local_id: mm-YYYY-MM-DD
            artifact_code: MM
            name: 議事録
            kind: control
            depends_on: []
            overview: 会議の決定事項・アクションを記録
            note: "YYYY-MM-DD は会議日"
